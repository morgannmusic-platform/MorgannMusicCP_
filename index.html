<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Morgann Music CP - Distribuez, Structurez, Élevez votre musique.">
    <meta name="theme-color" content="#FC8FB0" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#6C7A53" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="no">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Morgann Music CP">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mm-cp.uk/">
    <meta property="og:title" content="Morgann Music CP">
    <meta property="og:description" content="Distribuez, Structurez, Élevez votre musique.">
    <meta property="og:image" content="/assets/img/banières/accueil.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale" content="fr_FR">
    <meta property="og:site_name" content="Morgann Music CP">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://x.com/morgann_music?s=21">
    <meta property="twitter:title" content="Morgann Music CP">
    <meta property="twitter:description" content="Distribuez, Structurez, Élevez.">
    <meta property="twitter:image" content="/assets/img/banières/accueil.png">
    
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favincons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/img/icons/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/img/icons/android-chrome-512x512.png">
    <link rel="apple-touch-icon" href="/assets/img/icons/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="msapplication-TileColor" content="#7494ec">
    <meta name="msapplication-TileImage" content="/assets/img/icons/android-chrome-192x192.png">
    
    <!-- Canonical -->
    <link rel="canonical" href="https://mm-cp.uk/">
    
    <title>Morgann Music CP</title>
    <link rel="stylesheet" href="/assets/css/styles-accueil.css">
    <!-- GSAP pour les animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="/assets/js/background.js"></script>
    <script src="/assets/js/navbar.js" defer></script>
</head>
<body>
    <div id="navbar"></div>

    <div class="banner">
        <h1 class="banner-title">
            <span class="word">Morgann</span> 
            <span class="word">Music</span> 
            <img src="/assets/img/logo/logo-rose.svg" alt="CP" class="banner-logo">
        </h1>
        <p class="banner-subtitle">Distribuez, Structurez, Élevez.</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof gsap !== "undefined") {
                const tl = gsap.timeline({ delay: 1 }); // Attend un peu après la navbar
                
                // 1. Apparition du titre (mots et logo) avec le même mouvement fluide
                tl.to([".banner-title .word", ".banner-logo"], {
                    opacity: 1, y: 0, duration: 0.8, stagger: 0.2, ease: "power4.out", startAt: { y: 30, opacity: 0 }
                })
                // 2. Apparition du sous-titre avec un effet "expo" pour plus d'élégance
                .to(".banner-subtitle", {
                    opacity: 1, y: 0, duration: 1.2, ease: "expo.out", startAt: { y: 15, opacity: 0 }
                }, "-=0.5");
            } else {
                // Fallback si GSAP est bloqué
                document.querySelectorAll(".banner-title .word, .banner-logo, .banner-subtitle").forEach(el => el.style.opacity = "1");
            }
        });
    </script>
</body>
</html>
