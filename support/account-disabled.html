<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Compte désactivé — Support</title>
  <style>
    :root {
      --bg:#e2e2e2;
      --txt:#000;
      --stroke:rgba(0,0,0,.12);
      --card:rgba(255,255,255,.82);
      --muted:rgba(0,0,0,.58);
      --blue:#2f63ff;
      --green:#16a34a;
      --red:#dc2626;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#414141;
        --txt:#fff;
        --stroke:rgba(255,255,255,.14);
        --card:rgba(30,30,30,.82);
        --muted:rgba(255,255,255,.65);
        --blue:#3b82f6;
        --green:#22c55e;
        --red:#ef4444;
      }
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { background:var(--bg); color:var(--txt); font-family:Helvetica,sans-serif; }
    .wrap { max-width:760px; margin:0 auto; padding:34px 18px; }
    .title { font-size:30px; font-weight:900; margin-bottom:8px; }
    .sub { color:var(--muted); margin-bottom:14px; }
    .card {
      border:1px solid var(--stroke);
      border-radius:24px;
      background:var(--card);
      padding:16px;
    }
    .line { margin-bottom:10px; }
    .label { font-size:12px; color:var(--muted); margin-bottom:6px; display:block; }
    .input, .textarea {
      width:100%;
      border:1px solid var(--stroke);
      border-radius:14px;
      background:transparent;
      color:var(--txt);
      padding:11px 12px;
    }
    .textarea { min-height:140px; resize:vertical; }
    .btn {
      border:none;
      border-radius:999px;
      padding:10px 14px;
      background:var(--blue);
      color:#fff;
      font-weight:900;
      cursor:pointer;
    }
    .btn.secondary { background:transparent; color:var(--txt); border:1px solid var(--stroke); }
    .btn[disabled] { opacity:.65; cursor:not-allowed; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px; }
    .status { margin-top:10px; font-size:12px; color:var(--muted); }
    .ok { color:var(--green); }
    .error { color:var(--red); }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="title">Compte désactivé</h1>
    <p class="sub">Ton compte est désactivé. Tu peux envoyer une demande au support pour une réactivation.</p>

    <section class="card">
      <div class="line">
        <label class="label" for="email">Email</label>
        <input id="email" class="input" type="email" placeholder="ton@email.com" readonly />
      </div>

      <div class="line">
        <label class="label" for="message">Message</label>
        <textarea id="message" class="textarea" placeholder="Explique ta demande de réactivation..."></textarea>
      </div>

      <div class="row">
        <button id="btnSend" class="btn" type="button">Envoyer au support</button>
        <button id="btnBackLogin" class="btn secondary" type="button">Retour connexion</button>
      </div>

      <p id="status" class="status">Vérification du compte…</p>
    </section>
  </main>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
      authDomain: "morgann-music-cp.firebaseapp.com",
      projectId: "morgann-music-cp",
      storageBucket: "morgann-music-cp.firebasestorage.app",
      messagingSenderId: "666812685196",
      appId: "1:666812685196:web:fe3df6749ae768d68494a9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const emailEl = document.getElementById("email");
    const messageEl = document.getElementById("message");
    const statusEl = document.getElementById("status");
    const btnSend = document.getElementById("btnSend");
    const btnBackLogin = document.getElementById("btnBackLogin");

    let currentUser = null;

    function clean(value) {
      return String(value || "").trim();
    }

    function isDisabledProfile(profile) {
      if (!profile) return false;
      if (profile.accountDisabled === true) return true;
      const status = clean(profile.status).toLowerCase();
      return status === "disabled" || status === "desactive";
    }

    async function sendSupportRequest() {
      const text = clean(messageEl.value);
      const email = clean(emailEl.value);

      if (!currentUser?.uid) {
        statusEl.textContent = "Session expirée. Reconnecte-toi pour contacter le support.";
        statusEl.className = "status error";
        return;
      }

      if (!email) {
        statusEl.textContent = "Email introuvable.";
        statusEl.className = "status error";
        return;
      }

      if (text.length < 10) {
        statusEl.textContent = "Ajoute un message plus précis (10 caractères minimum).";
        statusEl.className = "status error";
        return;
      }

      btnSend.disabled = true;
      statusEl.textContent = "Envoi en cours…";
      statusEl.className = "status";

      try {
        await addDoc(collection(db, "supportTickets"), {
          ownerUid: currentUser.uid,
          ownerEmail: email,
          category: "Compte désactivé",
          title: "Demande de réactivation de compte",
          status: "Envoyé à MMCP",
          description: text,
          details: "Demande envoyée depuis la page compte désactivé",
          allowArtistReply: true,
          thread: [
            {
              role: "artist",
              text,
              at: new Date().toISOString(),
              byUid: currentUser.uid,
              byEmail: email
            }
          ],
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        statusEl.textContent = "Demande envoyée ✅ Le support a été notifié dans le dashboard admin.";
        statusEl.className = "status ok";
        messageEl.value = "";

        setTimeout(async () => {
          await signOut(auth);
          window.location.href = "/login.html";
        }, 1400);
      } catch (error) {
        statusEl.textContent = "Erreur envoi: " + (error?.message || String(error));
        statusEl.className = "status error";
      } finally {
        btnSend.disabled = false;
      }
    }

    btnSend.addEventListener("click", sendSupportRequest);
    btnBackLogin.addEventListener("click", async () => {
      try { await signOut(auth); } catch {}
      window.location.href = "/login.html";
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        statusEl.textContent = "Reconnecte-toi puis réessaie. Le formulaire est réservé aux comptes désactivés.";
        statusEl.className = "status error";
        btnSend.disabled = true;
        return;
      }

      currentUser = user;
      emailEl.value = clean(user.email);

      try {
        const snap = await getDoc(doc(db, "users", user.uid));
        const profile = snap.exists() ? (snap.data() || {}) : {};
        if (!isDisabledProfile(profile)) {
          window.location.href = "/dash/index.html";
          return;
        }

        const reason = clean(profile.accountDisabledReason);
        statusEl.textContent = reason
          ? `Compte désactivé. Motif: ${reason}`
          : "Compte désactivé. Écris ton message pour demander une réactivation.";
        statusEl.className = "status";
      } catch (error) {
        statusEl.textContent = "Erreur vérification compte: " + (error?.message || String(error));
        statusEl.className = "status error";
      }
    });
  </script>
</body>
</html>
