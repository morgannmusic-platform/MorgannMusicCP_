<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avis artistes - Morgann Music CP</title>
  <meta property="og:image" content="/assets/img/Banières/avis.png">
  <meta property="og:description" content="Avis des artistes de Morgann Music CP.">
  <link rel="stylesheet" href="/assets/css/styles-accueil.css">
  <link rel="stylesheet" href="/assets/css/pied-de-page.css">
  <style>
    body { padding-top: 88px; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px 18px 40px; }
    .card { border: 1px solid rgba(0,0,0,.12); border-radius: 20px; background: rgba(255,255,255,.75); padding: 18px; margin-bottom: 14px; }
    h1 { margin: 0 0 10px; font-size: clamp(1.9rem, 4vw, 2.4rem); }
    .hint { margin: 0 0 12px; line-height: 1.65; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .select, .textarea {
      border: 1px solid rgba(0,0,0,.18);
      border-radius: 12px;
      padding: 12px;
      font: inherit;
      background: rgba(255,255,255,.92);
      color: #111;
      width: 100%;
    }
    .textarea { min-height: 120px; resize: vertical; }
    .btn { border: none; border-radius: 999px; padding: 12px 18px; font-weight: 700; background: #2f63ff; color: #fff; cursor: pointer; }
    .review { border-top: 1px solid rgba(0,0,0,.1); padding-top: 12px; margin-top: 12px; }
    .stars { font-size: 1.1rem; letter-spacing: 1px; }
    .muted { opacity: .75; font-size: .95rem; }

    /* Sélecteur d'étoiles interactif */
    .star-picker { display: flex; gap: 6px; margin-bottom: 12px; }
    .star-picker button {
      background: none; border: none; cursor: pointer; padding: 0;
      font-size: 2.2rem; line-height: 1; transition: transform .15s;
      color: #d1d5db;
    }
    .star-picker button:hover,
    .star-picker button.hovered { color: #facc15; transform: scale(1.18); }
    .star-picker button.selected { color: #facc15; }
    .star-label { font-size: .93rem; opacity: .65; margin-bottom: 8px; }

    @media (prefers-color-scheme: dark) {
      .card { border: 1px solid rgba(255,255,255,.14); background: rgba(25,25,25,.75); }
      .select, .textarea { border: 1px solid rgba(255,255,255,.2); background: rgba(44,44,44,.95); color: #fff; }
      .review { border-top: 1px solid rgba(255,255,255,.14); }
      .star-picker button { color: rgba(255,255,255,.2); }
    }

    /* Page loader */
    #page-loader {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
      padding: 60px 0 40px;
    }
    #page-loader svg { width: 90px; height: 90px; display: block; }
    #page-loader p { font-size: 13px; opacity: .45; }
    @keyframes mmcp-blink {
      0%   { opacity: 1;    transform: translateY(0); }
      50%  { opacity: 0.12; transform: translateY(-3px); }
      100% { opacity: 1;    transform: translateY(0); }
    }
    #avis-part-1 { animation: mmcp-blink 1.2s ease-in-out infinite; }
    #avis-part-2 { animation: mmcp-blink 1.4s ease-in-out infinite 0.08s; }
    #avis-part-3 { animation: mmcp-blink 1.6s ease-in-out infinite 0.16s; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div id="page-loader">
    <svg version="1.0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <g transform="translate(0,512) scale(0.1,-0.1)" fill="currentColor" stroke="none">
        <path id="avis-part-1" d="M1585 3690 c-221 -34 -463 -165 -597 -324 -179 -213 -268 -491 -268 -841 0 -410 90 -689 288 -896 119 -126 241 -196 430 -247 91 -24 110 -26 322 -26 244 0 341 13 510 71 122 41 110 16 110 237 0 106 -2 195 -5 198 -3 3 -45 -7 -93 -22 -184 -59 -316 -83 -467 -84 -119 -1 -151 3 -212 22 -205 64 -321 222 -369 502 -23 138 -15 431 16 550 78 302 266 467 533 469 130 1 251 -31 440 -116 43 -19 80 -33 82 -31 2 1 37 89 79 193 70 174 75 191 59 202 -33 25 -228 95 -332 120 -89 21 -135 26 -286 28 -99 2 -207 0 -240 -5z"/>
        <path id="avis-part-2" d="M2865 3658 c-3 -7 -4 -521 -3 -1143 l3 -1130 243 -3 242 -2 0 403 0 404 203 7 c210 7 321 24 436 67 213 79 374 250 426 454 36 140 36 357 0 480 -76 262 -284 418 -619 464 -116 16 -925 15 -931 -1z m908 -417 c102 -40 162 -120 176 -237 16 -135 -18 -245 -97 -315 -78 -68 -204 -99 -403 -99 l-99 0 0 341 0 341 183 -4 c160 -4 189 -7 240 -27z"/>
        <path id="avis-part-3" d="M1654 2799 c-3 -6 -12 -8 -20 -5 -7 3 -29 -9 -48 -27 -37 -36 -54 -99 -42 -159 20 -100 27 -180 16 -193 -8 -10 -7 -31 6 -82 19 -78 30 -96 54 -88 11 4 23 -3 34 -19 20 -32 94 -83 147 -101 35 -13 45 -13 75 0 66 27 140 119 168 208 3 9 17 22 30 27 18 6 27 19 31 44 9 47 -3 97 -25 103 -12 3 -20 23 -30 74 -7 44 -20 80 -35 97 -12 15 -25 37 -29 50 -8 25 -53 52 -86 52 -12 0 -29 4 -39 10 -26 13 -199 21 -207 9z"/>
      </g>
    </svg>
    <p>Chargement...</p>
  </div>

  <main class="wrap">
    <section class="card">
      <h1>Avis artistes</h1>
      <p class="hint">Seuls les artistes connectes ayant au moins une sortie en ligne peuvent publier un avis (1 a 5 etoiles + commentaire).</p>

      <div id="review-form-wrap" style="display:none;">
        <p class="star-label" id="star-label">Donne une note :</p>
        <div class="star-picker" id="star-picker" role="group" aria-label="Note sur 5">
          <button type="button" data-value="1" aria-label="1 étoile">★</button>
          <button type="button" data-value="2" aria-label="2 étoiles">★</button>
          <button type="button" data-value="3" aria-label="3 étoiles">★</button>
          <button type="button" data-value="4" aria-label="4 étoiles">★</button>
          <button type="button" data-value="5" aria-label="5 étoiles">★</button>
        </div>
        <textarea id="review-comment" class="textarea" maxlength="1200" placeholder="Partage ton experience avec Morgann Music CP..."></textarea>
        <div class="row" style="margin-top:10px;">
          <button id="review-submit" class="btn" type="button">Publier mon avis</button>
        </div>
      </div>

      <p id="review-status" class="muted" aria-live="polite"></p>
    </section>

    <section class="card">
      <h2>Avis publies</h2>
      <div id="reviews-list" class="muted">Chargement...</div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script type="module" src="/assets/js/navbar.js"></script>
  <script src="/assets/js/footer.js"></script>
  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, orderBy, limit, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
      authDomain: "morgann-music-cp.firebaseapp.com",
      projectId: "morgann-music-cp",
      storageBucket: "morgann-music-cp.firebasestorage.app",
      messagingSenderId: "666812685196",
      appId: "1:666812685196:web:fe3df6749ae768d68494a9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const formWrap = document.getElementById("review-form-wrap");
    const statusEl = document.getElementById("review-status");
    const listEl = document.getElementById("reviews-list");
    const submitBtn = document.getElementById("review-submit");

    function clean(v) { return String(v || "").trim(); }
    function stars(n) { return "★".repeat(n) + "☆".repeat(Math.max(0, 5 - n)); }

    async function hasOnlineRelease(uid) {
      // Vérifie si l'utilisateur a au moins une sortie (quel que soit le statut)
      // Les champs possibles : ownerUid, userUid, uid
      const uidFields = ["ownerUid", "userUid", "uid"];
      for (const field of uidFields) {
        try {
          const q = query(collection(db, "releases"), where(field, "==", uid), limit(1));
          const snap = await getDocs(q);
          if (!snap.empty) return true;
        } catch {
          // champ non indexé, on continue
        }
      }
      return false;
    }

    async function loadReviews() {
      const q = query(collection(db, "artistReviews"), orderBy("createdAt", "desc"), limit(80));
      const snap = await getDocs(q);
      if (snap.empty) {
        listEl.innerHTML = '<p>Aucun avis pour le moment.</p>';
        return;
      }

      // Calcul de la moyenne
      let total = 0, count = 0;
      const items = snap.docs.map((d) => {
        const x = d.data() || {};
        const rating = Math.max(1, Math.min(5, Number(x.rating || 0) || 0));
        total += rating;
        count++;
        return { x, rating };
      });
      const avg = count ? (total / count).toFixed(1) : "—";
      const avgStars = count ? Math.round(total / count) : 0;

      const avgHtml = `
        <div style="margin-bottom:18px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <span style="font-size:2rem; font-weight:900;">${avg}</span>
          <span class="stars" style="font-size:1.4rem;">${stars(avgStars)}</span>
          <span class="muted">(${count} avis)</span>
        </div>
      `;

      const html = items.map(({ x, rating }) => {
        const name = clean(x.displayName) || "Artiste";
        const comment = clean(x.comment);
        const createdAt = x.createdAt?.toDate ? x.createdAt.toDate().toLocaleDateString("fr-FR") : "";
        return `
          <article class="review">
            <div><strong>${name}</strong> <span class="stars" aria-label="${rating} etoiles">${stars(rating)}</span></div>
            <p>${comment}</p>
            <p class="muted">${createdAt}</p>
          </article>
        `;
      }).join("");

      listEl.innerHTML = avgHtml + html;
    }

    onAuthStateChanged(auth, async (user) => {
      try {
        await loadReviews();
      } catch {
        listEl.textContent = "Impossible de charger les avis.";
      }

      // Masquer le loader une fois le contenu prêt
      const pageLoader = document.getElementById("page-loader");
      if (pageLoader) pageLoader.style.display = "none";

      if (!user) {
        statusEl.textContent = "Connecte-toi pour publier un avis.";
        formWrap.style.display = "none";
        return;
      }

      statusEl.textContent = "Verification de l'eligibilite...";
      try {
        const ok = await hasOnlineRelease(user.uid);
        if (!ok) {
          statusEl.textContent = "Tu dois avoir au moins une sortie en ligne pour publier un avis.";
          formWrap.style.display = "none";
          return;
        }

        statusEl.textContent = "Tu peux publier un avis.";
        formWrap.style.display = "block";

        // --- Star picker logic ---
        let selectedRating = 0;
        const starPicker = document.getElementById("star-picker");
        const starLabel = document.getElementById("star-label");
        const starBtns = starPicker ? [...starPicker.querySelectorAll("button")] : [];
        const labels = ["", "Bof 😕", "Pas mal 🙂", "Bien 👍", "Très bien 🌟", "Excellent ! 🔥"];

        function updateStars(value, hover = false) {
          starBtns.forEach((btn, idx) => {
            const active = idx < value;
            btn.classList.toggle("selected", !hover && active);
            btn.classList.toggle("hovered",   hover  && active);
            // reset inline color so CSS classes prennent le dessus
            btn.style.color = "";
          });
          if (starLabel) starLabel.textContent = value ? labels[value] : "Donne une note :";
        }

        starBtns.forEach((btn, idx) => {
          btn.addEventListener("mouseenter", () => updateStars(idx + 1, true));
          btn.addEventListener("mouseleave", () => updateStars(selectedRating, false));
          btn.addEventListener("click", () => {
            selectedRating = idx + 1;
            updateStars(selectedRating, false);
          });
        });

        submitBtn.onclick = async () => {
          const rating = selectedRating;
          const comment = clean(document.getElementById("review-comment").value);
          if (rating < 1 || rating > 5) {
            statusEl.textContent = "Clique sur une étoile pour donner ta note.";
            return;
          }
          if (comment.length < 10) {
            statusEl.textContent = "Ecris au moins 10 caractères dans ton commentaire.";
            return;
          }

          submitBtn.disabled = true;
          statusEl.textContent = "Publication en cours...";

          const existing = await getDocs(query(collection(db, "artistReviews"), where("userUid", "==", user.uid), limit(1)));
          if (!existing.empty) {
            statusEl.textContent = "Tu as deja publie un avis. Contacte l'equipe si tu veux le modifier.";
            submitBtn.disabled = false;
            return;
          }

          await addDoc(collection(db, "artistReviews"), {
            userUid: user.uid,
            displayName: clean(user.displayName) || clean(user.email) || "Artiste",
            email: clean(user.email),
            rating,
            comment,
            createdAt: serverTimestamp(),
            approved: true
          });

          document.getElementById("review-comment").value = "";
          statusEl.textContent = "Avis publie, merci.";
          await loadReviews();
          submitBtn.disabled = false;
        };
      } catch {
        statusEl.textContent = "Impossible de verifier ton eligibility pour le moment.";
      }
    });
  </script>
</body>
</html>
