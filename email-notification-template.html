<!doctype html>
<html lang="fr">
</head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification MMCP</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #d8ff97;
      font-family: 'Poppins', Arial, Helvetica, sans-serif;
      color: #ff8fb1;
    }
    .wrapper {
      width: 100%;
      table-layout: fixed;
      padding: 24px 12px;
    }
    .content {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(216,255,151,0.08);
    }
    .header {
      background: #ff8fb1;
      color: #d8ff97;
      padding: 22px 24px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .content-text {
      padding: 24px;
      font-size: 16px;
      line-height: 1.7;
      color: #868686;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #ff8fb1;
      color: #d8ff97 !important;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
      margin-top: 18px;
      border: 2px solid #e780aa;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #e780aa;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="content">
      <div class="header">Morgann Music CP</div>
      <div class="content-text">
        <p style="font-size:22px;line-height:1.3;font-weight:700;margin:0 0 12px; color:#ff8fb1;">Tu as reçu une notification</p>
        <p style="margin:0 0 20px;">Il y a une notif sur ton dashboard artiste.</p>
        <a href="https://mm-cp.uk/dash/" target="_blank" rel="noopener noreferrer" class="btn">Voir la notification</a>
      </div>
    </div>
  </div>
</body>
</html>
