<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Play — Morgann Music CP</title>
    <meta name="google-site-verification" content="code">
    <meta name="facebook-domain-verification" content="code">
    <meta name="msvalidate.01" content="code">
    <link rel="canonical" href="https://mm-cp.uk/play/index.html">
    <!-- Progressive Web App (PWA) -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Morgann Music CP">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/img/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/img/android-chrome-512x512.png">
    <meta name="msapplication-TileColor" content="#7494ec">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js');
        });
      }
    </script>
    <!-- Twitter Card meta -->
    <meta name="twitter:card" content="summary_large_image">

    <meta name="twitter:title" content="Play — Morgann Music CP">
    <meta name="twitter:description" content="Écoutez, explorez et partagez la musique de Morgann Music CP.">
    <meta name="twitter:image" content="https://mm-cp.uk/assets/img/1.png">

    <!-- Open Graph / Facebook / LinkedIn / Instagram -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Play — Morgann Music CP">
    <meta property="og:description" content="Écoutez, explorez et partagez la musique de Morgann Music CP.">
    <meta property="og:image" content="https://mm-cp.uk/assets/img/1.png">
    <meta property="og:url" content="https://mm-cp.uk/play/index.html">
  <style>
    :root { --bg:#e2e2e2; --txt:#000; --bg2:#fff; --cover:#bfbfbf; --stroke:rgba(0,0,0,.12); --muted:rgba(0,0,0,.6); }
    @media (prefers-color-scheme: dark){ :root{ --bg:#414141; --txt:#fff; --bg2:#1e1e1e; --cover:#575757; --stroke:rgba(255,255,255,.14); --muted:rgba(255,255,255,.65);} }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:Helvetica,Arial,sans-serif; background:var(--bg); color:var(--txt); }
    .wrap{ max-width:1200px; margin:0 auto; padding:22px; }
    .title{ font-size:32px; font-weight:900; margin:12px 0 6px; }
    .sub{ color:var(--muted); margin-bottom:14px; }
    .toolbar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .search{ width:min(460px,100%); border:1px solid var(--stroke); border-radius:999px; padding:10px 14px; background:transparent; color:var(--txt); }
    .links{ display:flex; gap:8px; flex-wrap:wrap; }
    .btn{ display:inline-flex; align-items:center; justify-content:center; gap:6px; text-decoration:none; border-radius:999px; border:1px solid var(--stroke); color:var(--txt); padding:9px 14px; font-weight:700; background:rgba(0,0,0,.04); }
    @media (prefers-color-scheme: dark){ .btn{ background:rgba(255,255,255,.06); } }
    .card{ background:rgba(255,255,255,.62); border:1px solid var(--stroke); border-radius:22px; padding:14px; -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); }
    @media (prefers-color-scheme: dark){ .card{ background:rgba(30,30,30,.62); } }
    .sectionTitle{ font-size:14px; color:var(--muted); font-weight:800; margin-bottom:10px; }
    .artists{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
    .artistCard{ border:1px solid var(--stroke); border-radius:16px; overflow:hidden; text-decoration:none; color:inherit; background:rgba(0,0,0,.03); }
    @media (prefers-color-scheme: dark){ .artistCard{ background:rgba(255,255,255,.05);} }
    .media{ width:100%; aspect-ratio:1/1; object-fit:cover; display:block; background:var(--cover); }
    .artistBody{ padding:10px; }
    .artistName{ font-size:15px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .artistMeta{ font-size:12px; color:var(--muted); margin-top:3px; }
    .player{ margin-top:16px; display:grid; gap:12px; }
    .trackList{ display:grid; gap:8px; max-height:360px; overflow:auto; padding-right:2px; }
    .track{ border:1px solid var(--stroke); border-radius:12px; padding:10px; background:rgba(0,0,0,.03); cursor:pointer; }
    @media (prefers-color-scheme: dark){ .track{ background:rgba(255,255,255,.04);} }
    .track.active{ outline:2px solid rgba(59,130,246,.65); }
    .trackTitle{ font-weight:800; font-size:14px; }
    .trackMeta{ font-size:12px; color:var(--muted); margin-top:2px; }
    .controls{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .icon{ border:1px solid var(--stroke); border-radius:999px; padding:9px 12px; background:transparent; color:var(--txt); font-weight:800; cursor:pointer; }
    .timeline{ display:flex; gap:8px; align-items:center; }
    .timeline input{ width:100%; }
    .muted{ color:var(--muted); font-size:12px; }
    .empty{ border:1px dashed var(--stroke); border-radius:14px; padding:12px; color:var(--muted); }
    @media (max-width:720px){ .title{font-size:24px;} }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="title">Play</h1>
    <p class="sub" id="statsLine">Chargement du catalogue…</p>

    <div class="toolbar">
      <input id="searchInput" class="search" placeholder="Rechercher artiste, piste ou sortie" />
      <div class="links">
        <a class="btn" id="backLink" href="/index.html">← Accueil</a>
        <a class="btn" href="/dash/sorties.html">Sorties</a>
      </div>
    </div>

    <section class="card">
      <div class="sectionTitle">Artistes (date passée + validé MMCP)</div>
      <div id="artistsGrid" class="artists"></div>
      <div id="artistsEmpty" class="empty" style="display:none; margin-top:8px;">Aucun artiste éligible.</div>
    </section>

    <section class="card player">
      <div class="sectionTitle">Lecture rapide</div>
      <div class="controls">
        <button id="prevBtn" class="icon" type="button">⏮</button>
        <button id="playBtn" class="icon" type="button">▶</button>
        <button id="nextBtn" class="icon" type="button">⏭</button>
        <span id="queueInfo" class="muted">0 piste</span>
      </div>
      <div class="timeline">
        <span id="currentTime" class="muted">0:00</span>
        <input id="progress" type="range" min="0" max="100" value="0" />
        <span id="duration" class="muted">0:00</span>
      </div>
      <div id="nowPlaying" class="muted">Aucune lecture</div>
      <div id="tracksList" class="trackList"></div>
      <div id="tracksEmpty" class="empty" style="display:none;">Aucune piste éligible.</div>
      <audio id="audio"></audio>
    </section>
  </main>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
      authDomain: "morgann-music-cp.firebaseapp.com",
      projectId: "morgann-music-cp",
      storageBucket: "morgann-music-cp.firebasestorage.app",
      messagingSenderId: "666812685196",
      appId: "1:666812685196:web:fe3df6749ae768d68494a9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const $ = (id) => document.getElementById(id);
    const artistsGrid = $("artistsGrid");
    const artistsEmpty = $("artistsEmpty");
    const tracksList = $("tracksList");
    const tracksEmpty = $("tracksEmpty");
    const searchInput = $("searchInput");
    const backLink = $("backLink");
    const statsLine = $("statsLine");
    const queueInfo = $("queueInfo");
    const nowPlaying = $("nowPlaying");

    const audioEl = $("audio");
    const playBtn = $("playBtn");
    const prevBtn = $("prevBtn");
    const nextBtn = $("nextBtn");
    const progressEl = $("progress");
    const currentTimeEl = $("currentTime");
    const durationEl = $("duration");

    let releases = [];
    let artistCards = [];
    let queue = [];
    let filteredQueue = [];
    let currentIndex = -1;
    let currentTrackId = null;
    let ownedArtistsMap = {};
    let artistMediaObserver = null;

    function clean(v){ return String(v || "").trim(); }

    function parseAnyDateMs(raw){
      if (!raw) return null;
      if (typeof raw?.toMillis === "function") return raw.toMillis();
      if (typeof raw?.toDate === "function") return raw.toDate().getTime();
      if (raw instanceof Date) return raw.getTime();
      if (typeof raw === "number" && Number.isFinite(raw)) return raw;
      const txt = clean(raw);
      if (!txt) return null;
      if (/^\d{4}-\d{2}-\d{2}$/.test(txt)) {
        const d = new Date(`${txt}T00:00:00`);
        return Number.isNaN(d.getTime()) ? null : d.getTime();
      }
      const d = new Date(txt);
      return Number.isNaN(d.getTime()) ? null : d.getTime();
    }

    function parseReleaseDateMs(release){
      return parseAnyDateMs(
        release?.schedule?.releaseDate ||
        release?.releaseDate ||
        release?.releaseAt ||
        null
      );
    }

    function isReleaseValidatedByMMCP(release){
      const code = Number(clean(release?.statusCode || ""));
      if (Number.isFinite(code) && code >= 2) return true;
      const all = [
        clean(release?.statusUser),
        clean(release?.statusAdmin),
        clean(release?.statusPlatform),
        clean(release?.status)
      ].join(" ").toLowerCase();
      return (
        all.includes("valid") ||
        all.includes("livr") ||
        all.includes("en ligne") ||
        all.includes("published")
      );
    }

    function isPlayableRelease(release){
      const releaseMs = parseReleaseDateMs(release);
      return !!releaseMs && releaseMs <= Date.now() && isReleaseValidatedByMMCP(release);
    }

    function getTrackAudioUrl(track){
      return clean(
        track?.files?.audioUrl ||
        track?.audioUrl ||
        track?.fileUrl ||
        track?.url ||
        null
      );
    }

    function formatTime(sec){
      if (!Number.isFinite(sec)) return "0:00";
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function choosePriorityMedia(release, artistProfileUrl=null){
      const motion = clean(release?.assets?.appleMotion?.oneOneUrl);
      const cover = clean(release?.assets?.coverUrl);
      return { motionUrl: motion || null, coverUrl: artistProfileUrl || cover || null };
    }

    function setupArtistMediaObserver(){
      if (artistMediaObserver) {
        artistMediaObserver.disconnect();
      }

      artistMediaObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          const video = entry.target;
          if (!(video instanceof HTMLVideoElement)) return;

          if (entry.isIntersecting) {
            if (!video.src && video.dataset.src) {
              video.src = video.dataset.src;
              video.load();
            }
            const p = video.play();
            if (p && typeof p.catch === "function") p.catch(() => {});
          } else {
            video.pause();
          }
        });
      }, { rootMargin: "200px 0px", threshold: 0.01 });

      document.querySelectorAll(".artistCard video.media[data-src]").forEach((video) => {
        artistMediaObserver.observe(video);
      });
    }

    function appendArtistCard(a){
      const link = document.createElement("a");
      link.className = "artistCard";
      link.href = `/play/artiste.html?artistId=${encodeURIComponent(a.artistId)}&name=${encodeURIComponent(a.artistName)}`;

      link.innerHTML = `
        ${a.motionUrl
          ? `<video class="media" ${a.coverUrl ? `poster="${a.coverUrl}"` : ""} data-src="${a.motionUrl}" muted loop playsinline preload="none"></video>`
          : `<img class="media" src="${a.coverUrl || ""}" alt="${a.artistName}" loading="lazy" decoding="async" />`
        }
        <div class="artistBody">
          <div class="artistName">${a.artistName}</div>
          <div class="artistMeta">${a.count} sortie${a.count > 1 ? "s" : ""} éligible${a.count > 1 ? "s" : ""}</div>
        </div>
      `;
      artistsGrid.appendChild(link);
    }

    function renderArtists(){
      artistsGrid.innerHTML = "";
      if (!artistCards.length){
        artistsEmpty.style.display = "block";
        return;
      }
      artistsEmpty.style.display = "none";

      const firstBatch = Math.min(24, artistCards.length);
      for (let i = 0; i < firstBatch; i += 1) appendArtistCard(artistCards[i]);
      setupArtistMediaObserver();

      if (artistCards.length > firstBatch) {
        const schedule = window.requestIdleCallback
          ? (cb) => window.requestIdleCallback(cb, { timeout: 500 })
          : (cb) => setTimeout(cb, 0);

        schedule(() => {
          for (let i = firstBatch; i < artistCards.length; i += 1) appendArtistCard(artistCards[i]);
          setupArtistMediaObserver();
        });
      }
    }

    function renderTracks(){
      tracksList.innerHTML = "";
      if (!filteredQueue.length){
        tracksEmpty.style.display = "block";
        queueInfo.textContent = "0 piste";
        return;
      }
      tracksEmpty.style.display = "none";
      queueInfo.textContent = `${filteredQueue.length} piste${filteredQueue.length > 1 ? "s" : ""}`;

      filteredQueue.forEach((track, i) => {
        const row = document.createElement("div");
        row.className = "track" + (i === currentIndex ? " active" : "");
        row.innerHTML = `
          <div class="trackTitle">${track.title}</div>
          <div class="trackMeta">${track.artistName} • ${track.releaseTitle}</div>
          <div class="trackMeta">Sortie: ${track.releaseDate || "—"}</div>
        `;
        row.addEventListener("click", () => playAt(i));
        tracksList.appendChild(row);
      });
    }

    function setNow(){
      const t = filteredQueue[currentIndex];
      if (!t){
        nowPlaying.textContent = "Aucune lecture";
        return;
      }
      nowPlaying.textContent = `Lecture: ${t.title} — ${t.artistName}`;
    }

    async function playAt(index){
      if (index < 0 || index >= filteredQueue.length) return;
      currentIndex = index;
      const t = filteredQueue[currentIndex];
      currentTrackId = t.id;
      audioEl.src = t.audioUrl;
      try { await audioEl.play(); } catch {}
      playBtn.textContent = audioEl.paused ? "▶" : "⏸";
      setNow();
      renderTracks();
    }

    function playNext(){ if (filteredQueue.length) playAt((currentIndex + 1) % filteredQueue.length); }
    function playPrev(){ if (filteredQueue.length) playAt((currentIndex - 1 + filteredQueue.length) % filteredQueue.length); }

    function applySearch(){
      const previousTrackId = currentTrackId;
      const q = clean(searchInput.value).toLowerCase();
      if (!q){
        filteredQueue = [...queue];
      } else {
        filteredQueue = queue.filter(t => (
          clean(t.title).toLowerCase().includes(q) ||
          clean(t.artistName).toLowerCase().includes(q) ||
          clean(t.releaseTitle).toLowerCase().includes(q)
        ));
      }
      const nextIndex = filteredQueue.findIndex(t => t.id === previousTrackId);
      if (nextIndex >= 0) {
        currentIndex = nextIndex;
      } else {
        currentIndex = -1;
        currentTrackId = null;
        audioEl.pause();
        audioEl.src = "";
      }
      setNow();
      renderTracks();
      playBtn.textContent = "▶";
    }

    async function loadArtistsCatalog(){
      const map = {};
      try {
        const snap = await getDocs(query(collection(db, "artists"), limit(800)));
        snap.forEach((d) => {
          const data = d.data() || {};
          map[d.id] = {
            name: clean(data.name),
            playProfileImageUrl: clean(data.playProfileImageUrl)
          };
        });
      } catch {}
      return map;
    }

    async function loadOwnedArtists(uid){
      const ids = [];
      const map = {};
      try {
        const snap = await getDocs(query(collection(db, "artists"), where("ownerUid", "==", uid), limit(500)));
        snap.forEach((d) => {
          ids.push(d.id);
          const data = d.data() || {};
          map[d.id] = {
            name: clean(data.name),
            playProfileImageUrl: clean(data.playProfileImageUrl)
          };
        });
      } catch {}
      return { ids, map };
    }

    async function loadReleases(){
      const out = [];
      try {
        const s = await getDocs(query(collection(db, "releases"), limit(1200)));
        s.forEach(d => out.push({ id: d.id, ...d.data() }));
      } catch {}
      return out;
    }

    async function loadReleasesForOwner(uid, artistIds, userEmail){
      const out = [];

      const baseJobs = [
        getDocs(query(collection(db, "releases"), where("ownerUid", "==", uid), limit(600)))
      ];
      if (userEmail) {
        baseJobs.push(getDocs(query(collection(db, "releases"), where("ownerEmail", "==", userEmail), limit(600))));
      }

      const baseResults = await Promise.allSettled(baseJobs);
      baseResults.forEach((res) => {
        if (res.status !== "fulfilled") return;
        res.value.forEach((d) => out.push({ id: d.id, ...d.data() }));
      });

      for (let i = 0; i < artistIds.length; i += 10){
        const chunk = artistIds.slice(i, i + 10);
        const [byArtist, byMain] = await Promise.allSettled([
          getDocs(query(collection(db, "releases"), where("artistId", "in", chunk), limit(600))),
          getDocs(query(collection(db, "releases"), where("mainArtistId", "in", chunk), limit(600)))
        ]);

        if (byArtist.status === "fulfilled") {
          byArtist.value.forEach((d) => out.push({ id: d.id, ...d.data() }));
        }
        if (byMain.status === "fulfilled") {
          byMain.value.forEach((d) => out.push({ id: d.id, ...d.data() }));
        }
      }

      const unique = {};
      out.forEach((r) => { unique[r.id] = r; });
      return Object.values(unique);
    }

    function buildData(){
      const byArtist = {};
      const tracks = [];
      let excludedStatus = 0;
      let excludedDate = 0;
      let excludedNoAudio = 0;
      let excludedHidden = 0;
      const nowMs = Date.now();

      releases.forEach(release => {
        if (release?.play?.hiddenByArtist === true || release?.play?.hidden === true) {
          excludedHidden += 1;
          return;
        }
        if (!isReleaseValidatedByMMCP(release)) { excludedStatus += 1; return; }
        const releaseMs = parseReleaseDateMs(release);
        if (!releaseMs || releaseMs > nowMs) { excludedDate += 1; return; }

        const artistId = clean(release.artistId || release.mainArtistId || release.artistName || "unknown");
        const artistName = clean(release.artistName || release.artist || "Artiste");
        const artistProfileUrl = clean(ownedArtistsMap[artistId]?.playProfileImageUrl);
        const media = choosePriorityMedia(release, artistProfileUrl || null);

        if (!byArtist[artistId]) {
          byArtist[artistId] = { artistId, artistName, count: 0, motionUrl: media.motionUrl, coverUrl: media.coverUrl };
        }
        byArtist[artistId].count += 1;
        if (!byArtist[artistId].motionUrl && media.motionUrl) byArtist[artistId].motionUrl = media.motionUrl;
        if (!byArtist[artistId].coverUrl && media.coverUrl) byArtist[artistId].coverUrl = media.coverUrl;

        (Array.isArray(release.tracks) ? release.tracks : []).forEach((track, idx) => {
          const audioUrl = getTrackAudioUrl(track);
          if (!audioUrl) { excludedNoAudio += 1; return; }
          tracks.push({
            id: `${release.id}_${idx + 1}`,
            title: clean(track.title) || `Piste ${idx + 1}`,
            artistName,
            releaseTitle: clean(release.title),
            releaseDate: clean(release?.schedule?.releaseDate || release.releaseDate),
            audioUrl
          });
        });
      });

      artistCards = Object.values(byArtist).sort((a,b) => a.artistName.localeCompare(b.artistName, "fr"));
      queue = tracks;
      filteredQueue = [...tracks];
      return { excludedStatus, excludedDate, excludedNoAudio, excludedHidden };
    }

    async function bootPlay(user){
      try {
        if (user) {
          const owned = await loadOwnedArtists(user.uid);
          ownedArtistsMap = owned.map || {};
          releases = await loadReleasesForOwner(user.uid, owned.ids || [], clean(user.email));
        } else {
          const [artistsMap, releasesList] = await Promise.all([
            loadArtistsCatalog(),
            loadReleases()
          ]);
          ownedArtistsMap = artistsMap;
          releases = releasesList;
        }

        const debug = buildData();

        renderArtists();
        renderTracks();
        statsLine.textContent = `${artistCards.length} artiste${artistCards.length > 1 ? "s" : ""} • ${queue.length} piste${queue.length > 1 ? "s" : ""} (hors play: statut ${debug.excludedStatus}, date ${debug.excludedDate}, audio ${debug.excludedNoAudio}, masquée ${debug.excludedHidden})`;

        if (!artistCards.length && !queue.length && !user) {
          statsLine.textContent = "Bibliothèque publique vide ou restreinte. Connecte-toi pour voir tes sorties.";
        }
      } catch (e) {
        console.error(e);
        artistCards = [];
        queue = [];
        filteredQueue = [];
        renderArtists();
        renderTracks();
        statsLine.textContent = "Erreur de chargement";
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (backLink) {
        if (user) {
          backLink.href = "/dash/index.html";
          backLink.textContent = "← Dashboard";
        } else {
          backLink.href = "/index.html";
          backLink.textContent = "← Accueil";
        }
      }
      await bootPlay(user || null);
    });

    searchInput.addEventListener("input", applySearch);
    playBtn.addEventListener("click", async () => {
      if (!filteredQueue.length) return;
      if (currentIndex < 0) { await playAt(0); return; }
      if (audioEl.paused) { try { await audioEl.play(); } catch {} }
      else audioEl.pause();
      playBtn.textContent = audioEl.paused ? "▶" : "⏸";
    });
    prevBtn.addEventListener("click", playPrev);
    nextBtn.addEventListener("click", playNext);
    audioEl.addEventListener("ended", playNext);
    audioEl.addEventListener("timeupdate", () => {
      const cur = audioEl.currentTime || 0;
      const dur = audioEl.duration || 0;
      currentTimeEl.textContent = formatTime(cur);
      durationEl.textContent = formatTime(dur);
      progressEl.value = dur > 0 ? Math.round((cur / dur) * 100) : 0;
    });
    progressEl.addEventListener("input", () => {
      const dur = audioEl.duration || 0;
      if (!dur) return;
      audioEl.currentTime = (Number(progressEl.value) / 100) * dur;
    });
  </script>
</body>
</html>
