<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Play — Artiste</title>
    <meta name="google-site-verification" content="code">
    <meta name="facebook-domain-verification" content="code">
    <meta name="msvalidate.01" content="code">
    <link rel="canonical" href="https://mm-cp.uk/play/artiste.html">
    <!-- Progressive Web App (PWA) -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Morgann Music CP">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/img/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/img/android-chrome-512x512.png">
    <meta name="msapplication-TileColor" content="#7494ec">
    <meta name="msapplication-TileImage" content="/assets/img/android-chrome-192x192.png">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js');
        });
      }
    </script>
    <!-- Twitter Card meta -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@Morgann_Music">
    <meta name="twitter:title" content="Play — Artiste">
    <meta name="twitter:description" content="Découvre les artistes Morgann Music CP et écoute leurs titres.">
    <meta name="twitter:image" content="https://mm-cp.uk/assets/img/1.png">

    <!-- Open Graph / Facebook / LinkedIn / Instagram -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Play — Artiste">
    <meta property="og:description" content="Découvre les artistes Morgann Music CP et écoute leurs titres.">
    <meta property="og:image" content="https://mm-cp.uk/assets/img/1.png">
    <meta property="og:url" content="https://mm-cp.uk/play/artiste.html">
  <style>
    :root { --bg:#e2e2e2; --txt:#000; --bg2:#fff; --cover:#bfbfbf; --stroke:rgba(0,0,0,.12); --muted:rgba(0,0,0,.6); }
    @media (prefers-color-scheme: dark){ :root{ --bg:#414141; --txt:#fff; --bg2:#1e1e1e; --cover:#575757; --stroke:rgba(255,255,255,.14); --muted:rgba(255,255,255,.65);} }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:Helvetica,Arial,sans-serif; background:var(--bg); color:var(--txt); }
    .wrap{ max-width:1100px; margin:0 auto; padding:22px; }
    .top{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
    .title{ font-size:30px; font-weight:900; margin:10px 0 4px; }
    .sub{ color:var(--muted); margin-bottom:12px; }
    .btn{ text-decoration:none; border:1px solid var(--stroke); border-radius:999px; padding:9px 14px; color:var(--txt); font-weight:700; background:rgba(0,0,0,.04); }
    @media (prefers-color-scheme: dark){ .btn{ background:rgba(255,255,255,.06); } }
    .artistHero{ position:relative; overflow:hidden; border:1px solid var(--stroke); border-radius:24px; min-height:280px; margin:4px 0 18px; background:linear-gradient(135deg, rgba(0,0,0,.35), rgba(0,0,0,.65)), center/cover no-repeat; }
    .artistHero::after{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.72)); }
    .artistHeroInner{ position:relative; z-index:1; min-height:280px; display:flex; align-items:flex-end; gap:18px; padding:24px; color:#fff; }
    .artistAvatar{ width:140px; height:140px; border-radius:28px; object-fit:cover; border:1px solid rgba(255,255,255,.26); background:rgba(255,255,255,.12); }
    .artistIntro{ max-width:720px; }
    .artistEyebrow{ display:inline-block; margin-bottom:8px; font-size:11px; font-weight:800; letter-spacing:.2em; text-transform:uppercase; opacity:.72; }
    .artistBio{ margin-top:10px; font-size:14px; line-height:1.6; color:rgba(255,255,255,.88); white-space:pre-wrap; }
    .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
    .card{ background:rgba(255,255,255,.62); border:1px solid var(--stroke); border-radius:18px; overflow:hidden; }
    @media (prefers-color-scheme: dark){ .card{ background:rgba(30,30,30,.62); } }
    .media{ width:100%; aspect-ratio:1/1; object-fit:cover; display:block; background:var(--cover); }
    .body{ padding:10px; }
    .release{ font-size:14px; font-weight:900; }
    .meta{ font-size:12px; color:var(--muted); margin-top:3px; }
    .list{ margin-top:7px; display:grid; gap:6px; }
    .track{ border:1px solid var(--stroke); border-radius:10px; padding:7px 9px; font-size:12px; }
    .card-link{ display:block; color:inherit; text-decoration:none; }
    .empty{ border:1px dashed var(--stroke); border-radius:12px; padding:12px; color:var(--muted); }
    .manager{ margin:10px 0 14px; border:1px solid var(--stroke); border-radius:14px; padding:12px; background:rgba(0,0,0,.03); }
    @media (prefers-color-scheme: dark){ .manager{ background:rgba(255,255,255,.05); } }
    .manager h3{ font-size:14px; margin-bottom:8px; }
    .field{ margin-bottom:8px; }
    .input{ width:100%; padding:10px; border-radius:10px; border:1px solid var(--stroke); background:transparent; color:var(--txt); }
    textarea.input{ min-height:130px; resize:vertical; }
    .line{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .info{ font-size:12px; color:var(--muted); }
    .hiddenTag{ margin-top:6px; display:inline-block; font-size:11px; padding:4px 8px; border-radius:999px; border:1px solid var(--stroke); }
    @media (max-width:700px){
      .artistHeroInner{ align-items:center; text-align:center; flex-direction:column; }
      .artistAvatar{ width:112px; height:112px; border-radius:22px; }
      .artistIntro{ max-width:none; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section id="artistHero" class="artistHero">
      <div class="artistHeroInner">
        <img id="artistAvatar" class="artistAvatar" src="/assets/img/1.png" alt="Artiste" />
        <div class="artistIntro">
          <span class="artistEyebrow">Play artiste</span>
          <h1 class="title" id="artistTitle">Artiste</h1>
          <p class="sub" id="countLine">Chargement…</p>
          <p id="artistBio" class="artistBio">Découvre les sorties de cet artiste sur Play.</p>
        </div>
      </div>
    </section>

    <div class="top">
      <div>
        <div class="info">Page publique artiste</div>
      </div>
      <a class="btn" href="/play/index.html">← Retour Play</a>
    </div>

    <section id="manageCard" class="manager" style="display:none;">
      <h3>Gestion page Play artiste</h3>
      <div class="field">
        <label class="info" for="artistPhotoInput">Photo de profil</label>
        <input id="artistPhotoInput" class="input" type="file" accept="image/*" />
      </div>
      <div class="field">
        <label class="info" for="artistBannerInput">Bannière</label>
        <input id="artistBannerInput" class="input" type="file" accept="image/*" />
      </div>
      <div class="field">
        <label class="info" for="artistBioInput">Biographie</label>
        <textarea id="artistBioInput" class="input" placeholder="Présente l'artiste, son univers, ses sorties..." maxlength="2500"></textarea>
      </div>
      <div class="line">
        <button id="saveArtistPageBtn" class="btn" type="button">Enregistrer la page artiste</button>
        <span class="info" id="managerMsg">Tu peux aussi masquer/afficher les sorties ci-dessous.</span>
      </div>
    </section>

    <div id="releasesGrid" class="grid"></div>
    <div id="emptyState" class="empty" style="display:none; margin-top:8px;">Aucune sortie éligible pour cet artiste.</div>
  </main>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, where, limit, doc, getDoc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-storage.js";
    import { firebaseConfig, clean, isReleasePublic, normalizeReleaseData, sortReleasesByDate } from "/assets/js/public-release-data.js";

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const $ = (id) => document.getElementById(id);
    const releasesGrid = $("releasesGrid");
    const emptyState = $("emptyState");
    const artistHero = $("artistHero");
    const artistAvatar = $("artistAvatar");
    const artistTitle = $("artistTitle");
    const artistBio = $("artistBio");
    const countLine = $("countLine");
    const manageCard = $("manageCard");
    const saveArtistPageBtn = $("saveArtistPageBtn");
    const artistPhotoInput = $("artistPhotoInput");
    const artistBannerInput = $("artistBannerInput");
    const artistBioInput = $("artistBioInput");
    const managerMsg = $("managerMsg");

    const params = new URLSearchParams(window.location.search);
    const targetArtistId = clean(params.get("id") || params.get("artistId"));
    const targetName = clean(params.get("name"));
    let canManageArtist = false;
    let currentUser = null;
    let currentArtistData = null;
    let currentArtistOwnerUid = "";
    let currentReleases = [];
    function choosePriorityMedia(release){
      const motion = clean(release?.assets?.appleMotion?.oneOneUrl);
      const cover = clean(release?.assets?.coverUrl);
      return { motionUrl: motion || null, coverUrl: cover || null };
    }

    function renderArtistHeader(){
      const artistName = clean(currentArtistData?.displayName || currentArtistData?.name || targetName) || "Artiste";
      const avatar = clean(currentArtistData?.playProfileImageUrl || currentArtistData?.profileImageUrl || currentReleases[0]?.assets?.coverUrl || "/assets/img/1.png");
      const banner = clean(currentArtistData?.playBannerUrl || currentArtistData?.bannerUrl || avatar);
      const bioText = clean(currentArtistData?.playBio || currentArtistData?.biography || currentArtistData?.bio) || "Découvre les sorties de cet artiste sur Play.";
      artistTitle.textContent = artistName;
      artistAvatar.src = avatar;
      artistAvatar.alt = artistName;
      artistBio.textContent = bioText;
      artistHero.style.backgroundImage = `linear-gradient(135deg, rgba(0,0,0,.35), rgba(0,0,0,.65)), url('${banner.replace(/'/g, "%27")}')`;
      if (artistBioInput) artistBioInput.value = clean(currentArtistData?.playBio || currentArtistData?.biography || currentArtistData?.bio);
    }

    function render(releases){
      releasesGrid.innerHTML = "";
      if (!releases.length){
        emptyState.style.display = "block";
        return;
      }
      emptyState.style.display = "none";

      sortReleasesByDate(releases).forEach(r => {
        const tracks = Array.isArray(r.tracks) ? r.tracks : [];
        const media = choosePriorityMedia(r);
        const normalized = normalizeReleaseData(r.id, r, currentArtistData);

        const card = document.createElement("article");
        card.className = "card";
        const isHidden = r?.play?.hiddenByArtist === true || r?.play?.hidden === true;
        card.innerHTML = `
          <a class="card-link" href="${normalized.releaseUrl}">
            ${media.motionUrl
              ? `<video class="media" src="${media.motionUrl}" autoplay muted loop playsinline preload="metadata"></video>`
              : `<img class="media" src="${media.coverUrl || normalized.coverUrl}" alt="cover" />`
            }
          </a>
          <div class="body">
            <div class="release">${clean(r.title) || "Sortie"}</div>
            <div class="meta">Sortie: ${clean(r?.schedule?.releaseDate || r.releaseDate) || "—"}</div>
            ${isHidden ? `<span class="hiddenTag">Masquée sur Play</span>` : ``}
            <div class="list">
              ${tracks.map((t, idx) => `<div class="track">${idx + 1}. ${clean(t?.title) || "Piste"}</div>`).join("") || '<div class="track">Aucune piste</div>'}
            </div>
            <div class="line" style="margin-top:8px;">
              <a class="btn" href="${normalized.releaseUrl}">Ouvrir la sortie</a>
            </div>
            ${canManageArtist ? `
              <div class="line" style="margin-top:8px;">
                <label class="info"><input type="checkbox" data-hide="${r.id}" ${isHidden ? "checked" : ""} style="margin-right:6px;">Masquer cette sortie sur Play</label>
              </div>
            ` : ``}
          </div>
        `;

        card.querySelector("[data-hide]")?.addEventListener("change", async (e) => {
          const checked = !!e.target.checked;
          const rid = e.target.getAttribute("data-hide");
          try {
            await updateDoc(doc(db, "releases", rid), {
              "play.hiddenByArtist": checked,
              "play.hiddenByArtistUid": currentUser?.uid || null,
              "play.hiddenByArtistAt": serverTimestamp(),
              updatedAt: serverTimestamp()
            });
            managerMsg.textContent = checked ? "Sortie masquée sur Play." : "Sortie réaffichée sur Play.";
          } catch (err) {
            e.target.checked = !checked;
            managerMsg.textContent = "Erreur: " + (err?.message || String(err));
          }
        });

        releasesGrid.appendChild(card);
      });
    }

    function isPrimaryArtistRelease(release, artistId, artistName) {
      const releaseArtistId = clean(release?.artistId);
      const releaseMainArtistId = clean(release?.mainArtistId);
      const releaseArtistName = clean(release?.artistName);

      if (artistId) {
        if (releaseArtistId) return releaseArtistId === artistId;
        if (releaseMainArtistId) return releaseMainArtistId === artistId;
      }

      if (artistName) {
        return releaseArtistName === artistName;
      }
      return false;
    }

    async function loadReleasesByArtist(artistId, artistName){
      const out = [];

      if (artistId) {
        try {
          const s = await getDocs(query(collection(db, "releases"), where("artistId", "==", artistId), limit(400)));
          s.forEach(d => out.push({ id: d.id, ...d.data() }));
        } catch {}
        try {
          const s2 = await getDocs(query(collection(db, "releases"), where("mainArtistId", "==", artistId), limit(400)));
          s2.forEach(d => out.push({ id: d.id, ...d.data() }));
        } catch {}
      }

      if (artistName){
        try {
          const byName = await getDocs(query(collection(db, "releases"), where("artistName", "==", artistName), limit(400)));
          byName.forEach(d => out.push({ id: d.id, ...d.data() }));
        } catch {}
      }

      const byId = {};
      out.forEach(r => { byId[r.id] = r; });
      return Object.values(byId)
        .filter(isReleasePublic)
        .filter((r) => isPrimaryArtistRelease(r, artistId, artistName));
    }

    async function uploadArtistAsset(ownerUid, kind, file){
      const safeName = String(file?.name || "asset").replace(/[^a-zA-Z0-9._-]+/g, "-");
      const path = `avatars/${ownerUid}/play/${kind}_${Date.now()}_${safeName}`;
      const r = ref(storage, path);
      await uploadBytes(r, file);
      return await getDownloadURL(r);
    }

    async function canCurrentUserManageArtistPage(user, artistId, artistName) {
      if (!user) return false;

      if (clean(currentArtistOwnerUid)) {
        return clean(currentArtistOwnerUid) === clean(user.uid);
      }

      if (artistId) {
        try {
          const byArtistId = await getDocs(query(collection(db, "releases"), where("ownerUid", "==", user.uid), where("artistId", "==", artistId), limit(1)));
          if (!byArtistId.empty) return true;
        } catch (_) {}

        try {
          const byMainArtistId = await getDocs(query(collection(db, "releases"), where("ownerUid", "==", user.uid), where("mainArtistId", "==", artistId), limit(1)));
          if (!byMainArtistId.empty) return true;
        } catch (_) {}
      }

      if (artistName) {
        try {
          const byArtistName = await getDocs(query(collection(db, "releases"), where("ownerUid", "==", user.uid), where("artistName", "==", artistName), limit(1)));
          if (!byArtistName.empty) return true;
        } catch (_) {}
      }

      return false;
    }

    onAuthStateChanged(auth, async (user) => {
      currentUser = user || null;

      artistTitle.textContent = targetName || "Artiste";

      try {
        if (!targetArtistId && !targetName) {
          render([]);
          countLine.textContent = "Artiste introuvable";
          manageCard.style.display = "none";
          return;
        }

        if (targetArtistId) {
          try {
            const artistSnap = await getDoc(doc(db, "artists", targetArtistId));
            if (artistSnap.exists()) {
              const a = artistSnap.data() || {};
              currentArtistData = { id: artistSnap.id, ...a };
              currentArtistOwnerUid = clean(a.ownerUid);
            }
          } catch {}
        }

        canManageArtist = await canCurrentUserManageArtistPage(currentUser, targetArtistId, targetName);
        manageCard.style.display = canManageArtist ? "block" : "none";

        const releases = await loadReleasesByArtist(targetArtistId, targetName);
        const list = releases;
        currentReleases = list;
        renderArtistHeader();
        render(list);
        countLine.textContent = `${list.length} sortie${list.length > 1 ? "s" : ""} éligible${list.length > 1 ? "s" : ""}`;

        saveArtistPageBtn.onclick = async () => {
          if (!canManageArtist) return;
          if (!targetArtistId) {
            managerMsg.textContent = "Impossible d'enregistrer sans identifiant artiste.";
            return;
          }
          const photoFile = artistPhotoInput?.files?.[0] || null;
          const bannerFile = artistBannerInput?.files?.[0] || null;
          const bioValue = clean(artistBioInput?.value);
          if (!photoFile && !bannerFile && bioValue === clean(currentArtistData?.playBio || currentArtistData?.biography || currentArtistData?.bio)) {
            managerMsg.textContent = "Aucune modification à enregistrer.";
            return;
          }
          saveArtistPageBtn.disabled = true;
          managerMsg.textContent = "Upload en cours…";
          try {
            const payload = { updatedAt: serverTimestamp() };
            const ownerUidForUpload = currentArtistOwnerUid || currentUser?.uid || "";
            if (photoFile) {
              payload.playProfileImageUrl = await uploadArtistAsset(ownerUidForUpload, "profile", photoFile);
            }
            if (bannerFile) {
              payload.playBannerUrl = await uploadArtistAsset(ownerUidForUpload, "banner", bannerFile);
            }
            payload.playBio = bioValue;
            if (!clean(currentArtistData?.ownerUid) && currentUser?.uid) {
              payload.ownerUid = currentUser.uid;
            }
            const artistRef = doc(db, "artists", targetArtistId);
            if (currentArtistData) {
              await updateDoc(artistRef, payload);
            } else {
              await setDoc(artistRef, {
                ownerUid: currentUser?.uid || "",
                name: clean(targetName || currentUser?.displayName || "Artiste"),
                displayName: clean(targetName || currentUser?.displayName || "Artiste"),
                createdAt: serverTimestamp(),
                ...payload
              }, { merge: true });
            }
            currentArtistData = { ...(currentArtistData || {}), ...payload, updatedAt: Date.now() };
            currentArtistOwnerUid = clean(currentArtistData?.ownerUid || currentUser?.uid || "");
            renderArtistHeader();
            managerMsg.textContent = "Page artiste enregistrée.";
            if (artistPhotoInput) artistPhotoInput.value = "";
            if (artistBannerInput) artistBannerInput.value = "";
          } catch (err) {
            managerMsg.textContent = "Erreur: " + (err?.message || String(err));
          } finally {
            saveArtistPageBtn.disabled = false;
          }
        };
      } catch (e) {
        console.error(e);
        render([]);
        countLine.textContent = "Erreur de chargement";
      }
    });
  </script>
</body>
</html>
