<head>
    <script>
        // Écoute globale : fonctionne à tous les coups, même en injection dynamique
        document.addEventListener("click", (e) => {
            // Regarde si on a cliqué sur le bouton "+" ou un de ses enfants (.plus-icon)
            const btnMore = e.target.closest("#btn-more");
            const moreWrapper = document.querySelector(".more-dropdown-wrapper");

            if (btnMore && moreWrapper) {
                e.stopPropagation(); // Empêche le clic de fermer immédiatement le menu
                moreWrapper.classList.toggle("open");
                return;
            }

            // Si le menu est ouvert et qu'on clique n'importe où ailleurs, on le ferme
            if (moreWrapper && moreWrapper.classList.contains("open") && !e.target.closest(".more-dropdown-wrapper")) {
                moreWrapper.classList.remove("open");
            }
        });
    </script>
</head>
