<script>
    function toggleDropdown(id) {
        const target = document.getElementById(id);

        const isCurrentlyOpen = window.getComputedStyle(target).display === "block";

        fermerTousLesDropdowns();

        if (!isCurrentlyOpen) {
            target.style.display = "block";
        }
    }

    function fermerTousLesDropdowns() {
        document.querySelectorAll('.nav-dropdown').forEach(dropdown => {
            dropdown.style.display = "none";
        });
    }

    window.addEventListener('click', function (e) {
        if (!e.target.closest('.nav-dropdown-wrapper')) {
            fermerTousLesDropdowns();
        }
    });

    function deconnexionNavbar() {
        if (typeof auth !== 'undefined') {
            auth.signOut().then(() => { window.location.href = "login.html"; });
        } else {
            alert("Action simulée : Déconnexion de l'espace de distribution MM-CP.");
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        const currentPage = window.location.pathname.split("/").pop();

        const navLinks = document.querySelectorAll(".nav-dropdown a");

        navLinks.forEach(link => {
            const linkPage = link.getAttribute("href");

            if (currentPage === linkPage) {
                link.classList.add("active");
            }
        });
    });
</script>
