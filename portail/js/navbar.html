<script>
    function toggleDropdown(id) {
        const target = document.getElementById(id);
        const isCurrentlyOpen = window.getComputedStyle(target).display === "block";

        fermerTousLesDropdowns();

        if (!isCurrentlyOpen) {
            target.style.display = "block";
        }
    }

    function fermerTousLesDropdowns() {
        document.querySelectorAll('.nav-dropdown').forEach(dropdown => {
            dropdown.style.display = "none";
        });
    }

    window.addEventListener('click', function (e) {
        if (!e.target.closest('.nav-dropdown-wrapper')) {
            fermerTousLesDropdowns();
        }
    });

    document.addEventListener("DOMContentLoaded", function () {
        const currentPage = window.location.pathname.split("/").pop();
        const navLinks = document.querySelectorAll(".nav-dropdown a");

        navLinks.forEach(link => {
            const linkPage = link.getAttribute("href");
            if (currentPage === linkPage) {
                link.classList.add("active");
            }
        });
    });
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, query, where, orderBy, limit, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
        authDomain: "morgann-music-cp.firebaseapp.com",
        projectId: "morgann-music-cp",
        storageBucket: "morgann-music-cp.firebasestorage.app",
        messagingSenderId: "666812685196",
        appId: "1:666812685196:web:fe3df6749ae768d68494a9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Déconnexion utilisable globalement
    window.deconnexionNavbar = function () {
        signOut(auth).then(() => {
            window.location.href = "login.html";
        });
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const notifRef = collection(db, "users", user.uid, "notifications");

            // FILTRE : On ne demande QUE les notifications non lues (read == false)
            const q = query(
                notifRef,
                where("read", "==", false),
                orderBy("createdAt", "desc"),
                limit(5)
            );

            onSnapshot(q, (snapshot) => {
                const listContainer = document.getElementById("nav-notif-list");
                const badgeContainer = document.getElementById("nav-notif-badge");

                // Si aucune notification non lue
                if (snapshot.empty) {
                    listContainer.innerHTML = `<div class="notif-item-empty">Aucune nouvelle notification</div>`;
                    badgeContainer.style.display = "none";
                    return;
                }

                listContainer.innerHTML = "";
                let unreadCount = snapshot.size;

                snapshot.forEach((documentSnap) => {
                    const data = documentSnap.data();
                    const notifId = documentSnap.id;

                    const div = document.createElement("div");
                    div.className = "notif-item unread";
                    div.style.cursor = "pointer";
                    div.innerHTML = `
                        <div class="notif-title">${data.titre || 'Notification'}</div>
                        <div class="notif-body">${data.notif || ''}</div>
                    `;

                    // Optionnel : Quand on clique sur une notification, elle passe à "lue"
                    div.onclick = async () => {
                        try {
                            const notifDocRef = doc(db, "users", user.uid, "notifications", notifId);
                            await updateDoc(notifDocRef, { read: true });
                        } catch (err) {
                            console.error("Erreur lors du marquage comme lu :", err);
                        }
                    };

                    listContainer.appendChild(div);
                });

                // Mise à jour du badge avec le nombre de non lues
                badgeContainer.textContent = unreadCount;
                badgeContainer.style.display = "inline-block";

            }, (error) => {
                console.error("Erreur de lecture des notifications :", error);
            });
        }
    });
</script>
