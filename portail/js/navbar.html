<script>
    // 1. GESTION DES AFFICHAGES DES MENUS DÉROULANTS
    function toggleDropdown(id) {
        const target = document.getElementById(id);

        // Correction : On utilise getComputedStyle pour connaître la réalité du CSS
        const isCurrentlyOpen = window.getComputedStyle(target).display === "block";

        // Ferme tous les autres menus ouverts avant d'ouvrir le bon
        fermerTousLesDropdowns();

        // Si le menu était fermé, on l'ouvre
        if (!isCurrentlyOpen) {
            target.style.display = "block";
        }
    }

    function fermerTousLesDropdowns() {
        document.querySelectorAll('.nav-dropdown').forEach(dropdown => {
            dropdown.style.display = "none";
        });
    }

    // Fermeture automatique si on clique en dehors d'un menu
    window.addEventListener('click', function (e) {
        if (!e.target.closest('.nav-dropdown-wrapper')) {
            fermerTousLesDropdowns();
        }
    });

    // 2. DISPATCHER DE DÉCONNEXION FONCTIONNELLE
    function deconnexionNavbar() {
        if (typeof auth !== 'undefined') {
            auth.signOut().then(() => { window.location.href = "login.html"; });
        } else {
            alert("Action simulée : Déconnexion de l'espace de distribution MM-CP.");
        }
    }
</script>
