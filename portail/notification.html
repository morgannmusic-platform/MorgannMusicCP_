<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centre de Notifications - MM-CP</title>
    <link rel="stylesheet" href="js/reponsive.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #ffffff;
            color: #1e293b;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .notif-container {
            max-width: 800px;
            margin: 3rem auto 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .notif-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(189, 189, 189, 0.2);
            padding-bottom: 1rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .notif-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #3e2837;
            margin: 0;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-mark-all {
            background-color: transparent;
            color: #FC8FB0;
            border: 2px solid #FC8FB0;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-mark-all:hover {
            background-color: #FC8FB0;
            color: #ffffff;
        }

        .btn-delete-all {
            background-color: transparent;
            color: #ef4444;
            border: 2px solid #ef4444;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete-all:hover {
            background-color: #ef4444;
            color: #ffffff;
        }

        .notif-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .notif-card {
            background-color: rgba(232, 232, 232, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(189, 189, 189, 0.4);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .notif-card.unread {
            background-color: rgba(252, 143, 176, 0.12);
            border-color: rgba(252, 143, 176, 0.4);
        }

        .notif-content {
            flex: 1;
        }

        .notif-title {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            margin: 0 0 6px 0;
        }

        .notif-body {
            font-size: 14px;
            color: #64748b;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }

        .notif-date {
            font-size: 11px;
            color: #94a3b8;
            margin: 0;
        }

        .notif-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-read {
            background-color: #FC8FB0;
            color: #ffffff;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .btn-read:hover {
            background-color: #d01159;
        }

        .btn-read.is-read {
            background-color: #e2e8f0;
            color: #94a3b8;
            cursor: default;
        }

        .btn-delete {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background-color: #ef4444;
            color: #ffffff;
        }

        .empty-text,
        .loading-text {
            text-align: center;
            color: #64748b;
            font-style: italic;
            margin-top: 2rem;
        }
    </style>
</head>

<body>

    <div id="navbar-container"></div>
    <script type="module" src="js/navbar.js"></script>
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>

    <div class="main-content">

        <div class="notif-container">
            <div class="notif-header">
                <h1>Vos Notifications</h1>
                <div class="header-actions">
                    <button id="btn-mark-all" class="btn-mark-all" style="display: none;">Tout marquer comme lu</button>
                    <button id="btn-delete-all" class="btn-delete-all" style="display: none;">Tout supprimer</button>
                </div>
            </div>

            <div id="notifications-list" class="notif-list">
                <p class="loading-text">Chargement de vos notifications...</p>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
            authDomain: "morgann-music-cp.firebaseapp.com",
            projectId: "morgann-music-cp",
            storageBucket: "morgann-music-cp.firebasestorage.app",
            messagingSenderId: "666812685196",
            appId: "1:666812685196:web:fe3df6749ae768d68494a9",
            measurementId: "G-FKSSXYEZF0"
        };

        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                chargerToutesLesNotifications(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        // Charger et écouter en temps réel l'ensemble des notifications
        function chargerToutesLesNotifications(userId) {
            const notifRef = collection(db, "users", userId, "notifications");
            const q = query(notifRef, orderBy("createdAt", "desc"));

            onSnapshot(q, (snapshot) => {
                const listContainer = document.getElementById("notifications-list");
                const btnMarkAll = document.getElementById("btn-mark-all");
                const btnDeleteAll = document.getElementById("btn-delete-all");

                if (snapshot.empty) {
                    listContainer.innerHTML = `<p class="empty-text">Vous n'avez aucune notification pour le moment.</p>`;
                    btnMarkAll.style.display = "none";
                    btnDeleteAll.style.display = "none";
                    return;
                }

                listContainer.innerHTML = "";
                let countUnread = 0;

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const notifId = docSnap.id;
                    const isUnread = data.read === false || data.read === undefined;

                    if (isUnread) countUnread++;

                    // Formatage de la date
                    let dateStr = "";
                    if (data.createdAt) {
                        const dateObj = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
                        dateStr = dateObj.toLocaleDateString('fr-FR', {
                            day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                        });
                    }

                    const card = document.createElement("div");
                    card.className = `notif-card ${isUnread ? 'unread' : ''}`;
                    card.innerHTML = `
                        <div class="notif-content">
                            <h3 class="notif-title">${data.titre || 'Notification'}</h3>
                            <p class="notif-body">${data.notif || ''}</p>
                            ${dateStr ? `<p class="notif-date">${dateStr}</p>` : ''}
                        </div>
                        <div class="notif-actions">
                            <button class="btn-read ${!isUnread ? 'is-read' : ''}" data-id="${notifId}" ${!isUnread ? 'disabled' : ''}>
                                ${isUnread ? 'Marquer comme lu' : 'Lu'}
                            </button>
                            <button class="btn-delete" data-id="${notifId}" title="Supprimer">
                                🗑️
                            </button>
                        </div>
                    `;

                    listContainer.appendChild(card);
                });

                // Afficher/masquer les boutons globaux
                btnMarkAll.style.display = countUnread > 0 ? "block" : "none";
                btnDeleteAll.style.display = snapshot.size > 0 ? "block" : "none";

                // Événements sur les boutons "Marquer comme lu"
                document.querySelectorAll(".btn-read:not(.is-read)").forEach(button => {
                    button.addEventListener("click", (e) => {
                        const id = e.currentTarget.getAttribute("data-id");
                        marquerNotificationCommeLue(userId, id);
                    });
                });

                // Événements sur les boutons "Supprimer"
                document.querySelectorAll(".btn-delete").forEach(button => {
                    button.addEventListener("click", (e) => {
                        const id = e.currentTarget.getAttribute("data-id");
                        supprimerNotification(userId, id);
                    });
                });

            }, (error) => {
                console.error("Erreur lors de la récupération des notifications :", error);
            });
        }

        // Action de passer une notification à read = true
        async function marquerNotificationCommeLue(userId, notifId) {
            try {
                const notifRef = doc(db, "users", userId, "notifications", notifId);
                await updateDoc(notifRef, { read: true });
            } catch (error) {
                console.error("Erreur lors de la mise à jour de la notification :", error);
            }
        }

        // Action de supprimer une notification individuelle
        async function supprimerNotification(userId, notifId) {
            try {
                const notifRef = doc(db, "users", userId, "notifications", notifId);
                await deleteDoc(notifRef);
            } catch (error) {
                console.error("Erreur lors de la suppression de la notification :", error);
            }
        }

        // Action pour tout marquer comme lu
        document.getElementById("btn-mark-all").addEventListener("click", async () => {
            if (!currentUser) return;

            try {
                const notifRef = collection(db, "users", currentUser.uid, "notifications");
                const snapshot = await getDocs(notifRef);

                const batch = writeBatch(db);
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    if (data.read === false || data.read === undefined) {
                        batch.update(docSnap.ref, { read: true });
                    }
                });

                await batch.commit();
            } catch (error) {
                console.error("Erreur lors de la mise à jour globale :", error);
            }
        });

        // Action pour tout supprimer d'un coup
        document.getElementById("btn-delete-all").addEventListener("click", async () => {
            if (!currentUser) return;

            if (!confirm("Voulez-vous vraiment supprimer toutes vos notifications ?")) return;

            try {
                const notifRef = collection(db, "users", currentUser.uid, "notifications");
                const snapshot = await getDocs(notifRef);

                const batch = writeBatch(db);
                snapshot.forEach((docSnap) => {
                    batch.delete(docSnap.ref);
                });

                await batch.commit();
            } catch (error) {
                console.error("Erreur lors de la suppression globale :", error);
            }
        });
    </script>

</body>

</html>
