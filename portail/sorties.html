<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Gestion des Sorties - MM-CP</title>
    <link rel="stylesheet" href="js/reponsive.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* --- BARRE DE RECHERCHE ET FILTRES --- */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            background-color: rgba(232, 232, 232, 0.349);
            backdrop-filter: blur(62px);
            -webkit-backdrop-filter: blur(62px);
            border: 1px solid rgba(255, 255, 255, 0.575);
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.173);
            border-radius: 50px;
            padding: 15px 20px;
            align-items: center;
            transition: all 0.3s;
        }

        .filter-bar:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 18px rgba(0, 0, 0, 0.24);
        }

        .filter-input,
        .filter-select {
            padding: 10px 16px;
            border: 1px solid rgb(194, 194, 194);
            border-radius: 30px;
            background: rgb(255, 255, 255);
            font-size: 14px;
            outline: none;
            color: #333;
            font-family: inherit;
        }

        .filter-input {
            padding: 10px 16px 10px 42px;
            /* 42px à gauche pour l'icône */
            border: 1px solid rgb(194, 194, 194);
            border-radius: 30px;
            background-color: rgb(255, 255, 255);
            background-image: url('/assets/img/icon/Magnifying-Glass--Streamline-Flex.svg');
            background-repeat: no-repeat;
            background-position: 14px center;
            background-size: 18px 18px;
            font-size: 14px;
            outline: none;
            color: #333;
            font-family: inherit;
            flex: 1;
            min-width: 200px;
        }

        .filter-input:focus,
        .filter-select:focus {
            border-color: #FC8FB0;
        }

        /* ------------------------------------- */

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 18px rgba(0, 0, 0, 0.24);
        }


        .btn-primary {
            background: #FC8FB0;
            color: white;
        }

        .btn-success {
            background: #E8FDC4;
            color: #FC8FB0;
            border: 1px solid #FC8FB0;
            margin-left: 10px;
        }

        .btn-view {
            background: #FC8FB0;
            color: white;
            padding: 6px 12px;
            font-size: 13px;
        }

        .btn-secondary {
            background: #000000;
            color: white;
            padding: 6px 12px;
            font-size: 13px;
        }

        .btn-danger {
            background: #dc3562;
            color: white;
            padding: 6px 12px;
            font-size: 13px;
        }

        /* Grille des sorties */
        .releases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .release-card {
            background-color: rgba(218, 218, 218, 0.226);
            backdrop-filter: blur(62px);
            -webkit-backdrop-filter: blur(62px);
            border: 1px solid rgb(255, 255, 255);
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.173);
            border-radius: 30px;

            padding: 15px;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s;
        }

        .release-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 18px rgba(0, 0, 0, 0.24);
        }


        .cover-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            background: #ddd;
            border-radius: 24px;
            margin-bottom: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .release-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .release-title {
            font-size: 16px;
            font-weight: bold;
            margin: 8px 0 4px 0;
            color: #222;
        }

        .release-artist {
            font-size: 14px;
            color: #666;
            margin: 0 0 12px 0;
        }

        /* Badges de statut */
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
            align-self: center;
        }

        .status-verification-mmcp {
            background: #FC8FB0;
            color: #ffffff;
        }

        .status-verification-plateformes {
            background: #5dabff;
            color: white;
        }

        .status-livree {
            background: #be63ff;
            color: white;
        }

        .status-direct {
            background: #4aed70;
            color: white;
        }

        .status-licence {
            background: #ff933a;
            color: white;
        }

        .status-retrait {
            background: #d7172a;
            color: white;
        }

        .status-retire {
            background: #000000;
            color: white;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: auto;
            flex-wrap: wrap;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .page-btn {
            padding: 8px 14px;
            border: 1px solid #FC8FB0;
            background: white;
            cursor: pointer;
            border-radius: 50px;
            font-weight: bold;
        }

        .page-btn:disabled {
            background: #e8c9d3;
            cursor: not-allowed;
            color: #ffffff;
        }

        .page-btn.active {
            background: #FC8FB0;
            color: white;
        }
    </style>
</head>

<body>
    <div id="navbar-container"></div>
    <script type="module" src="js/navbar.js"></script>
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>

    <div class="main-content">
        <div class="container">
            <div class="header-actions">
                <h2>Mes Sorties</h2>
                <div>
                    <a href="nouvelle.html" class="btn btn-primary">Créer une sortie</a>
                    <button class="btn btn-success" onclick="creerSortieTest()">Créer une sortie test</button>
                </div>
            </div>

            <div class="filter-bar">
                <input type="text" id="search-input" class="filter-input"
                    placeholder="Rechercher par titre ou artiste...">
                <select id="status-filter" class="filter-select">
                    <option value="all">Tous les statuts</option>
                    <option value="verification mmcp">Vérification MMCP</option>
                    <option value="verification plate-formes">Vérification Plate-formes</option>
                    <option value="livrée">Livrée</option>
                    <option value="direct">Direct</option>
                    <option value="licence">Licence</option>
                    <option value="retrait">Retrait</option>
                    <option value="retiré">Retiré</option>
                </select>

                <select id="sort-order" class="filter-select">
                    <option value="desc">Plus récent au plus ancien</option>
                    <option value="asc">Plus ancien au plus récent</option>
                </select>
            </div>

            <div id="releases-list" class="releases-grid"></div>

            <div class="pagination">
                <button id="btn-prev" class="page-btn" onclick="pagePrecedente()">&lt;</button>
                <div id="page-numbers" style="display: flex; gap: 5px;"></div>
                <button id="btn-next" class="page-btn" onclick="pageSuivante()">&gt;</button>
            </div>
        </div>
    </div>

    <img style="display: none; filter: brightness(0);" src="/assets/img/icon/music-edit-multimedia-svgrepo-com.svg"
        alt="">

    <script type="module">
        import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
            authDomain: "morgann-music-cp.firebaseapp.com",
            projectId: "morgann-music-cp",
            storageBucket: "morgann-music-cp.firebasestorage.app",
            messagingSenderId: "666812685196",
            appId: "1:666812685196:web:fe3df6749ae768d68494a9",
            measurementId: "G-FKSSXYEZF0"
        };

        // Vérifie si l'application est déjà initialisée
        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
        const auth = getAuth(app);
        const db = getFirestore(app);

        const PAGE_SIZE = 8;
        let pageActuelle = 1;
        let uidConnecte = null;
        let toutesLesSorties = [];
        let sortiesFiltrees = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                uidConnecte = user.uid;
                await recupererToutesLesSorties();

                // Écouteurs d'événements pour les filtres
                document.getElementById("search-input").addEventListener("input", appliquerFiltresEtTri);
                document.getElementById("status-filter").addEventListener("change", appliquerFiltresEtTri);
                document.getElementById("sort-order").addEventListener("change", appliquerFiltresEtTri);
            } else {
                window.location.href = "login.html";
            }
        });

        const configurationsBadges = {
            "verification mmcp": { texte: "Vérification MMCP", classe: "status-verification-mmcp" },
            "verification plate-formes": { texte: "Vérification Plate-formes", classe: "status-verification-plateformes" },
            "livrée": { texte: "Livrée", classe: "status-livree" },
            "direct": { texte: "Direct", classe: "status-direct" },
            "licence": { texte: "Licence", classe: "status-licence" },
            "retrait": { texte: "Retrait", classe: "status-retrait" },
            "retiré": { texte: "Retiré", classe: "status-retire" }
        };

        // 1. Charge toutes les données une seule fois
        async function recupererToutesLesSorties() {
            const listContainer = document.getElementById("releases-list");
            listContainer.innerHTML = "<p>Chargement des sorties...</p>";

            try {
                const q = query(collection(db, "users", uidConnecte, "releases"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);

                toutesLesSorties = [];
                querySnapshot.forEach((docSnap) => {
                    toutesLesSorties.push({
                        id: docSnap.id,
                        ...docSnap.data()
                    });
                });

                appliquerFiltresEtTri();

            } catch (error) {
                console.error("Erreur initialisation :", error);
                listContainer.innerHTML = `<p style="color:red;">Erreur lors du chargement : ${error.message}</p>`;
            }
        }

        // 2. Filtre et trie dynamiquement les sorties
        function appliquerFiltresEtTri() {
            const recherche = document.getElementById("search-input").value.toLowerCase().trim();
            const filtreStatut = document.getElementById("status-filter").value.toLowerCase();
            const ordreTri = document.getElementById("sort-order").value;

            sortiesFiltrees = toutesLesSorties.filter(sortie => {
                const titre = (sortie.title || "").toLowerCase();
                const artiste = (sortie.artistName || "").toLowerCase();
                const statut = (sortie.status || "verification mmcp").toLowerCase();

                const correspondRecherche = titre.includes(recherche) || artiste.includes(recherche);
                const correspondStatut = (filtreStatut === "all") || (statut === filtreStatut);

                return correspondRecherche && correspondStatut;
            });

            // Application du tri par date de création
            sortiesFiltrees.sort((a, b) => {
                const dateA = new Date(a.createdAt || 0);
                const dateB = new Date(b.createdAt || 0);
                return ordreTri === "asc" ? dateA - dateB : dateB - dateA;
            });

            // Réinitialise la pagination à la page 1 après un filtrage
            afficherPage(1);
        }

        // 3. Affiche uniquement les éléments de la page demandée
        function afficherPage(numeroPage) {
            pageActuelle = numeroPage;
            const listContainer = document.getElementById("releases-list");
            listContainer.innerHTML = "";

            if (sortiesFiltrees.length === 0) {
                listContainer.innerHTML = "<p>Aucune sortie ne correspond à vos critères de recherche.</p>";
                genererNumerosPage(0);
                return;
            }

            const indexDebut = (pageActuelle - 1) * PAGE_SIZE;
            const indexFin = indexDebut + PAGE_SIZE;
            const sortiesPage = sortiesFiltrees.slice(indexDebut, indexFin);

            sortiesPage.forEach((release) => {
                const id = release.id;
                const statutBrut = (release.status || "verification mmcp").toLowerCase();
                const configBadge = configurationsBadges[statutBrut] || { texte: statutBrut, classe: "status-verification-mmcp" };
                const imageSrc = release.coverUrl || "/assets/img/icons/android-chrome-512x512.png";

                const card = document.createElement("div");
                card.className = "release-card";
                card.style.cursor = "pointer";

                card.onclick = function (event) {
                    if (event.target.tagName === 'BUTTON' || event.target.closest('.card-actions')) {
                        return;
                    }
                    window.location.href = `sortie.html?id=${id}`;
                };

                card.innerHTML = `
            <div>
                <div class="cover-wrapper">
                    <img src="${imageSrc}" class="release-cover" alt="Pochette">
                </div>
                <div class="release-title">${release.title || 'Sans titre'}</div>
                <div class="release-artist">${release.artistName || 'Artiste inconnu'}</div>
            </div>
            <div style="display: flex; flex-direction: column;" onclick="event.stopPropagation();">
                <span class="badge ${configBadge.classe}">${configBadge.texte}</span>
                <div class="card-actions">
<button class="btn btn-view" onclick="voirSortie('${id}')" style="display: inline-flex; align-items: center; justify-content: center;">
    <img style="width: 18px; height: 18px; filter: invert(1); margin-right: 6px;" src="/assets/img/icon/music-album-song.svg" alt="icon">
    Voir
</button>

<button class="btn btn-secondary" onclick="modifierSortie('${id}')" style="display: inline-flex; align-items: center; justify-content: center;">
    <img style="width: 18px; height: 18px; filter: invert(1); margin-right: 6px;" src="/assets/img/icon/music-edit-multimedia-svgrepo-com.svg" alt="icon">
    Modifier
</button>

<button class="btn btn-danger" onclick="demanderRetrait('${id}')" ${statutBrut === 'retrait' || statutBrut === 'retiré' ? 'disabled' : ''} style="display: inline-flex; align-items: center; justify-content: center;">
    <img style="width: 18px; height: 18px; filter: brightness(0) invert(1); margin-right: 6px;" src="/assets/img/icon/trash.png" alt="icon">
    Supprimer
</button>                </div>
            </div>
        `;
                listContainer.appendChild(card);
            });

            const totalPages = Math.ceil(sortiesFiltrees.length / PAGE_SIZE);
            genererNumerosPage(totalPages);
        }

        // 4. Construit dynamiquement la liste des numéros
        function genererNumerosPage(totalPages) {
            const container = document.getElementById("page-numbers");
            container.innerHTML = "";

            document.getElementById("btn-prev").disabled = (pageActuelle === 1 || totalPages === 0);
            document.getElementById("btn-next").disabled = (pageActuelle === totalPages || totalPages === 0);

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement("button");
                btn.className = `page-btn ${i === pageActuelle ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => afficherPage(i);
                container.appendChild(btn);
            }
        }

        window.pageSuivante = function () {
            const totalPages = Math.ceil(sortiesFiltrees.length / PAGE_SIZE);
            if (pageActuelle < totalPages) afficherPage(pageActuelle + 1);
        }

        window.pagePrecedente = function () {
            if (pageActuelle > 1) afficherPage(pageActuelle - 1);
        }

        window.voirSortie = function (id) { window.location.href = `sortie.html?id=${id}`; }

        window.modifierSortie = function (id) { window.location.href = `edition.html?sortie=${id}`; }

        window.demanderRetrait = async function (id) {
            if (confirm("Êtes-vous sûr de vouloir demander le retrait de cette sortie ?")) {
                try {
                    const releaseRef = doc(db, "users", uidConnecte, "releases", id);
                    await updateDoc(releaseRef, { status: "retrait" });
                    await recupererToutesLesSorties();
                } catch (error) {
                    alert("Erreur lors du traitement du retrait : " + error.message);
                }
            }
        }

        window.creerSortieTest = async function () {
            if (!uidConnecte) return;

            const fauxTitres = ["Cyber Dreams", "Midnight Coffee", "Summer Vibe", "Echoes of Tomorrow", "Neon Lights"];
            const fauxArtistes = ["Alex Parker", "Luna Cloud", "The Synthesizers", "DJ Shadow", "Emma Stone"];
            const faussesPochettes = [
                "https://picsum.photos/id/10/500/500",
                "https://picsum.photos/id/26/500/500",
                "https://picsum.photos/id/37/500/500"
            ];

            const nouvelleSortieTest = {
                title: fauxTitres[Math.floor(Math.random() * fauxTitres.length)],
                artistName: fauxArtistes[Math.floor(Math.random() * fauxArtistes.length)],
                coverUrl: faussesPochettes[Math.floor(Math.random() * faussesPochettes.length)],
                status: "verification mmcp",
                createdAt: new Date().toISOString()
            };

            try {
                await addDoc(collection(db, "users", uidConnecte, "releases"), nouvelleSortieTest);
                await recupererToutesLesSorties();
            } catch (error) {
                alert("Erreur création test : " + error.message);
            }
        }
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const currentPath = window.location.pathname.split("/").pop();
            const navLinks = document.querySelectorAll(".responsive-nav a");

            navLinks.forEach(link => {
                const linkPath = link.getAttribute("href").split("/").pop();
                if (currentPath === linkPath) {
                    link.classList.add("active");
                } else {
                    link.classList.remove("active");
                }
            });
        });
    </script>
</body>

</html>
