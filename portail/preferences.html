    <title>Morgann Music CP - Distribuez, Structurez, Élevez</title>
    <link rel="stylesheet" href="/assets/css/portail/style.css">
    <link rel="stylesheet" href="/assets/navbars/portail/index.css">
    <link rel="stylesheet" href="/assets/sidebars/portail.index.css">
    <link rel="stylesheet" href="/assets/footers/portail/index.css">
    <script src="/assets/navbars/portail/index.js" defer></script>
    <script src="/assets/sidebars/portail.index.js" defer></script>
    <script src="/assets/footers/portail/index.js" defer></script>
</head>
<div>
   <div id="navbar-portail"></div>
   <div id="sidebar-portail"></div>

<div class="page">
<div id="contenu" data-brand="Préférences Style">
    <section style="padding: 2rem; max-width: 800px;">
        <h1>Personnalisation du Dashboard</h1>
        <p style="margin-bottom: 2rem; color: var(--text-secondary);">Choisissez l'ambiance visuelle de votre portail.</p>

        <div class="theme-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
            <!-- Options -->
            <button class="theme-opt" onclick="window.setPortalTheme('normal-clair')">Normal Clair</button>
            <button class="theme-opt" onclick="window.setPortalTheme('normal-sombre')">Normal Sombre</button>
            <button class="theme-opt" onclick="window.setPortalTheme('normal-auto')">Normal Auto</button>
            <button class="theme-opt" style="background: #fff; color: #FF0055; border: 2px solid #FF0055;" onclick="window.setPortalTheme('blanc-pimp')">Blanc Pimp</button>
            <button class="theme-opt" style="background: #000; color: #00FFCC; border: 2px solid #00FFCC;" onclick="window.setPortalTheme('noir-pimp')">Noir Pimp</button>
            <button class="theme-opt" onclick="window.setPortalTheme('pimp-auto')">Pimp Auto</button>
        </div>
    </section>

    <style>
        .theme-opt {
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
            background: var(--container1);
            color: var(--rose);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .theme-opt:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>

    <script type="module">
        import { ThemeManager } from "/assets/js/theme-manager.js";
        window.setPortalTheme = (t) => {
            ThemeManager.saveTheme(t);
        };
    </script>
</div>
</div>
   <div id="footer-portail"></div>

</body>
</html>
