<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Mes Rapports Financiers - MM-CP</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }

        .layout-table {
            display: table;
            width: 100%;
            border-spacing: 20px 0px;
        }

        .layout-row {
            display: table-row;
        }

        .layout-sidebar-cell {
            display: table-cell;
            width: 260px;
            vertical-align: top;
        }

        .layout-main-cell {
            display: table-cell;
            vertical-align: top;
        }

        .navbar-container {
            margin-bottom: 20px;
        }

        .client-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #f8fafc;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        /* Conteneur de graphique */
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
            margin-bottom: 10px;
        }

        /* Tableau des finances */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th,
        td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th {
            background: #151f32;
            color: #94a3b8;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
        }

        tr:hover {
            background: #24334a;
        }

        .text-green {
            color: #22c55e;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="layout-table">
        <div class="layout-row">

            <div id="sidebar-injector" class="layout-sidebar-cell"></div>

            <div class="layout-main-cell">
                <div id="navbar-injector" class="navbar-container"></div>

                <div class="client-card">
                    <div class="card-title">Évolution de mes Royalties</div>
                    <div class="chart-container">
                        <canvas id="analyticsChart"></canvas>
                    </div>
                </div>

                <div class="client-card">
                    <div class="card-title">Détails des gains par projet</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Période</th>
                                <th>Projet Musical / Sortie</th>
                                <th>Artiste</th>
                                <th>Montant perçu</th>
                            </tr>
                        </thead>
                        <tbody id="client-history-body">
                            <tr>
                                <td colspan="4" style="color: #94a3b8; text-align:center;">Analyse des données
                                    financières en cours...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Ta configuration Firebase identique
        const firebaseConfig = {
            apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
            authDomain: "morgann-music-cp.firebaseapp.com",
            projectId: "morgann-music-cp",
            storageBucket: "morgann-music-cp.firebasestorage.app",
            messagingSenderId: "666812685196",
            appId: "1:666812685196:web:fe3df6749ae768d68494a9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Initialisation globale de l'injection des composants structurels
        async function injecterComposants() {
            try {
                const resSidebar = await fetch('sidebar.html');
                if (resSidebar.ok) document.getElementById('sidebar-injector').innerHTML = await resSidebar.text();
                const resNavbar = await fetch('navbar.html');
                if (resNavbar.ok) document.getElementById('navbar-injector').innerHTML = await resNavbar.text();
            } catch (e) { console.error(e); }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await chargerDonneesFinancieresArtiste(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        async function chargerDonneesFinancieresArtiste(uid) {
            const tbody = document.getElementById("client-history-body");

            try {
                const snap = await getDocs(collection(db, "users", uid, "finances"));
                if (snap.empty) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#94a3b8;">Aucun relevé financier n'a encore été publié pour votre compte.</td></tr>`;
                    genererGraphique({}, []);
                    return;
                }

                tbody.innerHTML = "";
                let donneesMensuelles = {};

                snap.forEach((doc) => {
                    const f = doc.data();

                    // Agrégation des montants par mois pour le graphique
                    const periode = f.period || "Inconnu";
                    donneesMensuelles[periode] = (donneesMensuelles[periode] || 0) + (f.amount || 0);

                    // Remplissage du tableau
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                    <td style="font-weight:600;">${periode}</td>
                    <td>${f.releaseTitle || "Vente directe catalogue"}</td>
                    <td>${f.artistName || "-"}</td>
                    <td class="text-green">+ ${(f.amount || 0).toFixed(2)} €</td>
                `;
                    tbody.appendChild(tr);
                });

                // Préparation des axes pour le graphique
                const moisLabels = Object.keys(donneesMensuelles);
                const valeursGains = Object.values(donneesMensuelles);

                genererGraphique(moisLabels, valeursGains);

            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" style="color:#f43f5e; text-align:center;">Erreur de lecture : ${err.message}</td></tr>`;
            }
        }

        // Fonction de rendu du graphique Chart.js
        function genererGraphique(labels, data) {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Royalties Net (€)',
                        data: data,
                        borderColor: '#38bdf8', // Cyan
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        borderWidth: 3,
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        injecterComposants();
    </script>
</body>

</html>
