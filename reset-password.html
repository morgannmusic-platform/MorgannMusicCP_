<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reinitialisation mot de passe - Morgann Music CP</title>
  <style>
    :root {
      --bg-1: #f8f5ef;
      --bg-2: #e6ecef;
      --card: #ffffff;
      --text: #151515;
      --muted: #64748b;
      --line: #d9e0e6;
      --accent: #0f172a;
      --accent-2: #1d4ed8;
      --danger: #b91c1c;
      --ok: #166534;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(29, 78, 216, 0.09), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(15, 23, 42, 0.08), transparent 50%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(94vw, 520px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.12);
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.45rem;
      letter-spacing: .02em;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .step {
      display: none;
      animation: fadeUp .3s ease;
    }

    .step.is-active { display: block; }

    .input-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      padding: 13px 14px;
      font-size: 0.98rem;
      outline: none;
      transition: border-color .15s ease;
    }

    input:focus {
      border-color: var(--accent-2);
    }

    .password-input {
      padding-right: 54px;
    }

    .toggle-eye {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 10px;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .toggle-eye:hover {
      background: #eef2ff;
    }

    .toggle-eye img {
      width: 20px;
      height: 20px;
      display: block;
      pointer-events: none;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      flex: 1;
      min-width: 190px;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .feedback {
      min-height: 1.2em;
      margin: 6px 0 10px;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--danger);
    }

    .feedback.ok { color: var(--ok); }

    .meta-link {
      margin-top: 14px;
      display: inline-block;
      color: #1e40af;
      text-decoration: none;
      font-weight: 600;
    }

    .meta-link:hover { text-decoration: underline; }

    @media (max-width: 560px) {
      .card { padding: 20px; border-radius: 18px; }
      button { width: 100%; }
      .btn-primary { min-width: 0; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Reinitialiser le mot de passe</h1>
    <p id="introText">Verifie ton code authentificateur puis choisis un nouveau mot de passe.</p>

    <section class="step is-active" id="stepTotp">
      <div class="input-wrap">
        <input type="text" id="totpCode" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="Code authentificateur (6 a 8 chiffres)">
      </div>
      <div id="totpFeedback" class="feedback"></div>
      <div class="actions">
        <button class="btn-primary" id="verifyTotpBtn" type="button">Verifier le code</button>
      </div>
    </section>

    <section class="step" id="stepPassword">
      <div class="input-wrap">
        <input class="password-input" type="password" id="newPassword" autocomplete="new-password" placeholder="Nouveau mot de passe">
        <button type="button" class="toggle-eye" data-toggle-password="newPassword" aria-label="Afficher le mot de passe">
          <img src="/assets/icon/Invisible-1--Streamline-Flex.svg" alt="Afficher">
        </button>
      </div>
      <div class="input-wrap">
        <input class="password-input" type="password" id="confirmPassword" autocomplete="new-password" placeholder="Confirmer le mot de passe">
        <button type="button" class="toggle-eye" data-toggle-password="confirmPassword" aria-label="Afficher le mot de passe">
          <img src="/assets/icon/Invisible-1--Streamline-Flex.svg" alt="Afficher">
        </button>
      </div>
      <div id="passwordFeedback" class="feedback"></div>
      <div class="actions">
        <button class="btn-secondary" id="backBtn" type="button">Retour</button>
        <button class="btn-primary" id="savePasswordBtn" type="button">Enregistrer</button>
      </div>
    </section>

    <a class="meta-link" href="/login.html">Retour a la connexion</a>
  </main>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-functions.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
      authDomain: "morgann-music-cp.firebaseapp.com",
      projectId: "morgann-music-cp",
      storageBucket: "morgann-music-cp.firebasestorage.app",
      messagingSenderId: "666812685196",
      appId: "1:666812685196:web:fe3df6749ae768d68494a9",
      measurementId: "G-FKSSXYEZF0"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const functions = getFunctions(app, "europe-west1");
    const verifyTotp = httpsCallable(functions, "passwordResetVerifyTotpV2");
    const completeReset = httpsCallable(functions, "passwordResetCompleteV2");

    const params = new URLSearchParams(window.location.search);
    const token = String(params.get("token") || "").trim();

    const stepTotp = document.getElementById("stepTotp");
    const stepPassword = document.getElementById("stepPassword");
    const introText = document.getElementById("introText");

    const totpCode = document.getElementById("totpCode");
    const verifyTotpBtn = document.getElementById("verifyTotpBtn");
    const totpFeedback = document.getElementById("totpFeedback");

    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");
    const savePasswordBtn = document.getElementById("savePasswordBtn");
    const backBtn = document.getElementById("backBtn");
    const passwordFeedback = document.getElementById("passwordFeedback");

    let totpValidated = false;

    function setStep(next) {
      stepTotp.classList.toggle("is-active", next === "totp");
      stepPassword.classList.toggle("is-active", next === "password");
      introText.textContent = next === "totp"
        ? "Verifie ton code authentificateur puis choisis un nouveau mot de passe."
        : "Code valide. Renseigne maintenant ton nouveau mot de passe.";
    }

    function setFeedback(node, message, ok = false) {
      node.textContent = message || "";
      node.classList.toggle("ok", !!ok);
    }

    function mapErr(err, fallback) {
      const text = String(err?.message || "").replace(/^functions\/[a-z-]+:\s*/i, "").trim();
      return text || fallback;
    }

    if (!token) {
      setFeedback(totpFeedback, "Lien invalide. Recommence depuis 'mot de passe oublie'.");
      verifyTotpBtn.disabled = true;
    }

    verifyTotpBtn?.addEventListener("click", async () => {
      const code = String(totpCode?.value || "").replace(/\s+/g, "").replace(/[^0-9]/g, "");
      if (!/^\d{6,8}$/.test(code)) {
        setFeedback(totpFeedback, "Entre un code authentificateur valide (6 a 8 chiffres).");
        return;
      }

      verifyTotpBtn.disabled = true;
      verifyTotpBtn.textContent = "Verification...";
      setFeedback(totpFeedback, "");

      try {
        await verifyTotp({ token, totpCode: code });
        totpValidated = true;
        setFeedback(totpFeedback, "Code valide.", true);
        setStep("password");
        setTimeout(() => newPassword?.focus(), 120);
      } catch (err) {
        setFeedback(totpFeedback, mapErr(err, "Code incorrect ou lien expire."));
      } finally {
        verifyTotpBtn.disabled = false;
        verifyTotpBtn.textContent = "Verifier le code";
      }
    });

    backBtn?.addEventListener("click", () => {
      setFeedback(passwordFeedback, "");
      setStep("totp");
      setTimeout(() => totpCode?.focus(), 120);
    });

    savePasswordBtn?.addEventListener("click", async () => {
      if (!totpValidated) {
        setStep("totp");
        setFeedback(totpFeedback, "Valide d'abord le code authentificateur.");
        return;
      }

      const pass1 = String(newPassword?.value || "");
      const pass2 = String(confirmPassword?.value || "");

      if (!pass1 || !pass2) {
        setFeedback(passwordFeedback, "Remplis les deux champs mot de passe.");
        return;
      }
      if (pass1.length < 8) {
        setFeedback(passwordFeedback, "Le mot de passe doit contenir au moins 8 caracteres.");
        return;
      }
      if (pass1 !== pass2) {
        setFeedback(passwordFeedback, "Les mots de passe ne correspondent pas.");
        return;
      }

      savePasswordBtn.disabled = true;
      savePasswordBtn.textContent = "Enregistrement...";
      setFeedback(passwordFeedback, "");

      try {
        await completeReset({ token, newPassword: pass1, confirmPassword: pass2 });
        setFeedback(passwordFeedback, "Mot de passe enregistre. Redirection vers la connexion...", true);
        setTimeout(() => {
          window.location.href = "/login.html";
        }, 1400);
      } catch (err) {
        setFeedback(passwordFeedback, mapErr(err, "Impossible d'enregistrer le mot de passe."));
      } finally {
        savePasswordBtn.disabled = false;
        savePasswordBtn.textContent = "Enregistrer";
      }
    });

    document.querySelectorAll("[data-toggle-password]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const targetId = btn.getAttribute("data-toggle-password");
        const input = targetId ? document.getElementById(targetId) : null;
        const icon = btn.querySelector("img");
        if (!input || !icon) return;

        const reveal = input.getAttribute("type") === "password";
        input.setAttribute("type", reveal ? "text" : "password");
        icon.src = reveal
          ? "/assets/icon/Show-Layer--Streamline-Flex.svg"
          : "/assets/icon/Invisible-1--Streamline-Flex.svg";
        icon.alt = reveal ? "Masquer" : "Afficher";
        btn.setAttribute("aria-label", reveal ? "Masquer le mot de passe" : "Afficher le mot de passe");
      });
    });
  </script>
</body>
</html>
