<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morgann Music Store - Panier</title>
  <link rel="stylesheet" href="/assets/css/shop/shop.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="shop-wrap">
    <section class="shop-hero">
      <header class="shop-head">
        <h1>Morgann Music Store</h1>
        <p class="shop-muted">Valide tes sélections et passe au paiement sécurisé.</p>
      </header>
      <div class="shop-toolbar">
        <small id="status" class="status">Chargement...</small>
        <div class="toolbar-actions">
          <a class="toolbar-link" href="/shop/index.html">Continuer mes achats</a>
        </div>
      </div>
    </section>
    <section id="cartList" class="cart-list"></section>
    <div id="cartSummary" class="cart-summary" style="display:none;">
      <strong id="cartTotal">Total: 0 €</strong>
      <button id="payBtn" class="btn-buy">Payer</button>
    </div>
  </main>

  <script type="module" src="/assets/js/navbar.js"></script>
  <script type="module" src="/assets/js/shop/cart.js"></script>
</body>
</html>
