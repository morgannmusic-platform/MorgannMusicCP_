<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>Morgann Music CP</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #d8ff97;
      --txt: #ff8fb1;
      --txti: #d8ff97;
      --cover: #868686;
      --bg2: #aaaaaa;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #70844d;
        --txt: #e17999;
        --cover: #2c2c2c;
        --txti: #70844d;
        --bg2: #1e1e1e;
      }
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: 'Poppins', Arial, Helvetica, sans-serif;
      color: var(--txt);
    }
    .shell {
      width: 100%;
      padding: 48px 0 0;
    }
    .navbar {
      width: 100%;
      text-align: center;
      margin-bottom: 0;
    }
    .logo {
      display: block;
      margin: 0 auto;
      width: 60px;
      max-width: 100%;
      height: auto;
    }
    .head {
      border-bottom: 1px solid #e780aa;
      margin: 0;
      padding: 18px 20px;
      background: #fff;
      text-align: center;
    }
    .chip {
      display: inline-block;
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 700;
      color: #ff8fb1;
      background: #d8ff97;
      border-radius: 999px;
      padding: 6px 10px;
      border: 1.5px solid #e780aa;
    }
    .content {
      padding: 28px 20px 24px;
      font-size: 15px;
      line-height: 1.72;
      color: #868686;
      background: #fff;
      border-radius: 0 0 18px 18px;
    }
    .hello {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
      color: #ff8fb1;
    }
    .message {
      margin: 0;
    }
    .cta-wrap {
      margin: 22px 0 6px;
    }
    .cta {
      display: inline-block;
      background: #ff8fb1;
      color: #d8ff97 !important;
      text-decoration: none;
      font-weight: 800;
      border-radius: 999px;
      padding: 12px 20px;
      border: 2px solid #e780aa;
      font-size: 15px;
      transition: background 0.2s;
    }
    .cta:hover {
      background: #e780aa;
    }
    .foot {
      border-top: 1px solid #e780aa;
      padding: 18px 20px 22px;
      color: #ff8fb1;
      font-size: 12px;
      line-height: 1.6;
      background: #fafafa;
      text-align: center;
    }
    .foot a {
      color: #ff8fb1;
      text-decoration: underline;
    }
  </style>
</head>
<body>
    <div class="navbar">
        <img class="logo" src="https://mm-cp.uk/assets/img/logo.svg" alt="Morgann Music CP" />
      

      </div>
  <div class="shell">
    <div class="head">
      <span class="chip">Notification</span>
    </div>
    <div class="content">
      <p class="hello">Bonjour {{ARTIST_NAME}},</p>
      <p class="message">{{BODY_HTML}}</p>
      {{CTA_BLOCK}}
    </div>
    <div class="foot">
      <div>Morgann Music CP</div>
      <div>Distribution, label services et accompagnement artistes.</div>
      <div style="margin-top:6px;"><a href="{{SITE_URL}}" target="_blank" rel="noopener noreferrer">{{SITE_URL}}</a></div>
    </div>
  </div>
</body>
</html>
