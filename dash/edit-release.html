<!doctype html>
<html lang="fr">
<head>
    <style>
      body.with-artist-sidebar {
        margin-left: 300px;
      }
    </style>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirection vers uploader — MMCP</title>
  <script>
    (function redirectToUploaderEdit() {
      const params = new URLSearchParams(window.location.search);
      const releaseId = (params.get("id") || params.get("edit") || "").trim();
      const target = releaseId
        ? `/dash/upload.html?edit=${encodeURIComponent(releaseId)}`
        : "/dash/upload.html";
      window.location.replace(target);
    })();
  </script>
  <link rel="stylesheet" href="/assets/css/dash/artist-sidebar.css" />

  <style>
    :root { --bg:#e2e2e2; --txt:#000; --bg2:#fff; --cover:#bfbfbf; --stroke:rgba(0,0,0,.12); --muted:rgba(0,0,0,.6); }
    @media (prefers-color-scheme: dark){ :root{ --bg:#414141; --txt:#fff; --bg2:#1e1e1e; --cover:#575757; --stroke:rgba(255,255,255,.14); --muted:rgba(255,255,255,.65);} }
    * { box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:Helvetica,Arial,sans-serif; background:var(--bg); color:var(--txt); }
    .wrap{ max-width:1100px; margin:0 auto; padding:22px; }
    .title{ font-size:30px; font-weight:900; margin:10px 0 4px; }
    .sub{ color:var(--muted); margin-bottom:12px; }
    .card{ background:rgba(255,255,255,.62); border:1px solid var(--stroke); border-radius:18px; padding:14px; margin-bottom:12px; }
    @media (prefers-color-scheme: dark){ .card{ background:rgba(30,30,30,.62); } }
    .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    @media (max-width:840px){ .row2{ grid-template-columns:1fr; } }
    .input, .textarea, .select{ width:100%; border:1px solid var(--stroke); border-radius:10px; background:transparent; color:var(--txt); padding:10px; }
    .textarea{ min-height:90px; }
    .track{ border:1px solid var(--stroke); border-radius:12px; padding:10px; margin-top:10px; }
    .btn{ text-decoration:none; border:1px solid var(--stroke); border-radius:999px; padding:10px 14px; color:var(--txt); font-weight:700; background:rgba(0,0,0,.04); cursor:pointer; }
    @media (prefers-color-scheme: dark){ .btn{ background:rgba(255,255,255,.06); } }
    .btn.primary{ background:#3b82f6; color:#fff; border-color:transparent; }
    .line{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .warn{ color:#b45309; font-weight:700; }
    .error{ color:#b91c1c; font-weight:700; }
    .ok{ color:#166534; font-weight:700; }
    @media (max-width: 900px) {
    body.with-artist-sidebar {
      margin-left: 0;
    }
}


  </style>
  <script src="/assets/js/inject-dash-navbar.js"></script>
</head>
<body>
  <div id="navbar-inject"></div>
  <div id="sidebar-inject"></div>
  <main class="wrap">
    <h1 class="title">Modifier une sortie</h1>
    <p class="sub">Tu peux modifier les métadonnées et remplacer les fichiers audio (normal, atmos, instru) après validation MMCP.</p>

    <section class="card">
      <div class="line" style="justify-content:space-between;">
        <div id="releaseInfo">Chargement…</div>
        <a class="btn" href="/dash/sorties.html">← Retour sorties</a>
      </div>
      <p class="sub" id="lockInfo"></p>
    </section>

    <section class="card">
      <h3>Infos sortie</h3>
      <div class="row2" style="margin-top:8px;">
        <input id="title" class="input" placeholder="Titre" />
        <input id="versionLine" class="input" placeholder="Version" />
      </div>
      <div class="row2" style="margin-top:8px;">
        <input id="language" class="input" placeholder="Langue" />
        <label class="line"><input id="instrumental" type="checkbox" /> Instrumentale</label>
      </div>
      <textarea id="internalNote" class="textarea" placeholder="Note interne (facultatif)" style="margin-top:8px;"></textarea>
      <div class="sub" style="margin-top:6px;">Date de sortie verrouillée.</div>
    </section>

    <section class="card">
      <h3>Pistes (métadonnées modifiables)</h3>
      <div id="tracksRoot"></div>
    </section>

    <section class="card">
      <div class="line">
        <button id="saveBtn" class="btn primary" type="button">Enregistrer les modifications</button>
        <span id="msg"></span>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-storage.js";
    import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
      authDomain: "morgann-music-cp.firebaseapp.com",
      projectId: "morgann-music-cp",
      storageBucket: "morgann-music-cp.firebasestorage.app",
      messagingSenderId: "666812685196",
      appId: "1:666812685196:web:fe3df6749ae768d68494a9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const $ = (id) => document.getElementById(id);
    const rid = new URLSearchParams(window.location.search).get("id");

    let releaseRef = null;
    let releaseData = null;
    let editable = false;

    function clean(v){ return String(v || "").trim(); }

    function firstUrl(...values){
      for (const value of values){
        if (typeof value !== "string") continue;
        const url = clean(value);
        if (url) return url;
      }
      return "";
    }

    function mediaUrlFromTrack(track, candidateKeys){
      const t = (track && typeof track === "object") ? track : {};
      const file = (t.files && typeof t.files === "object") ? t.files : {};
      const sources = [];
      for (const key of candidateKeys) {
        sources.push(file?.[key]);
        sources.push(t?.[key]);
      }
      sources.push(t?.file?.url);
      sources.push(file?.url);
      return firstUrl(...sources);
    }

    function sanitizeFileName(name){
      return String(name || "file").replace(/[^a-zA-Z0-9._-]+/g, "_");
    }

    async function uploadTrackFile({ ownerUid, releaseId, rank, kind, file }){
      if (!file) return "";
      const safeOwner = clean(ownerUid) || auth.currentUser?.uid || "unknown";
      const safeRid = clean(releaseId) || "release";
      const safeKind = clean(kind) || "audio";
      const safeName = `${Date.now()}_${sanitizeFileName(file.name)}`;
      const path = `releases/${safeOwner}/${safeRid}/tracks/${rank}/${safeKind}_${safeName}`;
      const r = ref(storage, path);
      await uploadBytes(r, file, file?.type ? { contentType: file.type } : undefined);
      return await getDownloadURL(r);
    }

    function isApproved(release){
      const code = Number(clean(release?.statusCode || ""));
      if (Number.isFinite(code) && code >= 2) return true;
      const txt = [release?.statusUser, release?.statusAdmin, release?.statusPlatform, release?.status].map(clean).join(" ").toLowerCase();
      return txt.includes("valid");
    }

    function setMsg(text, cls=""){
      const m = $("msg");
      m.className = cls;
      m.textContent = text || "";
    }

    function renderTracks(tracks){
      const root = $("tracksRoot");
      root.innerHTML = "";
      const arr = Array.isArray(tracks) ? tracks : [];
      if (!arr.length){
        root.innerHTML = `<p class="sub">Aucune piste.</p>`;
        return;
      }

      arr.forEach((t, i) => {
        const audioUrl = mediaUrlFromTrack(t, ["audioUrl", "fileUrl", "url"]);
        const atmosUrl = firstUrl(
          mediaUrlFromTrack(t, ["atmosUrl", "dolbyUrl", "dolbyAtmosUrl", "audioDolbyUrl", "atmos", "dolby", "dolbyAtmos"]),
          t?.atmosFile?.url,
          t?.dolbyFile?.url
        );
        const instruUrl = firstUrl(
          mediaUrlFromTrack(t, ["instrumentalUrl", "instrumentalAudioUrl", "instruUrl", "instrumental"]),
          t?.instrumentalFile?.url
        );

        const div = document.createElement("div");
        div.className = "track";
        div.dataset.idx = String(i);
        div.innerHTML = `
          <div class="row2">
            <input class="input t-title" value="${clean(t.title)}" placeholder="Titre piste" ${editable ? "" : "disabled"} />
            <input class="input t-version" value="${clean(t.versionLine)}" placeholder="Version" ${editable ? "" : "disabled"} />
          </div>
          <div class="row2" style="margin-top:8px;">
            <input class="input t-language" value="${clean(t.language)}" placeholder="Langue" ${editable ? "" : "disabled"} />
            <input class="input t-genre" value="${clean(t.genre)}" placeholder="Genre" ${editable ? "" : "disabled"} />
          </div>
          <div class="row2" style="margin-top:8px;">
            <input class="input t-isrc" value="${clean(t.isrc)}" placeholder="ISRC" ${editable ? "" : "disabled"} />
            <input class="input t-iswc" value="${clean(t.iswc)}" placeholder="ISWC" ${editable ? "" : "disabled"} />
          </div>
          <textarea class="textarea t-lyrics" placeholder="Paroles" style="margin-top:8px;" ${editable ? "" : "disabled"}>${clean(t.lyrics)}</textarea>
          <div class="row2" style="margin-top:8px;">
            <div>
              <div class="sub" style="margin-bottom:6px;">Audio normal</div>
              <input class="input t-audio-file" type="file" accept="audio/*" ${editable ? "" : "disabled"} />
              ${audioUrl ? `<div style="margin-top:6px;"><a class="btn" href="${audioUrl}" target="_blank" rel="noopener">Fichier actuel</a></div>` : `<div class="sub">Aucun fichier</div>`}
            </div>
            <div>
              <div class="sub" style="margin-bottom:6px;">Atmos</div>
              <input class="input t-atmos-file" type="file" accept="audio/*" ${editable ? "" : "disabled"} />
              ${atmosUrl ? `<div style="margin-top:6px;"><a class="btn" href="${atmosUrl}" target="_blank" rel="noopener">Fichier actuel</a></div>` : `<div class="sub">Aucun fichier</div>`}
            </div>
          </div>
          <div style="margin-top:8px;">
            <div class="sub" style="margin-bottom:6px;">Instru</div>
            <input class="input t-instru-file" type="file" accept="audio/*" ${editable ? "" : "disabled"} />
            ${instruUrl ? `<div style="margin-top:6px;"><a class="btn" href="${instruUrl}" target="_blank" rel="noopener">Fichier actuel</a></div>` : `<div class="sub">Aucun fichier</div>`}
          </div>
          <p class="sub" style="margin-top:6px;">Date de sortie verrouillée</p>
        `;
        root.appendChild(div);
      });
    }

    function fillForm(data){
      $("title").value = clean(data.title);
      $("versionLine").value = clean(data.versionLine);
      $("language").value = clean(data.language);
      $("instrumental").checked = !!data.instrumental;
      $("internalNote").value = clean(data.internalNote || "");

      renderTracks(data.tracks || []);
    }

    async function collectUpdatedTracks(){
      const originalTracks = Array.isArray(releaseData?.tracks) ? releaseData.tracks : [];
      const next = [...originalTracks];

      const trackEls = Array.from(document.querySelectorAll("#tracksRoot .track"));
      for (const div of trackEls) {
        const i = Number(div.dataset.idx);
        if (!Number.isFinite(i) || !next[i]) continue;

        const currentTrack = next[i] || {};
        const currentFiles = (currentTrack.files && typeof currentTrack.files === "object") ? currentTrack.files : {};

        let audioUrl = mediaUrlFromTrack(currentTrack, ["audioUrl", "fileUrl", "url"]);
        let atmosUrl = firstUrl(
          mediaUrlFromTrack(currentTrack, ["atmosUrl", "dolbyUrl", "dolbyAtmosUrl", "audioDolbyUrl", "atmos", "dolby", "dolbyAtmos"]),
          currentTrack?.atmosFile?.url,
          currentTrack?.dolbyFile?.url
        );
        let instruUrl = firstUrl(
          mediaUrlFromTrack(currentTrack, ["instrumentalUrl", "instrumentalAudioUrl", "instruUrl", "instrumental"]),
          currentTrack?.instrumentalFile?.url
        );

        const audioFile = div.querySelector(".t-audio-file")?.files?.[0] || null;
        const atmosFile = div.querySelector(".t-atmos-file")?.files?.[0] || null;
        const instruFile = div.querySelector(".t-instru-file")?.files?.[0] || null;

        if (audioFile) {
          audioUrl = await uploadTrackFile({
            ownerUid: releaseData?.ownerUid,
            releaseId: rid,
            rank: i + 1,
            kind: "audio",
            file: audioFile
          });
        }
        if (atmosFile) {
          atmosUrl = await uploadTrackFile({
            ownerUid: releaseData?.ownerUid,
            releaseId: rid,
            rank: i + 1,
            kind: "atmos",
            file: atmosFile
          });
        }
        if (instruFile) {
          instruUrl = await uploadTrackFile({
            ownerUid: releaseData?.ownerUid,
            releaseId: rid,
            rank: i + 1,
            kind: "instrumental",
            file: instruFile
          });
        }

        next[i] = {
          ...next[i],
          title: clean(div.querySelector(".t-title")?.value) || next[i].title || `Piste ${i + 1}`,
          versionLine: clean(div.querySelector(".t-version")?.value) || null,
          language: clean(div.querySelector(".t-language")?.value) || null,
          genre: clean(div.querySelector(".t-genre")?.value) || null,
          isrc: clean(div.querySelector(".t-isrc")?.value) || null,
          iswc: clean(div.querySelector(".t-iswc")?.value) || null,
          lyrics: clean(div.querySelector(".t-lyrics")?.value) || null,
          files: {
            ...currentFiles,
            audioUrl: audioUrl || null,
            instrumentalUrl: instruUrl || null,
            atmosUrl: atmosUrl || null,
            audioFileName: audioFile ? clean(audioFile.name) : (currentFiles.audioFileName || null),
            instrumentalFileName: instruFile ? clean(instruFile.name) : (currentFiles.instrumentalFileName || null),
            atmosFileName: atmosFile ? clean(atmosFile.name) : (currentFiles.atmosFileName || null)
          },
          audioUrl: audioUrl || null,
          instrumentalUrl: instruUrl || null,
          atmosUrl: atmosUrl || null
        };
      }

      return next;
    }

    async function save(){
      if (!editable || !releaseRef || !releaseData) {
        setMsg("Modification non autorisée pour cette sortie.", "warn");
        return;
      }

      const saveBtn = $("saveBtn");
      saveBtn.disabled = true;
      setMsg("Enregistrement…");

      try {
        const payload = {
          title: clean($("title").value) || releaseData.title || "Sortie",
          versionLine: clean($("versionLine").value) || null,
          language: clean($("language").value) || null,
          instrumental: !!$("instrumental").checked,
          internalNote: clean($("internalNote").value) || null,
          tracks: await collectUpdatedTracks(),
          statusCode: "1",
          statusUser: "Envoyée à Morgann Music CP (vérification 1)",
          statusAdmin: "À vérifier (1)",
          statusPlatform: "En attente (vérification 2)",
          adminWorkState: "todo",
          updatedAt: serverTimestamp(),
          lastArtistEditAt: serverTimestamp(),
          lastArtistEditBy: auth.currentUser?.uid || null,
          artistRequestedUpdate: true
        };

        await updateDoc(releaseRef, payload);
        editable = false;
        $("saveBtn").disabled = true;
        $("lockInfo").textContent = "Sortie renvoyée en vérification MMCP après modification.";
        $("lockInfo").className = "sub warn";
        setMsg("Modifications enregistrées. Statut repassé en vérification MMCP.", "ok");
      } catch (e) {
        setMsg("Erreur: " + (e?.message || String(e)), "error");
      } finally {
        if (editable) saveBtn.disabled = false;
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user){
        const here = window.location.href;
        window.location.href = "/login.html?redirect=" + encodeURIComponent(here);
        return;
      }

      if (!rid){
        setMsg("ID release manquant.", "error");
        return;
      }

      releaseRef = doc(db, "releases", rid);
      const snap = await getDoc(releaseRef);
      if (!snap.exists()){
        setMsg("Sortie introuvable.", "error");
        return;
      }

      releaseData = snap.data() || {};

      const owned = releaseData.ownerUid === user.uid || clean(releaseData.ownerEmail).toLowerCase() === clean(user.email).toLowerCase();
      const approved = isApproved(releaseData);
      editable = owned && approved;

      $("releaseInfo").textContent = `${clean(releaseData.title) || "Sortie"} • ${rid}`;
      if (!owned) {
        $("lockInfo").textContent = "Tu n'es pas propriétaire de cette sortie.";
        $("lockInfo").className = "sub error";
      } else if (!approved) {
        $("lockInfo").textContent = "Modification autorisée seulement après approbation MMCP (statut validé).";
        $("lockInfo").className = "sub warn";
      } else {
        $("lockInfo").textContent = "Modification autorisée. Tu peux remplacer audio normal, atmos et instru.";
        $("lockInfo").className = "sub ok";
      }

      fillForm(releaseData);
      $("saveBtn").disabled = !editable;
      $("saveBtn").addEventListener("click", save);
    });


  </script>
    <script src="/assets/js/dash/artist-sidebar.js"></script>

</body>
</html>
