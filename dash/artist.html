<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Artiste — Dashboard</title>
  <meta name="robots" content="noindex" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/dash/styles-accueil.css" />
  <link rel="stylesheet" href="/assets/css/dash-navbar.css" />
  <link rel="stylesheet" href="/assets/dash/artist-dashboard.css" />
</head>
<body>
  <div id="navbar-inject"></div>
  <div class="artist-dashboard-wrap">
    <h1 id="artistName">Chargement…</h1>
    <div id="artistBannerWrap"></div>
    <div style="display:flex;align-items:center;gap:24px;margin-bottom:24px;">
      <img id="artistAvatar" class="artist-dashboard-avatar" src="" alt="Avatar artiste" style="display:none;">
      <div>
        <div id="artistProfiles" class="artist-dashboard-profiles"></div>
      </div>
    </div>
    <div id="artistMeta" class="artist-dashboard-meta"></div>
    <form class="artist-dashboard-form" onsubmit="return false;">
      <h2>Photo de profil actuelle</h2>
      <div id="currentAvatarWrap" style="margin-bottom:12px;"></div>
      <h3>Mettre à jour la photo de profil</h3>
      <input type="file" id="newAvatar" accept="image/*" />
      <button id="btnUploadAvatar" type="button">Uploader la photo</button>
      <div id="avatarUploadMsg" class="artist-dashboard-msg"></div>
    </form>
    <form class="artist-dashboard-form" onsubmit="return false;" style="margin-top:24px;">
      <h2>Bannière actuelle</h2>
      <div id="currentBannerWrap" style="margin-bottom:12px;"></div>
      <h3>Mettre à jour la bannière</h3>
      <input type="file" id="newBanner" accept="image/*" />
      <button id="btnUploadBanner" type="button">Uploader la bannière</button>
      <div id="bannerUploadMsg" class="artist-dashboard-msg"></div>
    </form>
  </div>
  <script src="/assets/js/dash-navbar.js"></script>
  <script>
    // Injection de la navbar dashboard
    fetch('/dash/navbar.html').then(r => r.text()).then(html => {
      document.getElementById('navbar-inject').innerHTML = html;
      if (window.initDashNavbarMenus) window.initDashNavbarMenus();
    });
  </script>
  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
      authDomain: "morgann-music-cp.firebaseapp.com",
      projectId: "morgann-music-cp",
      storageBucket: "morgann-music-cp.appspot.com",
      messagingSenderId: "666812685196",
      appId: "1:666812685196:web:fe3df6749ae768d68494a9"
    };
    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const params = new URLSearchParams(window.location.search);
    const artistId = params.get('artistId') || params.get('id') || '';
    const $ = id => document.getElementById(id);

    async function loadArtistInfo(id) {
      if (!id) {
        $("artistName").textContent = "Aucun artiste trouvé.";
        return;
      }
      const snap = await getDoc(doc(db, "artists", id));
      if (!snap.exists()) {
        $("artistName").textContent = "Artiste introuvable.";
        return;
      }
      const a = snap.data();
      $("artistName").textContent = a.name || "Artiste";
      // Avatar
      if (a.playProfileImageUrl) {
        $("artistAvatar").src = a.playProfileImageUrl;
        $("artistAvatar").style.display = '';
        $("currentAvatarWrap").innerHTML = `<img src="${a.playProfileImageUrl}" alt="Avatar actuel" style="width:100px;height:100px;border-radius:50%;object-fit:cover;">`;
      } else {
        $("currentAvatarWrap").innerHTML = '<span style="color:#aaa;">Aucune photo de profil</span>';
      }
      // Bannière
      if (a.bannerUrl) {
        $("artistBannerWrap").innerHTML = `<img src="${a.bannerUrl}" alt="Bannière" style="width:100%;max-width:600px;border-radius:16px;object-fit:cover;">`;
        $("currentBannerWrap").innerHTML = `<img src="${a.bannerUrl}" alt="Bannière actuelle" style="width:100%;max-width:400px;border-radius:12px;object-fit:cover;">`;
      } else {
        $("currentBannerWrap").innerHTML = '<span style="color:#aaa;">Aucune bannière</span>';
      }
      // Profils
      let profiles = [];
      if (a.spotify?.hasProfile) profiles.push('Spotify');
      if (a.appleMusic?.hasProfile) profiles.push('Apple Music');
      $("artistProfiles").textContent = profiles.length ? `Profils : ${profiles.join(', ')}` : '';
      // Meta
      $("artistMeta").innerHTML = `<div style='color:#888;font-size:13px;'>Créé le : ${a.createdAt?.toDate ? a.createdAt.toDate().toLocaleDateString() : '—'}</div>`;
    }

    async function uploadImage(type) {
      const fileInput = type === 'avatar' ? $("newAvatar") : $("newBanner");
      const msg = type === 'avatar' ? $("avatarUploadMsg") : $("bannerUploadMsg");
      msg.textContent = '';
      const file = fileInput.files[0];
      if (!file) { msg.textContent = 'Aucun fichier sélectionné.'; return; }
      try {
        const storageRef = ref(storage, `artists/${type}s/${artistId}_${Date.now()}_${file.name}`);
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);
        await updateDoc(doc(db, 'artists', artistId), type === 'avatar' ? { playProfileImageUrl: url } : { bannerUrl: url });
        msg.textContent = 'Image mise à jour !';
        loadArtistInfo(artistId);
      } catch (e) {
        msg.textContent = 'Erreur : ' + (e?.message || String(e));
      }
    }

    $("btnUploadAvatar").onclick = () => uploadImage('avatar');
    $("btnUploadBanner").onclick = () => uploadImage('banner');

    loadArtistInfo(artistId);
  </script>
  <script src="/assets/js/dash/artist-sidebar.js"></script>
</body>
</html>
