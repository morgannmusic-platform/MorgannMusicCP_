<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
  authDomain: "morgann-music-cp.firebaseapp.com",
  projectId: "morgann-music-cp",
  storageBucket: "morgann-music-cp.firebasestorage.app",
  messagingSenderId: "666812685196",
  appId: "1:666812685196:web:fe3df6749ae768d68494a9"
};

// Initialisation propre
const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {
  const greetingDiv = document.getElementById('navbar-greeting');
  if (!greetingDiv) return;

  if (!user) {
    greetingDiv.textContent = "";
    return;
  }

  let prenom = "";
  
  try {
    // On va chercher dans la collection "users" avec l'UID
    const userSnap = await getDoc(doc(db, "users", user.uid));
    
    if (userSnap.exists()) {
      const data = userSnap.data();
      // On teste tous les champs possibles
      prenom = data.firstName || data.prenom || data.displayName || data.artistName;
    }
  } catch (e) {
    console.error("Erreur Firestore :", e);
  }

  // Fallback sur les infos de base d'auth si Firestore est vide
  if (!prenom) {
    prenom = user.displayName || user.email?.split('@')[0] || "Artiste";
  }

  // Nettoyage pour ne garder que le premier mot (ex: "Morgann Rachedi" -> "Morgann")
  prenom = prenom.split(" ")[0];

  // Logique de l'heure
  const hours = new Date().getHours();
  let greeting = "Bonjour";

  if (hours >= 21 || hours < 5) {
    greeting = "Bonne nuit";
  } else if (hours >= 18) {
    greeting = "Bonsoir";
  } else if (hours >= 12) {
    greeting = "Bonne après-midi";
  } else {
    greeting = "Bonjour";
  }

  greetingDiv.textContent = `${greeting} ${prenom}`;
  console.log("Greeting affiché :", greeting, prenom);
});
</script>

<script>
(function () {
  var LS_KEY = 'dashboardDiscreteLoading';

  function getPref() {
    try {
      var v = localStorage.getItem(LS_KEY);
      return v !== 'false';
    } catch (e) { return true; }
  }

  function setPref(val) {
    try { localStorage.setItem(LS_KEY, val ? 'true' : 'false'); } catch (e) {}
  }

  var gearBtn  = document.getElementById('navGearBtn');
  var overlay  = document.getElementById('navGearOverlay');
  var popup    = document.getElementById('navGearPopup');
  var closeBtn = document.getElementById('navGearClose');
  var toggle   = document.getElementById('discreteLoadingToggle');

  if (toggle) toggle.checked = getPref();

  function openPopup() {
    popup   && popup.classList.add('is-open');
    overlay && overlay.classList.add('is-open');
  }

  function closePopup() {
    popup   && popup.classList.remove('is-open');
    overlay && overlay.classList.remove('is-open');
  }

  gearBtn  && gearBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    popup && popup.classList.contains('is-open') ? closePopup() : openPopup();
  });
  closeBtn && closeBtn.addEventListener('click', closePopup);
  overlay  && overlay.addEventListener('click', closePopup);

  toggle && toggle.addEventListener('change', function () {
    setPref(toggle.checked);
  });
}());
</script>
