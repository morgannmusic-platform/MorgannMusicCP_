<!DOCTYPE html>
<html lang="fr">
<head>
            <style>
                body.with-artist-sidebar {
                    margin-left: 300px;
                }
                @media (max-width: 900px) {
    body.with-artist-sidebar {
      margin-left: 0;
    }
}


            </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Cloud</title>
    <link rel="stylesheet" href="/assets/css/dash/drive.css">
</head>
<body>
    <div id="sidebar-inject"></div>
    <nav id="navbar"></nav>
    <main class="drive-container">
        <h1>Mon Drive Cloud</h1>
        <div class="drive-info">
            <span id="plan-type">Plan : ...</span>
            <span id="quota">Espace utilisé : 0 Go / ... Go</span>
        </div>
        <div class="finder">
            <div class="finder-sidebar">
                <ul id="folder-list">
                    <li class="active">/</li>
                    <li>Mes sorties</li>
                    <li>Mes fichiers</li>
                    <li>Archives</li>
                </ul>
            </div>
            <div class="finder-main">
                <table class="file-table">
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Taille</th>
                            <th>Type</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="file-list">
                        <!-- Fichiers mock -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="/js/dash/drive.js"></script>
    <script src="/js/navbar.js"></script>
      <script src="/assets/js/dash/artist-sidebar.js"></script>

</body>
</html>
