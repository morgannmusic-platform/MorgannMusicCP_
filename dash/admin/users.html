<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Comptes</title>
  <link rel="stylesheet" href="/assets/css/dash/admin/sidebar.css" />
  <style>
    :root {
      --bg:#e2e2e2;
      --txt:#000;
      --stroke:rgba(0,0,0,.12);
      --card:rgba(255,255,255,.78);
      --muted:rgba(0,0,0,.58);
      --blue:#2f63ff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#414141;
        --txt:#fff;
        --stroke:rgba(255,255,255,.14);
        --card:rgba(30,30,30,.78);
        --muted:rgba(255,255,255,.65);
        --blue:#3b82f6;
      }
    }

    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { background:var(--bg); color:var(--txt); font-family:Helvetica,sans-serif; }

    .wrap { max-width:1200px; margin:0 auto; padding:24px 18px 28px; }
    .title { font-size:30px; font-weight:900; margin-bottom:8px; }
    .sub { color:var(--muted); margin-bottom:14px; }

    .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    .input {
      min-width:280px;
      flex:1;
      border:1px solid var(--stroke);
      border-radius:999px;
      background:transparent;
      color:var(--txt);
      padding:10px 13px;
      outline:none;
    }

    .meta { color:var(--muted); font-size:12px; margin-bottom:10px; }

    .list {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:12px;
    }

    .card {
      border:1px solid var(--stroke);
      border-radius:20px;
      background:var(--card);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      padding:14px;
    }

    .head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
    .name { font-weight:900; font-size:14px; }

    .badge {
      font-size:11px;
      border:1px solid var(--stroke);
      border-radius:999px;
      padding:5px 10px;
      white-space:nowrap;
    }

    .line { font-size:13px; color:var(--txt); opacity:.9; word-break:break-word; }
    .chips { margin-top:10px; display:flex; flex-wrap:wrap; gap:8px; }
    .chip {
      font-size:11px;
      border:1px solid var(--stroke);
      border-radius:999px;
      padding:5px 10px;
      color:var(--muted);
    }

    .actions { margin-top:12px; display:flex; gap:8px; }
    .btn {
      text-decoration:none;
      border:1px solid var(--stroke);
      border-radius:999px;
      color:var(--txt);
      font-size:12px;
      font-weight:900;
      padding:8px 11px;
      background:transparent;
    }

    .btn.primary { background:var(--blue); color:#fff; border-color:transparent; }
  </style>
</head>
<body>
  <script type="module" src="/assets/js/dash/admin/sidebar.js"></script>

  <main class="wrap">
    <h1 class="title">Comptes utilisateurs</h1>
    <p class="sub">Recherche et gestion rapide des comptes artistes.</p>

    <div class="toolbar">
      <input id="search" class="input" placeholder="Rechercher email / nom / uid" />
    </div>

    <p id="status" class="meta">Chargement…</p>
    <section id="usersList" class="list"></section>
  </main>

  <script type="module" src="/assets/js/dash/admin/users.js"></script>
</body>
</html>
