<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Accompagnement</title>
  <link rel="stylesheet" href="/assets/css/dash/admin/sidebar.css" />
  <style>
    :root{--bg:#e2e2e2;--txt:#000;--line:rgba(0,0,0,.12);--card:rgba(255,255,255,.78);--muted:rgba(0,0,0,.58);--blue:#2f63ff}
    @media (prefers-color-scheme: dark){:root{--bg:#414141;--txt:#fff;--line:rgba(255,255,255,.14);--card:rgba(30,30,30,.78);--muted:rgba(255,255,255,.65);--blue:#3b82f6}}
    *{box-sizing:border-box;margin:0;padding:0} html,body{background:var(--bg);color:var(--txt);font-family:Helvetica,sans-serif}
    .wrap{max-width:1200px;margin:0 auto;padding:24px 18px 28px} .title{font-size:30px;font-weight:900;margin-bottom:8px} .sub{color:var(--muted);margin-bottom:14px}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.input,.select{border:1px solid var(--line);border-radius:999px;background:transparent;color:var(--txt);padding:10px 12px}.input{min-width:260px;flex:1}
    .card{border:1px solid var(--line);border-radius:16px;background:var(--card);padding:12px;margin-bottom:10px}.muted{color:var(--muted);font-size:12px}
    .line{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}.pill{border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-size:11px}
    .btn{border:1px solid var(--line);border-radius:999px;padding:8px 11px;background:transparent;color:var(--txt);font-weight:800;cursor:pointer}.btn.primary{background:var(--blue);border-color:transparent;color:#fff}
  </style>
</head>
<body>
  <script type="module" src="/assets/js/dash/admin/sidebar.js"></script>
  <main class="wrap">
    <h1 class="title">Accompagnement (admin)</h1>
    <p class="sub">Vue globale : calendrier, objectifs, préparations, demandes feat et demandes pitching des artistes signés.</p>

    <div class="toolbar">
      <input id="search" class="input" placeholder="Filtrer par owner uid / titre" />
      <select id="kind" class="select">
        <option value="all">Tout afficher</option>
        <option value="plans">Calendrier</option>
        <option value="goals">Objectifs</option>
        <option value="drafts">Préparations</option>
        <option value="feat">Demandes feat</option>
        <option value="pitch">Demandes pitching</option>
      </select>
    </div>

    <div id="list"></div>
  </main>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = { apiKey:"AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc", authDomain:"morgann-music-cp.firebaseapp.com", projectId:"morgann-music-cp", storageBucket:"morgann-music-cp.firebasestorage.app", messagingSenderId:"666812685196", appId:"1:666812685196:web:fe3df6749ae768d68494a9" };
    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app); const db = getFirestore(app);
    const clean = (v) => String(v || "").trim();

    const listEl = document.getElementById("list");
    const searchEl = document.getElementById("search");
    const kindEl = document.getElementById("kind");
    let rows = [];

    function esc(s){ return String(s || "").replace(/[&<>\"]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m])); }

    function render(){
      const q = clean(searchEl.value).toLowerCase();
      const k = clean(kindEl.value);
      const filtered = rows.filter(r => {
        if (k !== "all" && r.kind !== k) return false;
        if (!q) return true;
        return [r.ownerUid, r.title, r.id, r.kind].map(clean).join(" ").toLowerCase().includes(q);
      });

      listEl.innerHTML = filtered.map(r => `
        <article class="card">
          <div class="line">
            <div>
              <strong>${esc(r.title || r.kind)}</strong>
              <div class="muted">${esc(r.kind)} • owner: ${esc(r.ownerUid)} • id: ${esc(r.id)}</div>
            </div>
            <span class="pill">${esc(r.status || "—")}</span>
          </div>
          <div class="muted" style="margin-top:6px;white-space:pre-wrap;">${esc(r.details || "")}</div>
          ${r.kind === "drafts" ? `<div class="line" style="margin-top:8px;justify-content:flex-start;"><button class="btn" data-ready="${r.id}">Prêt</button><button class="btn" data-review="${r.id}">En revue</button></div>` : ""}
        </article>
      `).join("") || `<div class="muted">Aucune donnée.</div>`;

      listEl.querySelectorAll("button[data-ready]").forEach(btn => btn.addEventListener("click", async () => {
        await updateDoc(doc(db, "accompagnementDrafts", btn.dataset.ready), { status: "ready", updatedAt: serverTimestamp() });
        await loadAll();
      }));
      listEl.querySelectorAll("button[data-review]").forEach(btn => btn.addEventListener("click", async () => {
        await updateDoc(doc(db, "accompagnementDrafts", btn.dataset.review), { status: "review", updatedAt: serverTimestamp() });
        await loadAll();
      }));
    }

    async function requireAdmin(user){
      const s = await getDoc(doc(db, "users", user.uid));
      const role = s.exists() ? clean(s.data()?.role).toLowerCase() : "";
      return role === "admin" || role === "owner" || role === "vip";
    }

    async function loadAll(){
      const [plans, goals, drafts, featRequests, pitchRequests] = await Promise.all([
        getDocs(collection(db, "accompagnementPlans")),
        getDocs(collection(db, "accompagnementGoals")),
        getDocs(collection(db, "accompagnementDrafts")),
        getDocs(collection(db, "featRequests")),
        getDocs(collection(db, "editorialPitchRequests"))
      ]);

      rows = [];
      plans.forEach(d => { const x = d.data() || {}; rows.push({ id:d.id, kind:"plans", ownerUid:clean(x.ownerUid), title:clean(x.title), status:clean(x.plannedDate), details:`Teasing: ${clean(x.teasing)}\nCampagnes: ${clean(x.campaign)}` }); });
      goals.forEach(d => { const x = d.data() || {}; rows.push({ id:d.id, kind:"goals", ownerUid:clean(x.ownerUid), title:clean(x.title), status:x.done ? "fait" : "à faire", details:`Mois: ${clean(x.month)}` }); });
      drafts.forEach(d => { const x = d.data() || {}; rows.push({ id:d.id, kind:"drafts", ownerUid:clean(x.ownerUid), title:clean(x.title) || "Sortie sans titre", status:clean(x.status || "draft"), details:`Type: ${clean(x.type)}\nDate: ${clean(x.releaseDate) || "—"}\nLangue: ${clean(x.language) || "—"}\nPistes: ${(Array.isArray(x.tracks) ? x.tracks.length : 0)}` }); });
      featRequests.forEach(d => { const x = d.data() || {}; rows.push({ id:d.id, kind:"feat", ownerUid:clean(x.ownerUid), title:clean(x.artistName) || "Demande feat", status:clean(x.status || "reflexion"), details:`Instagram: ${clean(x.instagramUrl) || "—"}\nDétails: ${clean(x.note) || "—"}\nContact admin: ${clean(x.adminContact) || "—"}` }); });
      pitchRequests.forEach(d => { const x = d.data() || {}; rows.push({ id:d.id, kind:"pitch", ownerUid:clean(x.ownerUid), title:clean(x.releaseTitle) || "Demande pitching", status:clean(x.status || "reflexion"), details:`Release ID: ${clean(x.releaseId) || "—"}\nDate sortie: ${clean(x.releaseDate) || "—"}\nLien: ${clean(x.trackUrl) || "—"}\nArgumentaire: ${clean(x.pitchText) || "—"}` }); });

      render();
    }

    searchEl.addEventListener("input", render);
    kindEl.addEventListener("change", render);

    onAuthStateChanged(auth, async (user) => {
      if (!user) return (window.location.href = "/login.html");
      if (!(await requireAdmin(user))) return (window.location.href = "/dash/index.html");
      await loadAll();
    });
  </script>
</body>
</html>
