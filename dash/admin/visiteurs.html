<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Visiteurs du site | Admin</title>
  <link rel="stylesheet" href="/assets/css/dash/admin/navbar.css">
  <link rel="stylesheet" href="/assets/css/styles-accueil.css">
  <style>
    .visitors-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 32px;
      background: #fff;
      color: #222;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px #0001;
    }
    .visitors-table th, .visitors-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }
    .visitors-table th {
      background: #ff8fb1;
      color: #fff;
      font-weight: 700;
    }
    .visitors-table tr:last-child td {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>
  <main style="max-width:900px;margin:40px auto 0 auto;padding:0 16px;">
    <h1 style="font-size:2.2rem;font-weight:900;margin-bottom:24px;">Visiteurs du site</h1>
    <table class="visitors-table" id="visitors-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Adresse IP</th>
          <th>Pays</th>
          <th>User-Agent</th>
        </tr>
      </thead>
      <tbody>
        <!-- Les visiteurs seront injectés ici -->
      </tbody>
    </table>
    <div id="no-visitors" style="display:none;text-align:center;color:#888;margin-top:32px;">Aucune visite enregistrée.</div>
  </main>
  <script type="module">
    // Exemple de récupération (à remplacer par un vrai backend ou Firestore)
    async function fetchVisitors() {
      // Remplacer par un appel à Firestore ou API
      return [
        { date: '2026-04-20 14:12', ip: '82.124.12.34', country: 'France', ua: 'Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)' },
        { date: '2026-04-20 13:55', ip: '91.201.45.11', country: 'Belgique', ua: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)' }
      ];
    }
    async function renderVisitors() {
      const visitors = await fetchVisitors();
      const tbody = document.querySelector('#visitors-table tbody');
      const noVisitors = document.getElementById('no-visitors');
      tbody.innerHTML = '';
      if (!visitors.length) {
        noVisitors.style.display = 'block';
        return;
      }
      noVisitors.style.display = 'none';
      for (const v of visitors) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${v.date}</td><td>${v.ip}</td><td>${v.country}</td><td style="max-width:220px;overflow-x:auto;">${v.ua}</td>`;
        tbody.appendChild(tr);
      }
    }
    renderVisitors();
    // Navbar dynamique si besoin
    fetch('/dash/admin/navbar.html').then(r=>r.text()).then(html=>{
      document.getElementById('navbar-container').innerHTML = html;
    });
  </script>
</body>
</html>
