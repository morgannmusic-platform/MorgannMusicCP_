<!doctype html>
<html lang="fr"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Admin — Notes artistes signés</title><link rel="stylesheet" href="/assets/css/dash/admin/sidebar.css" />
<style>:root{--bg:#e2e2e2;--txt:#000;--line:rgba(0,0,0,.12);--card:rgba(255,255,255,.78);--muted:rgba(0,0,0,.58);--blue:#2f63ff}@media (prefers-color-scheme: dark){:root{--bg:#414141;--txt:#fff;--line:rgba(255,255,255,.14);--card:rgba(30,30,30,.78);--muted:rgba(255,255,255,.65);--blue:#3b82f6}}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg);color:var(--txt);font-family:Helvetica,sans-serif}.wrap{max-width:1000px;margin:0 auto;padding:24px 18px 28px}.title{font-size:30px;font-weight:900;margin-bottom:8px}.sub{color:var(--muted);margin-bottom:14px}.card{border:1px solid var(--line);border-radius:16px;background:var(--card);padding:12px;margin-bottom:10px}.input,.textarea,.select{width:100%;border:1px solid var(--line);border-radius:12px;background:transparent;color:var(--txt);padding:10px}.textarea{min-height:110px}.line{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn{border:1px solid var(--line);border-radius:999px;padding:8px 12px;background:transparent;color:var(--txt);font-weight:800;cursor:pointer}.btn.primary{background:var(--blue);color:#fff;border-color:transparent}.muted{color:var(--muted);font-size:12px}</style></head>
<body><script type="module" src="/assets/js/dash/admin/sidebar.js"></script><main class="wrap"><h1 class="title">Notes personnalisées</h1><p class="sub">Créer des notes privées pour les artistes signés.</p>
<section class="card"><div class="line"><select id="ownerSelect" class="select" style="flex:1;"></select></div><input id="noteTitle" class="input" placeholder="Titre de la note" /><textarea id="noteBody" class="textarea" placeholder="Corps de la note"></textarea><div class="line"><button id="btnAdd" class="btn primary" type="button">Publier la note</button><span id="msg" class="muted"></span></div></section>
<section class="card"><div id="list"></div></section></main>
<script type="module">import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";import { getFirestore, collection, getDocs, addDoc, doc, getDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
const c={apiKey:"AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",authDomain:"morgann-music-cp.firebaseapp.com",projectId:"morgann-music-cp",storageBucket:"morgann-music-cp.firebasestorage.app",messagingSenderId:"666812685196",appId:"1:666812685196:web:fe3df6749ae768d68494a9"};const app=getApps().length?getApps()[0]:initializeApp(c);const auth=getAuth(app);const db=getFirestore(app);const $=id=>document.getElementById(id);const clean=v=>String(v||"").trim();
function esc(s){return String(s||"").replace(/[&<>\"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));}
async function requireAdmin(user){const s=await getDoc(doc(db,"users",user.uid));const r=s.exists()?clean(s.data()?.role).toLowerCase():"";return r==="admin"||r==="owner"||r==="vip";}
function normalizeRoleValue(v){return clean(v).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function isSignedArtistData(data){if(!data||typeof data!=="object")return false;const role=normalizeRoleValue(data.role);const userRole=normalizeRoleValue(data.userRole);const accountType=normalizeRoleValue(data.accountType);const status=normalizeRoleValue(data.status);const plan=normalizeRoleValue(data.plan);const subscription=normalizeRoleValue(data.subscription);const signedValues=["artist","artiste","artiste signe","signed artist","signed"];return data.isArtist===true||data.artist===true||signedValues.includes(role)||signedValues.includes(userRole)||signedValues.includes(accountType)||signedValues.includes(status)||signedValues.includes(plan)||signedValues.includes(subscription);}
async function loadOwners(){const sel=$("ownerSelect");sel.innerHTML="";const snap=await getDocs(collection(db,"users"));const owners=snap.docs.map(d=>({id:d.id,...(d.data()||{})})).filter(u=>isSignedArtistData(u));if(!owners.length){sel.innerHTML='<option value="">Aucun artiste signé</option>';return;}owners.sort((a,b)=>clean(a.displayName||a.email||a.id).localeCompare(clean(b.displayName||b.email||b.id),"fr"));owners.forEach(u=>{const o=document.createElement("option");o.value=u.id;o.textContent=`${clean(u.displayName)||clean(u.email)||u.id} • ${u.id}`;sel.appendChild(o);});}
async function loadList(){const snap=await getDocs(collection(db,"accompagnementNotes"));const arr=snap.docs.map(d=>({id:d.id,...d.data()}));$("list").innerHTML=arr.map(n=>`<article class="card"><strong>${esc(clean(n.title)||"Note")}</strong><div class="muted" style="margin-top:4px;">owner: ${esc(clean(n.ownerUid))}</div><div style="margin-top:8px;white-space:pre-wrap;">${esc(clean(n.body))}</div></article>`).join("")||`<div class="muted">Aucune note.</div>`;}
$("btnAdd").addEventListener("click", async()=>{const ownerUid=clean($("ownerSelect").value);const title=clean($("noteTitle").value);const body=clean($("noteBody").value);if(!ownerUid||!title||!body){$("msg").textContent="Tous les champs sont requis";return;}try{await addDoc(collection(db,"accompagnementNotes"),{ownerUid,title,body,createdAt:serverTimestamp(),updatedAt:serverTimestamp(),adminUid:auth.currentUser?.uid||null});$("noteTitle").value="";$("noteBody").value="";$("msg").textContent="Note publiée";await loadList();}catch(e){console.error("Erreur note accompagnement:",e);$("msg").textContent="Impossible d'envoyer la note";}});
onAuthStateChanged(auth, async user=>{if(!user) return location.href="/login.html";if(!(await requireAdmin(user))) return location.href="/dash/index.html";await loadOwners();await loadList();});</script></body></html>
