<!doctype html>
<html lang="fr"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Admin — Pitching Spotify</title><link rel="stylesheet" href="/assets/css/dash/admin/sidebar.css" />
<style>:root{--bg:#e2e2e2;--txt:#000;--line:rgba(0,0,0,.12);--card:rgba(255,255,255,.78);--muted:rgba(0,0,0,.58)}@media (prefers-color-scheme: dark){:root{--bg:#414141;--txt:#fff;--line:rgba(255,255,255,.14);--card:rgba(30,30,30,.78);--muted:rgba(255,255,255,.65)}}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg);color:var(--txt);font-family:Helvetica,sans-serif}.wrap{max-width:1100px;margin:0 auto;padding:24px 18px 28px}.title{font-size:30px;font-weight:900;margin-bottom:8px}.sub{color:var(--muted);margin-bottom:14px}.card{border:1px solid var(--line);border-radius:16px;background:var(--card);padding:12px;margin-bottom:10px}.line{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}.input,.select,.textarea{border:1px solid var(--line);border-radius:12px;background:transparent;color:var(--txt);padding:9px}.input{min-width:220px}.textarea{min-height:80px;width:100%}.btn{border:1px solid var(--line);border-radius:999px;padding:7px 11px;background:transparent;color:var(--txt);font-weight:800;cursor:pointer}.muted{color:var(--muted);font-size:12px}</style></head>
<body><script type="module" src="/assets/js/dash/admin/sidebar.js"></script><main class="wrap"><h1 class="title">Demandes pitching éditorial</h1><p class="sub">Mettre à jour le statut et laisser un retour admin.</p><div id="list"></div></main>
<script type="module">import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";import { getFirestore, collection, getDocs, updateDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
const c={apiKey:"AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",authDomain:"morgann-music-cp.firebaseapp.com",projectId:"morgann-music-cp",storageBucket:"morgann-music-cp.firebasestorage.app",messagingSenderId:"666812685196",appId:"1:666812685196:web:fe3df6749ae768d68494a9"};const app=getApps().length?getApps()[0]:initializeApp(c);const auth=getAuth(app);const db=getFirestore(app);const clean=v=>String(v||"").trim();const list=document.getElementById("list");
function esc(s){return String(s||"").replace(/[&<>\"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));}
async function requireAdmin(user){const s=await getDoc(doc(db,"users",user.uid));const r=s.exists()?clean(s.data()?.role).toLowerCase():"";return r==="admin"||r==="owner"||r==="vip";}
async function load(){const snap=await getDocs(collection(db,"editorialPitchRequests"));const arr=snap.docs.map(d=>({id:d.id,...d.data()}));list.innerHTML=arr.map(r=>`<article class="card"><div class="line"><strong>${esc(clean(r.releaseTitle)||"Pitch")}</strong><span class="muted">owner: ${esc(clean(r.ownerUid))}</span></div><div class="muted" style="margin-top:6px;">Date: ${esc(clean(r.releaseDate)||"—")} • Lien: ${esc(clean(r.trackUrl)||"—")}</div><div class="muted" style="margin-top:4px;white-space:pre-wrap;">${esc(clean(r.pitchText)||"")}</div><div class="line" style="margin-top:8px;justify-content:flex-start;"><select class="select" data-status="${r.id}"><option value="reflexion" ${clean(r.status)==="reflexion"?"selected":""}>Réflexion</option><option value="accepted" ${clean(r.status)==="accepted"?"selected":""}>Accepté</option><option value="refused" ${clean(r.status)==="refused"?"selected":""}>Refusé</option></select><input class="input" data-note="${r.id}" value="${esc(clean(r.adminNote)||"")}" placeholder="Note / feedback admin" /><button class="btn" data-save="${r.id}">Enregistrer</button></div></article>`).join("") || `<div class="muted">Aucune demande.</div>`;
list.querySelectorAll("button[data-save]").forEach(btn=>btn.addEventListener("click", async()=>{const id=btn.dataset.save;const status=clean(list.querySelector(`[data-status="${id}"]`)?.value)||"reflexion";const adminNote=clean(list.querySelector(`[data-note="${id}"]`)?.value)||null;await updateDoc(doc(db,"editorialPitchRequests",id),{status,adminNote,updatedAt:serverTimestamp(),adminUpdatedBy:auth.currentUser?.uid||null});await load();}));}
onAuthStateChanged(auth, async user=>{if(!user) return location.href="/login.html";if(!(await requireAdmin(user))) return location.href="/dash/index.html";await load();});</script></body></html>
