<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Envoyeur de notif</title>
  <link rel="stylesheet" href="/assets/css/dash/admin/sidebar.css" />
  <style>
    :root { --bg:#e2e2e2; --txt:#000; --stroke:rgba(0,0,0,.12); --card:rgba(255,255,255,.78); --muted:rgba(0,0,0,.58); --blue:#2f63ff; }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#414141; --txt:#fff; --stroke:rgba(255,255,255,.14); --card:rgba(30,30,30,.78); --muted:rgba(255,255,255,.65); --blue:#3b82f6; }
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--txt);font-family:Helvetica,sans-serif}
    .wrap{max-width:900px;margin:0 auto;padding:34px 18px}
    .title{font-size:30px;font-weight:900;margin-bottom:10px}
    .sub{color:var(--muted);margin-bottom:16px}
    .card{border:1px solid var(--stroke);border-radius:24px;background:var(--card);padding:16px}
    .input,.textarea{width:100%;border:1px solid var(--stroke);border-radius:14px;padding:11px 12px;background:transparent;color:var(--txt);margin-bottom:10px}
    .textarea{min-height:150px;resize:vertical}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
    .switch{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt)}
    .switch input{width:16px;height:16px}
    .btn{border:none;border-radius:999px;padding:10px 14px;background:var(--blue);color:#fff;font-weight:900;cursor:pointer}
    .btn[disabled]{opacity:.6;cursor:not-allowed}
    .muted{color:var(--muted);font-size:12px;margin-top:10px}
  </style>
</head>
<body>
  <script type="module" src="/assets/js/dash/admin/sidebar.js"></script>

  <main class="wrap">
    <h1 class="title">Envoyeur de notif</h1>
    <p class="sub">Choisis un compte, écris ton message et active/désactive la réponse artiste.</p>

    <section class="card">
      <select class="input" id="notifUser"></select>
      <input class="input" id="notifTitle" placeholder="Titre de la notification" />
      <textarea class="textarea" id="notifBody" placeholder="Message à envoyer"></textarea>
      <div class="row">
        <label class="switch" for="notifAllowReply">
          <input type="checkbox" id="notifAllowReply" checked />
          <span>L’artiste peut répondre</span>
        </label>
      </div>
      <button class="btn" id="btnSend">Envoyer la notification</button>
      <p class="muted" id="result">Chargement des comptes…</p>
    </section>
  </main>

  <main class="wrap">
    <h2 class="title" style="font-size:22px;margin-top:40px;">Notifications envoyées</h2>
    <section class="card" id="notif-list">
      <div id="notif-loading" class="muted">Chargement des notifications…</div>
      <ul id="notif-ul" style="list-style:none;padding:0;margin:0"></ul>
    </section>
  </main>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit, doc, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
      authDomain: "morgann-music-cp.firebaseapp.com",
      projectId: "morgann-music-cp",
      storageBucket: "morgann-music-cp.firebasestorage.app",
      messagingSenderId: "666812685196",
      appId: "1:666812685196:web:fe3df6749ae768d68494a9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const userSelect = document.getElementById("notifUser");
    const titleInput = document.getElementById("notifTitle");
    const bodyInput = document.getElementById("notifBody");
    const allowReplyInput = document.getElementById("notifAllowReply");
    const sendBtn = document.getElementById("btnSend");
    const result = document.getElementById("result");

    function clean(value) {
      return String(value || "").trim();
    }

    function userLabel(uid, data) {
      const email = clean(data?.email);
      const name = clean(data?.displayName || data?.name);
      if (name && email) return `${name} — ${email}`;
      if (email) return email;
      return uid;
    }

    async function ensureAdmin(user) {
      const userSnap = await getDoc(doc(db, "users", user.uid));
      const role = userSnap.exists() ? clean(userSnap.data()?.role).toLowerCase() : "";
      return role === "admin";
    }

    async function loadUsersOptions() {
      userSelect.innerHTML = `<option value="">Choisir un compte…</option>`;
      try {
        const snap = await getDocs(query(collection(db, "users"), orderBy("email", "asc"), limit(2000)));
        const users = snap.docs.map((d) => ({ uid: d.id, ...d.data() }));
        users.forEach((u) => {
          const option = document.createElement("option");
          option.value = u.uid;
          option.textContent = userLabel(u.uid, u);
          option.dataset.email = clean(u.email);
          userSelect.appendChild(option);
        });
        result.textContent = `${users.length} compte(s) chargé(s).`;
      } catch (error) {
        result.textContent = "Impossible de charger les comptes.";
      }
    }

    async function sendNotification() {
      const selectedOption = userSelect.options[userSelect.selectedIndex];
      const userUid = clean(userSelect.value);
      const targetEmail = clean(selectedOption?.dataset?.email);
      if (!userUid) {
        result.textContent = "Choisis un compte destinataire.";
        return;
      }

      const title = clean(titleInput.value);
      const message = clean(bodyInput.value);
      const allowReply = allowReplyInput.checked;

      sendBtn.disabled = true;
      result.textContent = "Envoi en cours…";

      try {
        await addDoc(collection(db, "notifications"), {
          type: "admin_text_cta",
          title: title || null,
          message,
          userUid, // toujours présent et correct
          targetEmail: targetEmail || null,
          read: false,
          readAt: null,
          allowReply,
          createdAt: serverTimestamp(),
          createdByAdminUid: auth.currentUser?.uid || null,
          createdByAdminEmail: clean(auth.currentUser?.email) || null
        });
        const emailToSend = targetEmail || null;
        if (emailToSend) {
          try {
            const res = await fetch("/api/email/artist-notification", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                toEmail: emailToSend,
                type: "notification"
              })
            });
            if (!res.ok) {
              const payload = await res.json().catch(() => ({}));
              console.warn("Erreur API email:", payload.error || res.status);
            }
          } catch (e) {
            console.warn("Erreur envoi email Resend:", e);
          }
        }
        bodyInput.value = "";
        titleInput.value = "";
        result.textContent = `Notification envoyée à ${selectedOption?.textContent || userUid}.`;
      } catch (error) {
        result.textContent = error?.message || String(error);
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendNotification);

    async function loadNotifications() {
      const notifUl = document.getElementById("notif-ul");
      const notifLoading = document.getElementById("notif-loading");
      notifUl.innerHTML = "";
      notifLoading.style.display = "block";
      try {
        const snap = await getDocs(query(collection(db, "notifications"), orderBy("createdAt", "desc"), limit(30)));
        notifLoading.style.display = "none";
        if (snap.empty) {
          notifUl.innerHTML = "<li class='muted'>Aucune notification envoyée.</li>";
          return;
        }
        snap.forEach(docSnap => {
          const n = docSnap.data();
          const li = document.createElement("li");
          li.style.padding = "12px 0";
          li.style.borderBottom = "1px solid var(--stroke)";
          li.innerHTML = `
            <strong>${n.title ? n.title : "(Sans titre)"}</strong><br>
            <span class='muted'>${n.message}</span><br>
            <span style='font-size:12px;color:var(--muted)'>Pour: ${n.targetEmail || n.userUid}<br>
            ${n.allowReply ? "Réponse possible" : "Réponse désactivée"}
            ${n.fileUrl ? `<br>Fichier: <a href='${n.fileUrl}' target='_blank'>Voir</a>` : ""}
            </span>
          `;
          notifUl.appendChild(li);
        });
      } catch (error) {
        notifUl.innerHTML = `<li class='muted'>Erreur de chargement: ${error?.message || error}</li>`;
      }
    }

    onAuthStateChanged(auth, async (user) => {
      try {
        const admin = await ensureAdmin(user);
        if (!admin) {
          window.location.href = "/dash/index.html";
          return;
        }
        await loadUsersOptions();
        await loadNotifications();
      } catch (error) {
        result.textContent = error?.message || String(error);
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "/login.html?redirect=" + encodeURIComponent(window.location.href);
        return;
      }

      try {
        const admin = await ensureAdmin(user);
        if (!admin) {
          window.location.href = "/dash/index.html";
          return;
        }
        await loadUsersOptions();
      } catch (error) {
        result.textContent = error?.message || String(error);
      }
    });
  </script>
</body>
</html>
