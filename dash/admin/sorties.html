<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Sorties</title>
  <link rel="stylesheet" href="/assets/css/dash/admin/sidebar.css" />
  <style>
    :root {
      --bg:#e2e2e2;
      --txt:#000;
      --stroke:rgba(0,0,0,.12);
      --card:rgba(255,255,255,.78);
      --muted:rgba(0,0,0,.58);
      --blue:#2f63ff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#414141;
        --txt:#fff;
        --stroke:rgba(255,255,255,.14);
        --card:rgba(30,30,30,.78);
        --muted:rgba(255,255,255,.65);
        --blue:#3b82f6;
      }
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--txt);font-family:Helvetica,sans-serif}
    .wrap{max-width:1200px;margin:0 auto;padding:24px 18px 28px}
    .title{font-size:30px;font-weight:900;margin-bottom:8px}
    .sub{color:var(--muted);margin-bottom:14px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .input,.select{border:1px solid var(--stroke);border-radius:999px;background:transparent;color:var(--txt);padding:10px 12px}
    .input{min-width:260px;flex:1}
    .btn{border:none;border-radius:999px;padding:10px 14px;background:var(--blue);color:#fff;font-weight:900;text-decoration:none;display:inline-block}
    .btn.secondary{background:transparent;color:var(--txt);border:1px solid var(--stroke)}
    .list{display:flex;flex-direction:column;gap:10px}
    .row{border:1px solid var(--stroke);border-radius:18px;background:var(--card);padding:12px;display:flex;justify-content:space-between;gap:12px;align-items:center}
    .name{font-weight:900;font-size:14px}
    .meta{font-size:12px;color:var(--muted);margin-top:4px}
    .status{font-size:11px;border:1px solid var(--stroke);padding:6px 10px;border-radius:999px;white-space:nowrap}
    .actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .muted{color:var(--muted);font-size:12px}
    
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:18px}
    @media(max-width:1024px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:640px){.grid{grid-template-columns:1fr}}
    
    .card{background:var(--card);border:1px solid var(--stroke);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
    .card-cover-wrap{position:relative;width:100%;aspect-ratio:1;overflow:hidden;background:var(--muted);cursor:pointer}
    .card-cover{width:100%;height:100%;object-fit:cover}
    .card-open{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);opacity:0;transition:opacity 0.1s ease-out;will-change:opacity}
    .card-cover-wrap:hover .card-open{opacity:1}
    .card-open span{color:#fff;font-weight:900;font-size:16px}
    
    .card-info{padding:12px;flex:1;display:flex;flex-direction:column;gap:6px}
    .card-title{font-weight:900;font-size:14px;line-height:1.2}
    .card-artist{font-size:12px;color:var(--muted)}
    .card-meta{font-size:11px;color:var(--muted);margin-top:auto}
    .card-actions{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--stroke);flex-wrap:wrap}
    .owner-picker{display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%}
    .owner-picker .select{flex:1;min-width:180px;padding:6px 10px;border-radius:10px;font-size:12px}
    .owner-picker .btn{padding:6px 10px;font-size:11px}
  </style>
</head>
<body>

  <!-- Import Firebase Functions SDK -->
  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-functions.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
      authDomain: "morgann-music-cp.firebaseapp.com",
      projectId: "morgann-music-cp",
      storageBucket: "morgann-music-cp.firebasestorage.app",
      messagingSenderId: "666812685196",
      appId: "1:666812685196:web:fe3df6749ae768d68494a9"
    };
    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    window.firebase = window.firebase || {};
    window.firebase.functions = () => getFunctions(app);
    window.firebase.httpsCallable = httpsCallable;
  </script>
  <script type="module" src="/assets/js/dash/admin/sidebar.js"></script>
  <script type="module" src="/assets/js/dash/admin/sorties.js"></script>


  <main class="wrap">
    <h1 class="title">Gestion des sorties</h1>
    <p class="sub">Recherche, filtre et ouvre les sorties artistes pour les traiter rapidement.</p>

    <div class="toolbar">
      <input id="search" class="input" placeholder="Rechercher titre / artiste / email / id" />
      <select id="statusFilter" class="select">
        <option value="all">Tous les statuts</option>
        <option value="1">Envoyé à MMCP</option>
        <option value="2">Validée MMCP</option>
        <option value="3">Livrée (acceptée, pas publique)</option>
        <option value="4">En ligne</option>
        <option value="5">Refusée</option>
      </select>
      <a class="btn" href="/dash/admin/create-release.html">Créer une sortie</a>
    </div>

    <div class="muted" id="countInfo">Chargement…</div>
    <section class="grid" id="grid"></section>

  </main>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, collection, query, getDocs, limit, doc, getDoc, orderBy, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
      authDomain: "morgann-music-cp.firebaseapp.com",
      projectId: "morgann-music-cp",
      storageBucket: "morgann-music-cp.firebasestorage.app",
      messagingSenderId: "666812685196",
      appId: "1:666812685196:web:fe3df6749ae768d68494a9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const listEl = document.getElementById("list");
    const searchEl = document.getElementById("search");
    const statusFilterEl = document.getElementById("statusFilter");
    const countInfo = document.getElementById("countInfo");

    let allReleases = [];
    let allAccounts = [];

    function clean(v){ return String(v || "").trim(); }

    function escapeHtml(v){
      return String(v || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function domIdForRelease(id){
      return `owner-select-${String(id || "").replace(/[^a-zA-Z0-9_-]/g, "_")}`;
    }

    function accountLabel(account){
      const name = clean(account.displayName || account.artistName || account.name);
      const email = clean(account.email);
      const uid = clean(account.uid || account.id);
      if (name && email) return `${name} · ${email}`;
      if (name) return `${name} · ${uid}`;
      if (email) return `${email} · ${uid}`;
      return uid || "Compte";
    }

    function ownerOptionsHtml(currentOwnerUid){
      const current = clean(currentOwnerUid);
      const hasCurrent = current && allAccounts.some((a) => clean(a.uid || a.id) === current);

      const options = [];
      options.push(`<option value="">Choisir un compte…</option>`);

      if (current && !hasCurrent) {
        options.push(`<option value="${escapeHtml(current)}" selected>${escapeHtml(current)} (compte introuvable)</option>`);
      }

      allAccounts.forEach((account) => {
        const uid = clean(account.uid || account.id);
        if (!uid) return;
        const selected = uid === current ? " selected" : "";
        options.push(`<option value="${escapeHtml(uid)}"${selected}>${escapeHtml(accountLabel(account))}</option>`);
      });

      return options.join("");
    }

    function toDate(ts){
      try { return ts?.toDate ? ts.toDate() : null; } catch { return null; }
    }

    function fmtDate(ts){
      const d = toDate(ts);
      return d ? d.toLocaleString("fr-FR", { dateStyle: "short", timeStyle: "short" }) : "—";
    }

    function statusCodeOf(item){
      const explicit = clean(item.statusCode);
      if (explicit) return explicit;
      const raw = clean(item.statusAdmin || item.statusUser || item.status).toLowerCase();
      if (raw.includes("refus")) return "5";
      if (raw.includes("en ligne")) return "4";
      if (raw.includes("livr")) return "3";
      if (raw.includes("valid")) return "2";
      return "1";
    }

    function statusLabel(code){
      const map = {
        "1": "📤 Envoyé à MMCP",
        "2": "✅ Validée MMCP",
        "3": "🚀 Livrée (acceptée, pas publique)",
        "4": "🎵 En ligne",
        "5": "❌ Refusée"
      };
      return map[code] || "—";
    }

    function firstUrl(...values){
      for (const value of values){
        if (typeof value !== "string") continue;
        const url = clean(value);
        if (url) return url;
      }
      return "";
    }

    function mediaUrlFromTrack(track, candidateKeys){
      const t = (track && typeof track === "object") ? track : {};
      const file = (t.files && typeof t.files === "object") ? t.files : {};
      const sources = [];

      for (const key of candidateKeys) {
        sources.push(file?.[key]);
        sources.push(t?.[key]);
      }

      sources.push(t?.file?.url);
      sources.push(file?.url);

      return firstUrl(...sources);
    }

    function releaseDownloadUrls(item){
      const tracks = Array.isArray(item?.tracks) ? item.tracks : [];
      let audio = "";
      let instru = "";
      let atmos = "";

      for (const t of tracks){
        if (!audio) {
          audio = mediaUrlFromTrack(t, ["audioUrl", "fileUrl", "url"]);
        }
        if (!instru) {
          instru = firstUrl(
            mediaUrlFromTrack(t, ["instrumentalUrl", "instrumentalAudioUrl", "instruUrl", "instrumental"]),
            t?.instrumentalFile?.url
          );
        }
        if (!atmos) {
          atmos = firstUrl(
            mediaUrlFromTrack(t, ["atmosUrl", "dolbyUrl", "dolbyAtmosUrl", "audioDolbyUrl", "atmos", "dolby", "dolbyAtmos"]),
            t?.atmosFile?.url,
            t?.dolbyFile?.url
          );
        }
        if (audio && instru && atmos) break;
      }

      return { audio, instru, atmos };
    }

    function cardHtml(item){
      const code = statusCodeOf(item);
      const isProcessed = item?.adminProcessed === true;
      const cover = clean(item?.assets?.coverUrl || "/assets/img/1.png");
      const title = clean(item.title) || "Sans titre";
      const artist = clean(item.artistName || item.artist) || "—";
      const ownerUid = clean(item.ownerUid);
      const ownerSelectId = domIdForRelease(item.id);
      
      return `
        <article class="card">
          <div class="card-cover-wrap">
            <img class="card-cover" src="${cover}" alt="Pochette ${title}">
            <a class="card-open" href="/dash/admin/release.html?id=${encodeURIComponent(item.id)}"><span>Ouvrir</span></a>
          </div>
          <div class="card-info">
            <div class="card-title">${title}</div>
            <div class="card-artist">${artist}</div>
            <div class="card-meta">Statut: ${statusLabel(code).replace(/[📤✅🚀🎵❌]/g, "").trim()}</div>
            <div class="card-meta">Compte propriétaire: ${ownerUid || "—"}</div>
          </div>
          <div class="card-actions">
            <div class="owner-picker">
              <select id="${ownerSelectId}" class="select" data-owner-select="${item.id}">
                ${ownerOptionsHtml(ownerUid)}
              </select>
              <button class="btn secondary" type="button" data-save-owner="${item.id}" style="font-size:11px;">Changer compte</button>
            </div>
            <button class="btn secondary" data-mark-processed="${item.id}" style="font-size:11px;padding:6px 10px;" ${isProcessed ? "disabled" : ""}>${isProcessed ? "✅ Traité" : "Marquer traité"}</button>
            <button class="btn" data-send-release-email="${item.id}" style="font-size:11px;padding:6px 10px;background:#2ecc40;">✉️ Renvoyer email sortie</button>
          </div>
        </article>
      `;
    }

    function render(){
      const q = clean(searchEl.value).toLowerCase();
      const sf = clean(statusFilterEl.value);

      const filtered = allReleases.filter((item) => {
        const code = statusCodeOf(item);
        if (sf !== "all" && code !== sf) return false;

        if (!q) return true;
        const hay = [
          item.id,
          item.title,
          item.artistName,
          item.artist,
          item.ownerEmail,
          item.ownerUid,
          item.statusAdmin,
          item.statusUser
        ].map(clean).join(" ").toLowerCase();

        return hay.includes(q);
      });

      countInfo.textContent = `${filtered.length} sortie(s) affichée(s) sur ${allReleases.length}`;
      const gridEl = document.getElementById("grid");
      gridEl.innerHTML = filtered.length ? filtered.map(cardHtml).join("") : `<div class="muted">Aucune sortie trouvée.</div>`;

      gridEl.querySelectorAll("button[data-mark-processed]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-mark-processed");
          if (!id) return;
          btn.disabled = true;
          try {
            await updateDoc(doc(db, "releases", id), {
              adminProcessed: true,
              adminProcessedAt: serverTimestamp(),
              adminProcessedBy: auth.currentUser?.uid || null,
              updatedAt: serverTimestamp()
            });
            const row = allReleases.find((r) => r.id === id);
            if (row) row.adminProcessed = true;
            render();
          } catch (e) {
            alert("Erreur marquage traité: " + (e?.message || String(e)));
            btn.disabled = false;
          }
        });
      });

      // Ajout du bouton pour renvoyer l'email de sortie
      gridEl.querySelectorAll("button[data-send-release-email]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-send-release-email");
          if (!id) return;
          btn.disabled = true;
          btn.textContent = "Envoi...";
          try {
            const release = allReleases.find((r) => r.id === id);
            if (!release) throw new Error("Sortie introuvable");
            // Construction du contenu de l'email
            const toEmail = release.ownerEmail || release.email || "";
            const artistName = release.artistName || release.artist || "Artiste";
            const subject = `Nouvelle sortie : ${release.title || "Sans titre"}`;
            const body = `Une nouvelle sortie est disponible !<br><br><strong>${release.title || "Sans titre"}</strong><br>${artistName}<br><img src='${release.assets?.coverUrl || ""}' style='max-width:180px;border-radius:12px;margin:18px 0;'><br><a href='https://mm-cp.uk/play/index.html?id=${id}'>Voir la sortie</a>`;
            // Appel correct à la fonction cloud
            const { getFunctions, httpsCallable } = await import("https://www.gstatic.com/firebasejs/12.9.0/firebase-functions.js");
            const functions = getFunctions();
            const sendBrevoEmail = httpsCallable(functions, "adminSendBrevoEmail");
            await sendBrevoEmail({ toEmail, artistName, subject, body });
            btn.textContent = "✉️ Email envoyé !";
          } catch (e) {
            alert("Erreur envoi email: " + (e?.message || String(e)));
            btn.textContent = "✉️ Renvoyer email sortie";
          } finally {
            setTimeout(() => { btn.disabled = false; btn.textContent = "✉️ Renvoyer email sortie"; }, 3000);
          }
        });
      });

      gridEl.querySelectorAll("button[data-save-owner]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = clean(btn.getAttribute("data-save-owner"));
          if (!id) return;

          const select = gridEl.querySelector(`select[data-owner-select="${id}"]`);
          const ownerUid = clean(select?.value);
          if (!ownerUid) {
            alert("Choisis un compte propriétaire.");
            return;
          }

          const account = allAccounts.find((a) => clean(a.uid || a.id) === ownerUid);
          const ownerEmail = clean(account?.email);

          btn.disabled = true;
          const previousText = btn.textContent;
          btn.textContent = "Enregistrement…";

          try {
            await updateDoc(doc(db, "releases", id), {
              ownerUid,
              ownerEmail: ownerEmail || null,
              ownerChangedAt: serverTimestamp(),
              ownerChangedBy: auth.currentUser?.uid || null,
              updatedAt: serverTimestamp()
            });

            const row = allReleases.find((r) => r.id === id);
            if (row) {
              row.ownerUid = ownerUid;
              row.ownerEmail = ownerEmail || null;
            }
            render();
          } catch (e) {
            alert("Erreur changement compte: " + (e?.message || String(e)));
            btn.disabled = false;
            btn.textContent = previousText;
          }
        });
      });
    }

    async function requireAdmin(user){
      const snap = await getDoc(doc(db, "users", user.uid));
      const role = snap.exists() ? clean(snap.data()?.role).toLowerCase() : "";
      if (role !== "admin") {
        window.location.href = "/dash/index.html";
        return false;
      }
      return true;
    }

    async function loadReleases(){
      let snap;
      try {
        snap = await getDocs(query(collection(db, "releases"), orderBy("createdAt", "desc"), limit(600)));
      } catch {
        snap = await getDocs(query(collection(db, "releases"), limit(600)));
      }
      allReleases = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    }

    async function loadAccounts(){
      const snap = await getDocs(query(collection(db, "users"), limit(1200)));
      allAccounts = snap.docs
        .map((d) => ({ id: d.id, uid: clean(d.data()?.uid || d.id), ...d.data() }))
        .sort((a, b) => accountLabel(a).localeCompare(accountLabel(b), "fr", { sensitivity: "base" }));
    }

    searchEl.addEventListener("input", render);
    statusFilterEl.addEventListener("change", render);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "/login.html";
        return;
      }
      const ok = await requireAdmin(user);
      if (!ok) return;
      await loadAccounts();
      await loadReleases();
    });
  </script>
</body>
</html>
