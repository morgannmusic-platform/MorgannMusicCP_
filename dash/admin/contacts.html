<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - Contacts publics</title>
  <link rel="stylesheet" href="/assets/css/dash/admin/sidebar.css" />
  <style>
    :root { --bg:#e2e2e2; --txt:#000; --stroke:rgba(0,0,0,.12); --card:rgba(255,255,255,.78); --muted:rgba(0,0,0,.6); --blue:#2f63ff; --green:#16a34a; }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#414141; --txt:#fff; --stroke:rgba(255,255,255,.14); --card:rgba(30,30,30,.78); --muted:rgba(255,255,255,.65); --blue:#3b82f6; --green:#22c55e; }
    }
    * { box-sizing:border-box; }
    html, body { margin:0; background:var(--bg); color:var(--txt); font-family:Helvetica,sans-serif; }
    .wrap { max-width:1200px; margin:0 auto; padding:24px 18px 28px; }
    .title { font-size:30px; font-weight:900; margin-bottom:8px; }
    .sub { color:var(--muted); margin-bottom:14px; }
    .list { display:flex; flex-direction:column; gap:10px; }
    .card { border:1px solid var(--stroke); border-radius:18px; background:var(--card); overflow:hidden; }
    .head { padding:12px; display:flex; justify-content:space-between; align-items:center; gap:8px; cursor:pointer; }
    .meta { color:var(--muted); font-size:12px; }
    .body { display:none; padding:12px; border-top:1px solid var(--stroke); }
    .textarea, .input { width:100%; border:1px solid var(--stroke); border-radius:12px; background:transparent; color:var(--txt); padding:10px 12px; font:inherit; }
    .textarea { min-height:120px; resize:vertical; }
    .btn { border:none; border-radius:999px; padding:10px 14px; background:var(--blue); color:#fff; font-weight:900; cursor:pointer; }
    .btn.ok { background:var(--green); }
    .controls { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  </style>
</head>
<body>
  <script type="module" src="/assets/js/dash/admin/sidebar.js"></script>

  <main class="wrap">
    <h1 class="title">Messages contact publics</h1>
    <p class="sub">Messages envoyes depuis la page Contact, avec reponse email depuis l'admin.</p>
    <section id="list" class="list"></section>
  </main>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, getDocs, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
      authDomain: "morgann-music-cp.firebaseapp.com",
      projectId: "morgann-music-cp",
      storageBucket: "morgann-music-cp.firebasestorage.app",
      messagingSenderId: "666812685196",
      appId: "1:666812685196:web:fe3df6749ae768d68494a9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const listEl = document.getElementById("list");

    function clean(v) { return String(v || "").trim(); }
    function fmt(ts) {
      const d = ts?.toDate ? ts.toDate() : null;
      return d ? d.toLocaleString("fr-FR", { dateStyle: "short", timeStyle: "short" }) : "-";
    }

    function isAdminData(data) {
      const role = String(data?.role || "").toLowerCase();
      return role === "admin" || role === "staff" || data?.isAdmin === true || data?.admin === true;
    }

    async function ensureAdmin(user) {
      const token = await user.getIdTokenResult();
      if (token?.claims?.admin === true || token?.claims?.staff === true) return true;
      const snap = await getDoc(doc(db, "users", user.uid));
      return snap.exists() && isAdminData(snap.data());
    }

    function card(x) {
      return `
        <article class="card">
          <div class="head" data-open="${x.id}">
            <div>
              <div><strong>${clean(x.subject) || "Sans objet"}</strong></div>
              <div class="meta">${clean(x.email) || "-"} • ${fmt(x.createdAt)}</div>
            </div>
            <div class="meta">${x.responded ? "Repondu" : "Nouveau"}</div>
          </div>
          <div class="body" id="body-${x.id}">
            <p>${clean(x.body) || ""}</p>
            <hr style="border:0;border-top:1px solid rgba(127,127,127,.25);margin:12px 0;">
            <label for="reply-${x.id}">Reponse admin</label>
            <textarea id="reply-${x.id}" class="textarea" placeholder="Ecrire la reponse email...">${clean(x.adminReply || "")}</textarea>
            <div class="controls">
              <button class="btn ok" data-send="${x.id}">Envoyer la reponse</button>
            </div>
          </div>
        </article>
      `;
    }

    async function loadMessages() {
      const q = query(collection(db, "contactMessages"), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      if (snap.empty) {
        listEl.innerHTML = '<article class="card"><div class="head"><div><strong>Aucun message</strong></div></div></article>';
        return;
      }
      const rows = snap.docs.map((d) => ({ id: d.id, ...(d.data() || {}) }));
      listEl.innerHTML = rows.map(card).join("");

      listEl.querySelectorAll("[data-open]").forEach((el) => {
        el.addEventListener("click", () => {
          const id = el.getAttribute("data-open");
          const body = document.getElementById(`body-${id}`);
          if (body) body.style.display = body.style.display === "block" ? "none" : "block";
        });
      });

      listEl.querySelectorAll("[data-send]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-send");
          const item = rows.find((r) => r.id === id);
          if (!item) return;

          const reply = clean(document.getElementById(`reply-${id}`)?.value);
          if (reply.length < 10) {
            alert("La reponse doit faire au moins 10 caracteres.");
            return;
          }

          btn.disabled = true;
          try {
            const res = await fetch("/api/email/brevo", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                toEmail: clean(item.email),
                subject: `Reponse a votre message: ${clean(item.subject) || "Sans objet"}`,
                html: `<div style=\"font-family:Helvetica,Arial,sans-serif\"><p>Bonjour,</p><p>${reply.replace(/\n/g, "<br>")}</p><p>Cordialement,<br>Morgann Music CP</p></div>`,
                text: `Bonjour,\n\n${reply}\n\nCordialement,\nMorgann Music CP`,
                mailCategory: "transactional",
                transactionType: "contact-reply"
              })
            });

            if (!res.ok) {
              const detail = await res.text();
              throw new Error(detail || "Erreur email");
            }

            await updateDoc(doc(db, "contactMessages", id), {
              adminReply: reply,
              responded: true,
              respondedAt: serverTimestamp(),
              status: "responded",
              updatedAt: serverTimestamp()
            });

            await loadMessages();
          } catch (error) {
            alert("Echec envoi: " + (error?.message || String(error)));
          } finally {
            btn.disabled = false;
          }
        });
      });
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "/login.html";
        return;
      }
      try {
        const ok = await ensureAdmin(user);
        if (!ok) {
          window.location.href = "/index.html";
          return;
        }
        await loadMessages();
      } catch {
        window.location.href = "/index.html";
      }
    });
  </script>
</body>
</html>
