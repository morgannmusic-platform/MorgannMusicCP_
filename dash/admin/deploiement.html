<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Déploiements</title>
    <link rel="stylesheet" href="../../../../dev/style.css">
    <script defer src="../../../../dev/theme.js"></script>
    <script defer src="deploiement-admin.js"></script>
</head>
<body>
    <header>
        <h1>Gestion des déploiements</h1>
    </header>
    <main>
        <section>
            <h2>Ajouter un déploiement</h2>
            <form id="deployForm">
                <label>Date du déploiement : <input type="date" name="date" required></label><br><br>
                <label>Nombre de fichiers : <input type="number" name="nbFiles" min="1" required></label><br><br>
                <label>Résumé : <textarea name="resume" required></textarea></label><br><br>
                <button type="submit" class="theme-btn">Ajouter</button>
            </form>
        </section>
        <section>
            <h2>Historique des déploiements</h2>
            <table id="deployTable">
                <thead>
                    <tr><th>Date</th><th>Nombre de fichiers</th><th>Résumé</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>
</body>
</html>
