<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Lecteur AP</title>
    <link rel="stylesheet" href="/assets/css/lecteur-ap.css">
    <link rel="stylesheet" href="/assets/css/dash/admin/sidebar.css" />

</head>
<body>
      <style>
    :root {
      --bg: #e2e2e2;
      --txt: #000000;
      --bg2: #ffffff;
      --stroke: rgba(0,0,0,.12);
      --card: rgba(255,255,255,.78);
      --muted: rgba(0,0,0,.58);
      --blue: #2f63ff;
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #414141;
        --txt: #ffffff;
        --bg2: #1e1e1e;
        --stroke: rgba(255,255,255,.14);
        --card: rgba(30,30,30,.78);
        --muted: rgba(255,255,255,.65);
        --blue: #3b82f6;
        --green: #22c55e;
        --amber: #f59e0b;
        --red: #ef4444;
      }
    }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: Helvetica, sans-serif;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      border-bottom: 1px solid var(--stroke);
      background: rgba(255,255,255,.45);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      z-index: 9999;
    }

    @media (prefers-color-scheme: dark) {
      .topbar { background: rgba(30,30,30,.55); }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      font-size: 14px;
    }

    .pill {
      border: 1px solid var(--stroke);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(0,0,0,.04);
    }

    @media (prefers-color-scheme: dark) {
      .pill { background: rgba(255,255,255,.06); }
    }

    .wrap {
      margin: 0 ;
      padding: 0;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 1200px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      border: 1px solid var(--stroke);
      border-radius: 24px;
      background: var(--card);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      padding: 16px;
    }

    .card h2 {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .metric {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .muted { color: var(--muted); font-size: 12px; }

    .todo {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(0,0,0,.04);
      margin-bottom: 10px;
    }

    @media (prefers-color-scheme: dark) {
      .todo { background: rgba(255,255,255,.05); }
    }

    .badge {
      border: 1px solid var(--stroke);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.green { background: rgba(22,163,74,.14); }
    .badge.amber { background: rgba(217,119,6,.14); }
    .badge.red { background: rgba(220,38,38,.14); }

    .quick-links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .quick-links a {
      text-decoration: none;
      border: 1px solid var(--stroke);
      border-radius: 14px;
      color: var(--txt);
      padding: 11px 12px;
      font-weight: 800;
      font-size: 13px;
      background: rgba(0,0,0,.04);
    }

    @media (prefers-color-scheme: dark) {
      .quick-links a { background: rgba(255,255,255,.05); }
    }

    .wide {
      grid-column: 1 / -1;
    }
  </style>

      <script type="module" src="/assets/js/dash/admin/sidebar.js"></script>

  <header class="topbar">

  </header>
<div class="wrap">
  <div class="ap-admin-header">
    <h1>Gestion des lecteurs avant-première</h1>
    <button id="ap-admin-add" class="ap-admin-add">+ Ajouter un lecteur</button>
  </div>
  <div id="ap-admin-list" class="ap-admin-list"></div>
  <div id="ap-admin-modal" class="ap-modal" style="display:none;">
    <div class="ap-modal-content">
      <h2>Créer un lecteur</h2>
      <input type="text" id="ap-admin-code" placeholder="Code unique" />
      <input type="text" id="ap-admin-title" placeholder="Titre" />
      <input type="text" id="ap-admin-artist" placeholder="Artiste" />
      <input type="file" id="ap-admin-audio" accept="audio/*" />
      <div id="ap-admin-progress-bar" class="ap-admin-progress-bar" style="display:none;">
        <div id="ap-admin-progress" class="ap-admin-progress"></div>
      </div>
      <div class="ap-modal-actions">
        <button id="ap-admin-save">Créer</button>
        <button id="ap-admin-cancel">Annuler</button>
      </div>
      <div id="ap-admin-error" class="ap-error"></div>
    </div>
  </div>
</div>
  <script type="module" src="/assets/js/lecteur-ap-admin.js"></script>
</body>
</html>
