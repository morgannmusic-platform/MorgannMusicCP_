<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Prods</title>
  <link rel="stylesheet" href="/assets/css/dash/admin/sidebar.css" />
  <link rel="stylesheet" href="/assets/css/dash/admin/prods.css" />
</head>
<body>
  <script type="module" src="/assets/js/dash/admin/sidebar.js"></script>

  <main class="wrap">
    <h1>Gestion des prods</h1>
    <p id="status" class="status">Chargement...</p>

    <section class="panel">
      <h2>Ajouter une prod</h2>
      <form id="createForm" class="form-grid" novalidate>
        <input id="titre" placeholder="Titre" required />
        <input id="prix" type="number" min="1" step="0.01" placeholder="Prix (€)" required />
        <input id="stripePriceId" placeholder="Stripe Price ID (price_...)" required />
        <input id="stripeProductId" placeholder="Stripe Product ID (prod_..., optionnel)" />
        <input id="bpm" type="number" min="1" step="1" placeholder="BPM (optionnel)" />
        <input id="genre" placeholder="Genre (optionnel)" />
        <input id="tags" placeholder="Tags (séparés par virgules)" />
        <label class="file-field">Audio (mp3/wav)
          <input id="audio" type="file" accept="audio/*" required />
        </label>
        <label class="file-field">Image cover
          <input id="image" type="file" accept="image/*" required />
        </label>
        <label class="file-field">Pochette animée (mp4, optionnel)
          <input id="animatedCover" type="file" accept="video/mp4" />
        </label>
        <button type="submit" class="btn-primary">Créer la prod</button>
      </form>
    </section>

    <section class="panel">
      <h2>Prods existantes</h2>
      <div id="prodsList" class="prods-list"></div>
    </section>
  </main>

  <script type="module" src="/assets/js/dash/admin/prods.js"></script>
</body>
</html>
