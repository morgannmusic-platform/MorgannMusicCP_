  <!-- CSS base (repris) + ajouts UI -->
  <style>
    :root {
      --bg: #e2e2e2;
      --txt: #000000;
      --cover: #868686;
      --bg2: #ffffff;
      --cover: #bfbfbf;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #414141;
        --txt: #ffffff;
        --cover: #2c2c2c;
        --bg2: #1e1e1e;
        --cover: #575757;
      }
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--txt);
      margin-top: 40px;
      font-family: 'Poppins', sans-serif;
    }

    .titre-page {
      color: var(--txt);
      padding: 30px;
      margin-top: 6px;
      text-align: center;
      font-size: 28pt;
    }
    @media (max-width: 768px) {
      .titre-page { font-size: 17pt; }
    }

    .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 18px 40px;
    }

    .topbar{
      display:flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .left{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-wrap{
      position: relative;
      display:flex;
      align-items:center;
      min-width: min(360px, 82vw);
      flex: 1;
    }

    .search-icon{
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      object-fit: contain;
      object-position: center;
      opacity: 0.62;
      pointer-events: none;
    }

    .search-input{
      width: 100%;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.55);
      color: var(--txt);
      padding: 0 16px 0 42px;
      font-weight: 700;
      outline: none;
    }

    .search-input::placeholder{
      opacity: 0.65;
      font-weight: 600;
    }

    .search-input:focus{
      border-color: rgba(0,0,0,0.35);
    }

    @media (prefers-color-scheme: dark){
      .search-input{
        background: rgba(30,30,30,0.55);
        border-color: rgba(255,255,255,0.2);
      }

      .search-input:focus{
        border-color: rgba(255,255,255,0.45);
      }
    }

    .pill{
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(0,0,0,0.10);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      font-weight: 900;
      font-size: 11pt;
    }
    @media (prefers-color-scheme: dark){
      .pill{
        background: rgba(30,30,30,0.55);
        border: 1px solid rgba(255,255,255,0.12);
      }
    }

    .btn{
      display:inline-block;
      padding: 12px 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: var(--cover);
      color: var(--txt);
      font-weight: 900;
      text-decoration:none;
      text-align:center;
      white-space: nowrap;
    }

    .btn-outline{
      background: transparent;
      border: 1px solid rgba(0,0,0,0.15);
    }
    @media (prefers-color-scheme: dark){
      .btn-outline{ border: 1px solid rgba(255,255,255,0.18); }
    }

    .btn-danger{
      background: transparent;
      border: 1px solid rgba(220,38,38,0.45);
      color: #dc2626;
    }

    .grid{
      margin-top: 16px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media (max-width: 1000px){
      .grid{ grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 700px){
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      background: rgba(255,255,255,0.55);
      border-radius: 26px;
      padding: 16px;
      border: 1px solid rgba(0,0,0,0.08);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      overflow: hidden;
      position: relative;
    }
    @media (prefers-color-scheme: dark){
      .card{
        background: rgba(30,30,30,0.55);
        border: 1px solid rgba(255,255,255,0.10);
      }
    }

    .release-cover-wrap{
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(0,0,0,0.12);
      margin-bottom: 12px;
    }

    .release-cover{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cover-open{
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      opacity: 0;
      transition: opacity 0.1s ease-out;
      will-change: opacity;
      text-decoration: none;
    }

    .release-cover-wrap:hover .cover-open,
    .release-cover-wrap:focus-within .cover-open{
      opacity: 1;
    }

    .cover-open span{
      color: #fff;
      font-weight: 900;
      border: 1px solid rgba(255,255,255,0.45);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,0.25);
    }

    @media (prefers-color-scheme: dark){
      .release-cover{
        border: 1px solid rgba(255,255,255,0.12);
      }
    }

    .title{
      font-weight: 900;
      font-size: 13pt;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
      max-width: 100%;
    }

    .artist-line{
      margin-top: 6px;
      opacity: 0.8;
      font-size: 11pt;
    }

    .tags{
      margin-top: 10px;
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag{
      font-size: 10pt;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.06);
      opacity: 0.9;
      white-space: nowrap;
    }
    @media (prefers-color-scheme: dark){
      .tag{ background: rgba(255,255,255,0.08); }
    }

    .artist-actions{
      margin-top: 10px;
      display:flex;
      gap: 10px;
      align-items: center;
    }

    .icon-btn{
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.16);
      background: transparent;
      color: var(--txt);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
    }

    .icon-btn.icon-danger{
      border-color: rgba(220,38,38,0.45);
      color: #dc2626;
    }

    @media (prefers-color-scheme: dark){
      .icon-btn{ border-color: rgba(255,255,255,0.2); }
    }

    .empty{
      margin-top: 18px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(0,0,0,0.07);
      opacity: 0.85;
    }
    @media (prefers-color-scheme: dark){
      .empty{
        background: rgba(30,30,30,0.45);
        border: 1px solid rgba(255,255,255,0.10);
      }
    }

    .pager{
      margin-top: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pager-btn{
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.16);
      background: rgba(255,255,255,0.6);
      color: var(--txt);
      font-weight: 900;
      cursor: pointer;
    }

    .pager-btn.is-active{
      background: var(--txt);
      color: var(--bg);
      border-color: transparent;
    }

    @media (prefers-color-scheme: dark){
      .pager-btn{
        background: rgba(30,30,30,0.6);
        border: 1px solid rgba(255,255,255,0.2);
      }
    }

    .pied-de-page {
      width: 100%;
      height: 60px;
      text-align: center;
      font-size: 10pt;
      color: var(--txt);
      padding: 20px;
      background: var(--bg2);
      margin-top: 50px;
      position: relative;
      overflow: hidden;
    }

    .pied-de-page::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 340px;
      pointer-events: none;
      background: linear-gradient(90deg, var(--bg) 0%, rgba(0, 0, 0, 0) 100%);
    }

    #page-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 60px 0 40px;
    }
    #page-loader svg { width: 120px; height: 120px; display: block; }
    #page-loader p { font-size: 14px; opacity: .5; }
    @keyframes mmcp-blink {
      0%   { opacity: 1;    transform: translateY(0); }
      50%  { opacity: 0.12; transform: translateY(-3px); }
      100% { opacity: 1;    transform: translateY(0); }
    }
    #mmcp-part-1 { animation: mmcp-blink 1.2s ease-in-out infinite; }
    #mmcp-part-2 { animation: mmcp-blink 1.4s ease-in-out infinite 0.08s; }
    #mmcp-part-3 { animation: mmcp-blink 1.6s ease-in-out infinite 0.16s; }
  </style>

</head>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      query,
      where,
      orderBy,
      limit,
      getDocs,
      getDoc,
      deleteDoc,
      doc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
      authDomain: "morgann-music-cp.firebaseapp.com",
      projectId: "morgann-music-cp",
      storageBucket: "morgann-music-cp.firebasestorage.app",
      messagingSenderId: "666812685196",
      appId: "1:666812685196:web:fe3df6749ae768d68494a9"
    };

    const toast = sessionStorage.getItem("toast");
if (toast) {
  sessionStorage.removeItem("toast");
  alert(toast);
}
    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const $ = (id) => document.getElementById(id);
    const grid = $("grid");
    const emptyBox = $("emptyBox");
    const countPill = $("countPill");
    const userPill = $("userPill");
    const vipPill = $("vipPill");
    const btnCreate = $("btnCreate");
    const pager = $("pager");
    const searchInput = $("searchInput");
    let canAccessAllReleases = false;
    let currentReleases = [];
    let currentPage = 1;
    let searchTerm = "";

    function getItemsPerPage(){
      if (window.matchMedia("(max-width: 700px)").matches) return 2;  // 1 col x 2 lignes
      if (window.matchMedia("(max-width: 1000px)").matches) return 4; // 2 cols x 2 lignes
      return 6; // 3 cols x 2 lignes
    }

    function renderPagination(totalItems, itemsPerPage){
      const totalPages = Math.max(1, Math.ceil(totalItems / itemsPerPage));
      if (!pager) return totalPages;

      pager.innerHTML = "";
      if (totalPages <= 1){
        pager.style.display = "none";
        return totalPages;
      }

      pager.style.display = "flex";
      for (let p = 1; p <= totalPages; p++){
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "pager-btn" + (p === currentPage ? " is-active" : "");
        btn.textContent = String(p);
        btn.addEventListener("click", () => {
          currentPage = p;
          render(currentReleases);
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        pager.appendChild(btn);
      }

      return totalPages;
    }

    function isPayPerReleasePlanActive(){
      try {
        return clean(localStorage.getItem("mmcpSelectedPlan")).toLowerCase() === "pay-per-release";
      } catch {
        return false;
      }
    }

    function syncCreateReleaseLink(){
      if (!btnCreate) return;
      btnCreate.setAttribute("href", isPayPerReleasePlanActive() ? "/dash/upload.html?plan=pay-per-release" : "/dash/upload.html");
    }

    function clean(s){ return String(s || "").trim(); }

    function fmtDate(ts){
      try{
        const d = ts?.toDate ? ts.toDate() : null;
        if (!d) return "";
        return d.toLocaleDateString("fr-FR");
      }catch{ return ""; }
    }

    function parseReleaseDate(r){
      const raw = clean(r?.schedule?.releaseDate || r.releaseDate);
      if (!raw) return null;
      const d = new Date(raw + "T00:00:00");
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function countdownText(r){
      const date = parseReleaseDate(r);
      if (!date) return "Date de sortie non définie";
      const diff = date.getTime() - Date.now();
      if (diff <= 0) return "Sortie publiée ou en cours";
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      return `J-${days} (${hours}h)`;
    }

    function isVipUserData(data){
      if (!data || typeof data !== "object") return false;
      const role = clean(data.role).toLowerCase();
      const status = clean(data.status).toLowerCase();
      const plan = clean(data.plan).toLowerCase();
      const accountType = clean(data.accountType).toLowerCase();
      const subscription = clean(data.subscription).toLowerCase();
      return (
        data.vip === true ||
        data.isVip === true ||
        role === "vip" ||
        status === "vip" ||
        plan === "vip" ||
        accountType === "vip" ||
        subscription === "vip"
      );
    }

    async function getUserProfileData(user){
      if (!user) return null;

      try {
        const byUid = await getDoc(doc(db, "users", user.uid));
        if (byUid.exists()) return byUid.data();
      } catch (e) {
        console.warn("users/{uid} inaccessible:", e);
      }

      if (user.email) {
        try {
          const byEmailQ = query(collection(db, "users"), where("email", "==", user.email), limit(1));
          const byEmail = await getDocs(byEmailQ);
          if (!byEmail.empty) return byEmail.docs[0].data();
        } catch (e) {
          console.warn("users by email inaccessible:", e);
        }
      }

      return null;
    }

    async function loadReleases(uid, includeAll=false){
      try{
        if (includeAll){
          const all = [];
          try{
            const qAll = query(
              collection(db, "releases"),
              orderBy("createdAt", "desc"),
              limit(300)
            );
            const snapAll = await getDocs(qAll);
            snapAll.forEach(d => all.push({ id: d.id, ...d.data() }));
          }catch(e){
            console.warn("loadReleases: full access ordered query failed, fallback simple query", e);
            try {
              const qAllFallback = query(collection(db, "releases"), limit(300));
              const snapAllFallback = await getDocs(qAllFallback);
              snapAllFallback.forEach(d => all.push({ id: d.id, ...d.data() }));
            } catch (e2) {
              console.warn("loadReleases: full access fallback failed", e2);
            }
          }

          try {
            const qMine = query(
              collection(db, "releases"),
              where("ownerUid", "==", uid),
              orderBy("createdAt", "desc"),
              limit(150)
            );
            const snapMine = await getDocs(qMine);
            snapMine.forEach(d => all.push({ id: d.id, ...d.data() }));
          } catch (e) {
            console.warn("loadReleases: include owner query failed in VIP mode", e);
            try {
              const qMineFallback = query(
                collection(db, "releases"),
                where("ownerUid", "==", uid),
                limit(200)
              );
              const snapMineFallback = await getDocs(qMineFallback);
              snapMineFallback.forEach(d => all.push({ id: d.id, ...d.data() }));
            } catch (e2) {
              console.warn("loadReleases: include owner fallback query failed in VIP mode", e2);
            }
          }

          const byId = {};
          all.forEach(r => { byId[r.id] = r; });
          const uniq = Object.values(byId);

          uniq.sort((a,b) => {
            const ta = a.createdAt?.toMillis ? a.createdAt.toMillis() : (a.createdAt ? new Date(a.createdAt).getTime() : 0);
            const tb = b.createdAt?.toMillis ? b.createdAt.toMillis() : (b.createdAt ? new Date(b.createdAt).getTime() : 0);
            return tb - ta;
          });

          if (!uniq.length) {
            return await loadReleases(uid, false);
          }

          return uniq;
        }

        const artistIds = [];
        try{
          const qA = query(collection(db, "artists"), where("ownerUid", "==", uid));
          const snapA = await getDocs(qA);
          snapA.forEach(d => artistIds.push(d.id));
        }catch(e){ /* silent */ }

        const docs = [];

        try{
          const q1 = query(
            collection(db, "releases"),
            where("ownerUid", "==", uid),
            orderBy("createdAt", "desc"),
            limit(50)
          );
          const s1 = await getDocs(q1);
          s1.forEach(d => docs.push({ id: d.id, ...d.data() }));
        }catch(e){
          console.warn("loadReleases: ordered ownerUid query failed, fallback simple query", e);
          try {
            const q1b = query(collection(db, "releases"), where("ownerUid", "==", uid), limit(100));
            const s1b = await getDocs(q1b);
            s1b.forEach(d => docs.push({ id: d.id, ...d.data() }));
          } catch (e2) {
            console.warn("loadReleases: fallback ownerUid query failed", e2);
          }
        }

        if (artistIds.length){
          for (let i = 0; i < artistIds.length; i += 10){
            const chunk = artistIds.slice(i, i + 10);
            try{
              const q2 = query(collection(db, "releases"), where("mainArtistId", "in", chunk), limit(50));
              const s2 = await getDocs(q2);
              s2.forEach(d => docs.push({ id: d.id, ...d.data() }));
            }catch(e){ /* silent */ }
            try{
              const q3 = query(collection(db, "releases"), where("artistId", "in", chunk), limit(50));
              const s3 = await getDocs(q3);
              s3.forEach(d => docs.push({ id: d.id, ...d.data() }));
            }catch(e){ console.warn("loadReleases: artistId query failed", e); }
          }
        }
        const byId = {};
        docs.forEach(r => { byId[r.id] = r; });
        const uniq = Object.values(byId);
        uniq.sort((a,b) => {
          const ta = a.createdAt?.toMillis ? a.createdAt.toMillis() : (a.createdAt ? new Date(a.createdAt).getTime() : 0);
          const tb = b.createdAt?.toMillis ? b.createdAt.toMillis() : (b.createdAt ? new Date(b.createdAt).getTime() : 0);
          return tb - ta;
        });

        console.debug("loadReleases: merged count=", uniq.length, "ownerCount(approx)=", docs.length);
        return uniq;
      }catch(e){
        console.warn("loadReleases:", e);
        return [];
      }
    }

    function render(list){
      currentReleases = Array.isArray(list) ? list : [];
      grid.innerHTML = "";

      const filtered = currentReleases.filter((r) => {
        if (!searchTerm) return true;
        const hay = [
          clean(r.title),
          clean(r.artistName),
          clean(r.type),
          clean(r.statusUser),
          clean(r.statusAdmin),
          clean(r?.schedule?.releaseDate || r.releaseDate)
        ].join(" ").toLowerCase();
        return hay.includes(searchTerm);
      });

      countPill.textContent = filtered.length + (filtered.length > 1 ? " sorties" : " sortie");

      const itemsPerPage = getItemsPerPage();
      const totalPages = renderPagination(filtered.length, itemsPerPage);
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      if (!filtered.length){
        emptyBox.style.display = "block";
        emptyBox.textContent = searchTerm ? "Aucun résultat pour cette recherche." : "Aucune sortie pour le moment.";
        if (pager) pager.style.display = "none";
        return;
      }
      emptyBox.style.display = "none";

      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageItems = filtered.slice(start, end);

      for (const r of pageItems){
        const title = clean(r.title) || "Release";
        const artist = clean(r.artistName) || "—";
        const date = clean(r?.schedule?.releaseDate || r.releaseDate) || fmtDate(r.createdAt);
        const cover = clean(r?.assets?.coverUrl || r?.play?.coverUrl || "/assets/img/1.png");

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="release-cover-wrap">
              <img class="release-cover" src="${cover}" alt="Pochette ${title}">
              <a class="cover-open" href="/dash/release.html?id=${encodeURIComponent(r.id)}"><span>Ouvrir</span></a>
            </div>

          <div style="min-width:0;">
            <div class="title">${title}</div>
            <div class="artist-line">${artist}${date ? " • " + date : ""}</div>
          </div>

          <div class="artist-actions">
            <a class="icon-btn" href="/dash/upload.html?edit=${encodeURIComponent(r.id)}" title="Modifier" aria-label="Modifier"><img class="sidebar__icon" src="/assets/icon/music-edit-multimedia-svgrepo-com.svg" alt=""></a>
            <button class="icon-btn icon-danger" data-del="${r.id}" title="Supprimer" aria-label="Supprimer"><img class="sidebar__icon" src="/assets/icon/trash.png" alt=""></button>
          </div>
        `;

        card.querySelector("[data-del]")?.addEventListener("click", async () => {
          const ok = confirm("Supprimer cette sortie ?");
          if (!ok) return;
          try{
            await deleteDoc(doc(db, "releases", r.id));
            const fresh = await loadReleases(auth.currentUser.uid, canAccessAllReleases);
            render(fresh);
          }catch(e){
            alert(e?.message || String(e));
          }
        });

        grid.appendChild(card);
      }
    }

    const pageLoader = $("page-loader");

    onAuthStateChanged(auth, async (user) => {
      if (!user){
        const here = window.location.href;
        window.location.href = "/login.html?redirect=" + encodeURIComponent(here);
        return;
      }

      syncCreateReleaseLink();

      userPill.textContent = user.email || "Connecté";

      const userData = await getUserProfileData(user);
      canAccessAllReleases = isVipUserData(userData);

      if (canAccessAllReleases) {
        vipPill.style.display = "inline-block";
        vipPill.textContent = "👑 VIP — accès complet";
      } else {
        vipPill.style.display = "none";
      }

      const list = await loadReleases(user.uid, canAccessAllReleases);
      currentPage = 1;
      pageLoader.style.display = "none";
      render(list);
    });

    searchInput?.addEventListener("input", () => {
      searchTerm = clean(searchInput.value).toLowerCase();
      currentPage = 1;
      render(currentReleases);
    });

    let _lastItemsPerPage = getItemsPerPage();
    window.addEventListener("resize", () => {
      const next = getItemsPerPage();
      if (next !== _lastItemsPerPage){
        _lastItemsPerPage = next;
        render(currentReleases);
      }
    });


  </script>
    <script src="/assets/js/dash/artist-sidebar.js"></script>

</body>
</html>
