<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Dernièrement - Catalogue MMCP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="/assets/js/navbar.js" defer></script>
    <script src="/assets/footers/accueil/footer.js" defer></script>
    <link rel="stylesheet" href="/assets/css/styles-accueil.css">
    <link rel="stylesheet" href="/assets/footers/accueil/footer.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            color: #333;
            margin-top: 80px;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* --- PILL NAVBAR --- */
        .pill-nav-container {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(189, 189, 189, 0.4);
            border-radius: 35px;
            padding: 20px 25px;
            margin: 0 auto 30px auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            gap: 15px;
            box-sizing: border-box;
        }

        .pill-tabs {
            display: inline-flex;
            gap: 8px;
            background: rgba(235, 238, 242, 0.7);
            padding: 6px;
            border-radius: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .pill-link {
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            color: #555;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .pill-link:hover,
        .pill-link.active {
            background: #FC8FB0;
            color: white;
        }

        .pill-search-bar {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .pill-search-bar input {
            width: 100%;
            padding: 12px 22px;
            border-radius: 25px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
            box-sizing: border-box;
            background: #ffffff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .pill-search-bar input:focus {
            border-color: #FC8FB0;
            box-shadow: 0 0 8px rgba(252, 143, 176, 0.3);
        }

        /* --- HEADER PAGE --- */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 26px;
            font-weight: 800;
            margin: 0;
        }

        .results-count {
            font-size: 14px;
            color: #777;
            font-weight: 600;
        }

        /* --- SECTIONS DERNIÈREMENT --- */
        .recent-list {
            display: flex;
            flex-direction: column;
            gap: 40px;
            margin-bottom: 50px;
        }

        .release-section {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(189, 189, 189, 0.4);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            gap: 20px;
            cursor: pointer;
            /* Indique visuellement que la carte est cliquable */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .release-section:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        .release-main-info {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .release-cover {
            width: 220px;
            height: 220px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
            background: #eee;
            flex-shrink: 0;
        }

        .release-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .badge-recent {
            align-self: flex-start;
            background: rgba(76, 175, 80, 0.15);
            color: #2E7D32;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .release-title {
            font-size: 28px;
            font-weight: 800;
            margin: 5px 0 0 0;
            color: #222;
        }

        .release-artist {
            font-size: 18px;
            color: #666;
            font-weight: 600;
            margin: 0;
        }

        .release-meta {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #888;
            font-weight: 500;
            flex-wrap: wrap;
        }

        .release-meta span strong {
            color: #444;
        }

        /* LISTE DES PISTES */
        .tracks-container {
            border-top: 1px dashed rgba(189, 189, 189, 0.5);
            padding-top: 20px;
            margin-top: 10px;
        }

        .tracks-title {
            font-size: 15px;
            font-weight: 700;
            margin: 0 0 12px 0;
            color: #555;
        }

        .tracks-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }

        .track-item {
            background: rgba(244, 246, 249, 0.7);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #444;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .track-num {
            color: #FC8FB0;
            font-weight: 800;
        }

        .no-results {
            text-align: center;
            padding: 60px 0;
            color: #888;
            font-size: 16px;
        }

        @media (max-width: 650px) {
            .release-main-info {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .badge-recent {
                align-self: center;
            }

            .release-meta {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div id="navbar"></div>

    <div class="container">

        <div class="pill-nav-container">
            <div class="pill-tabs">
                <a href="index.html" class="pill-link">Accueil</a>
                <a href="sorties.html" class="pill-link">Sorties</a>
                <a href="artistes.html" class="pill-link">Artistes</a>
                <a href="prochainement.html" class="pill-link">Prochainement</a>
                <a href="dernierement.html" class="pill-link active">Dernièrement</a>
            </div>
            <div class="pill-search-bar">
                <input type="text" id="global-search" placeholder="Rechercher parmi les 5 dernières sorties...">
            </div>
        </div>

        <div class="page-header">
            <h1 class="page-title">Nos 5 Dernières Sorties</h1>
            <span class="results-count" id="results-count">Chargement...</span>
        </div>

        <div class="recent-list" id="recent-container"></div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getFirestore,
            collectionGroup,
            getDocs,
            query
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
            authDomain: "morgann-music-cp.firebaseapp.com",
            projectId: "morgann-music-cp",
            storageBucket: "morgann-music-cp.firebasestorage.app",
            messagingSenderId: "666812685196",
            appId: "1:666812685196:web:fe3df6749ae768d68494a9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allRecentReleases = [];
        let filteredRecentReleases = [];

        async function initRecentPage() {
            try {
                const catalogQuery = query(collectionGroup(db, "releases"));
                const snapshot = await getDocs(catalogQuery);
                const loadedReleases = [];

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();

                    // Nettoyage et vérification du statut "Direct"
                    const rawStatus = (data.status || "").trim().toLowerCase();
                    const normalizedStatus = rawStatus.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

                    if (normalizedStatus === "direct") {
                        // Priorité à originalReleaseDate
                        const effectiveDateStr = data.originalReleaseDate || data.releaseDate || null;

                        loadedReleases.push({
                            id: docSnap.id,
                            ...data,
                            effectiveReleaseDate: effectiveDateStr
                        });
                    }
                });

                // Trier du PLUS RÉCENT au PLUS ANCIEN
                loadedReleases.sort((a, b) => new Date(b.effectiveReleaseDate || 0) - new Date(a.effectiveReleaseDate || 0));

                // 5 plus récentes
                allRecentReleases = loadedReleases.slice(0, 5);
                filteredRecentReleases = [...allRecentReleases];

                renderRecentList();

            } catch (error) {
                console.error("Erreur lors du chargement des sorties :", error);
                document.getElementById("recent-container").innerHTML = `<p class="no-results">Erreur lors du chargement des données.</p>`;
            }
        }

        function renderRecentList() {
            const container = document.getElementById("recent-container");
            container.innerHTML = "";

            const totalItems = filteredRecentReleases.length;
            document.getElementById("results-count").innerText = `${totalItems} sortie(s) affichée(s)`;

            if (totalItems === 0) {
                container.innerHTML = `<p class="no-results">Aucune sortie avec le statut "Direct" trouvée.</p>`;
                return;
            }

            filteredRecentReleases.forEach(rel => {
                const section = document.createElement("section");
                section.className = "release-section";

                // Redirection au clic sur la section
                section.addEventListener("click", () => {
                    window.location.href = `sortie.html?id=${rel.id}`;
                });

                const cover = rel.coverUrl || "https://via.placeholder.com/300?text=Pochette";

                // Formatage de la date
                let formattedDate = "Date inconnue";
                if (rel.effectiveReleaseDate) {
                    const dateObj = new Date(rel.effectiveReleaseDate);
                    formattedDate = dateObj.toLocaleDateString("fr-FR", {
                        day: "numeric",
                        month: "long",
                        year: "numeric"
                    });
                }

                // Tracklist
                let tracksHtml = "";
                if (Array.isArray(rel.tracks) && rel.tracks.length > 0) {
                    const tracksListHtml = rel.tracks.map((track, index) => `
                        <li class="track-item">
                            <span class="track-num">${String(index + 1).padStart(2, '0')}</span>
                            <span>${typeof track === 'string' ? track : (track.title || 'Piste sans titre')}</span>
                        </li>
                    `).join("");

                    tracksHtml = `
                        <div class="tracks-container">
                            <h4 class="tracks-title">Tracklist (${rel.tracks.length} piste${rel.tracks.length > 1 ? 's' : ''})</h4>
                            <ul class="tracks-list">
                                ${tracksListHtml}
                            </ul>
                        </div>
                    `;
                }

                section.innerHTML = `
                    <div class="release-main-info">
                        <img src="${cover}" class="release-cover" alt="${rel.title}">
                        <div class="release-details">
                            <span class="badge-recent">Direct / Disponible</span>
                            <h2 class="release-title">${rel.title || 'Sans titre'}</h2>
                            <p class="release-artist">${rel.artistName || 'Artiste inconnu'}</p>
                            
                            <div class="release-meta">
                                <span>Sortie le : <strong>${formattedDate}</strong></span>
                                ${rel.type ? `<span>Type : <strong>${rel.type}</strong></span>` : ''}
                            </div>
                        </div>
                    </div>
                    ${tracksHtml}
                `;

                container.appendChild(section);
            });
        }

        // --- RECHERCHE ---
        const searchInput = document.getElementById("global-search");

        searchInput.addEventListener("input", (e) => {
            const queryText = e.target.value.trim().toLowerCase();

            if (queryText === "") {
                filteredRecentReleases = [...allRecentReleases];
            } else {
                filteredRecentReleases = allRecentReleases.filter(rel =>
                    (rel.title && rel.title.toLowerCase().includes(queryText)) ||
                    (rel.artistName && rel.artistName.toLowerCase().includes(queryText))
                );
            }

            renderRecentList();
        });

        initRecentPage();
    </script>
</body>

</html>
