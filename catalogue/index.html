<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
    <style>
      .mm-loader {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
        padding: 18px 0;
      }
      .mm-loader span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #ff8fb1;
        opacity: 0.7;
        animation: mmDotPulse 1.1s infinite cubic-bezier(.4,0,.2,1);
      }
      .mm-loader span:nth-child(2) { animation-delay: 0.18s; }
      .mm-loader span:nth-child(3) { animation-delay: 0.36s; }
      @keyframes mmDotPulse {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
    <meta property="og:image" content="/assets/img/Banières/catalogue.png">
  <!-- meta charset déjà déplacée en haut -->
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Catalogue | Morgann Music</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="/assets/css/styles-accueil.css">

  </head>
<body>
  <div id="catalog-popup-info" style="display:none;position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#222;color:#fff;padding:18px 28px 18px 18px;border-radius:16px;box-shadow:0 4px 24px #0005;z-index:9999;max-width:95vw;font-size:1.08em;align-items:center;gap:18px;">
    <span style="font-weight:600;">Le catalogue est actualisé chaque jour avec de nouvelles sorties et liens pour être le plus juste possible.</span>
    <a href="/catalogue/sorties.html" style="color:#60a5fa;text-decoration:underline;font-weight:500;">Voir toutes les sorties</a>
    <button id="close-catalog-popup" style="background:none;border:none;color:#fff;font-size:1.5em;line-height:1;cursor:pointer;margin-left:18px;">&times;</button>
  </div>
  <script>
    // Affiche le popup si jamais fermé
    if (!localStorage.getItem('catalogue_popup_closed')) {
      document.getElementById('catalog-popup-info').style.display = 'flex';
    }
    document.getElementById('close-catalog-popup').onclick = function() {
      document.getElementById('catalog-popup-info').style.display = 'none';
      localStorage.setItem('catalogue_popup_closed', '1');
    };
  </script>
  <style>
    body {
      padding: 0;
    }
  </style>
  <style>
    body {
      padding: 0;
    }
  </style>
  <div id="navbar-container"></div>
  <main class="catalog-shell">
    <header class="catalog-topbar">
      <a class="catalog-brand" data-nav="home">
        <strong>Morgann Music Catalogue</strong>
        <span>Artistes, sorties, lecture continue</span>
      </a>
      <div id="search-bar-container">
        <input id="catalog-search" class="catalog-search" type="search" placeholder="Rechercher un artiste, une sortie, un titre" />
      </div>
        <style>
          @media (max-width: 700px) {
            #search-bar-container {
              width: 100%;
              margin: 0 auto 18px auto;
              display: flex;
              justify-content: center;
            }
            .catalog-search {
              width: 95vw;
              max-width: 420px;
              margin: 0 auto;
              display: block;
            }
            .catalog-topbar > #search-bar-container {
              display: none;
            }
            #search-bar-container.mobile {
              display: flex !important;
            }
          }
        </style>
      <nav class="catalog-nav">
        <a class="pill-link is-active" href="/catalogue/index.html" data-nav="home">Accueil</a>
        <a class="pill-link" href="/catalogue/artistes.html" data-nav="artists">Artistes</a>
        <a class="pill-link" href="/catalogue/sorties.html" data-nav="releases">Sorties</a>
      </nav>
    </header>

    <section id="catalog-view" class="view-stack" aria-live="polite">
        <div class="hero-card" style="display:block;padding:32px 32px 32px 32px;">
          <h2 class="catalog-artists-title" style="font-size:2.5rem;color:var(--bg);font-weight:900;text-align:left;margin-bottom:18px;letter-spacing:-1px;">Nos artistes</h2>
          <div class="artists-row" id="artists-row" style="display:flex;flex-direction:row;gap:32px;overflow-x:auto;padding-bottom:8px;max-width:100vw;">
            <!-- Les artistes Firestore seront injectés ici -->
          </div>
        </div>

        <div class="hero-card" style="display:block;padding:32px 32px 32px 32px;margin-top:48px;">
          <h2 class="catalog-releases-title" style="font-size:2.1rem;color:var(--bg);font-weight:900;text-align:left;margin-bottom:18px;letter-spacing:-1px;">Dernières sorties du distributeur</h2>
          <div class="releases-row" id="releases-row" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:32px;justify-items:center;align-items:center;max-width:100vw;">
            <!-- Les releases Firestore seront injectées ici -->
          </div>
        </div>
        </div>
        <script type="module" src="/assets/js/listAllReleases.js"></script>
        <script type="module">
          import { listAllReleases } from '/assets/js/listAllReleases.js';
          // Recherche artistes et releases
          const searchInput = document.getElementById('catalog-search');
          let allArtists = [];
          let allReleases = [];
          async function fetchAllData() {
            if (!allArtists.length) {
              const artistsCol = collection(db, 'artists');
              const artistsSnapshot = await getDocs(artistsCol);
              allArtists = [];
              artistsSnapshot.forEach(doc => {
                const art = doc.data();
                art.id = doc.id;
                if (!art.deleted) allArtists.push(art);
              });
            }
            if (!allReleases.length) {
              allReleases = await listAllReleases();
            }
          }
          if (searchInput) {
            searchInput.addEventListener('input', async (e) => {
              const q = e.target.value.trim().toLowerCase();
              if (q.length < 2) {
                document.getElementById('artists-row').style.display = '';
                document.getElementById('releases-row').style.display = '';
                return;
              }
              await fetchAllData();
              // Filtrer artistes
              const filteredArtists = allArtists.filter(a => (a.displayName || a.name || '').toLowerCase().includes(q));
              // Filtrer releases
              const filteredReleases = allReleases.filter(r => (r.title && r.title.toLowerCase().includes(q)) || (r.artistName && r.artistName.toLowerCase().includes(q)));
              // Affichage artistes filtrés
              let htmlA = '';
              for (const art of filteredArtists) {
                htmlA += `
                  <a class="artist-card" href="/catalogue/artiste.html?id=${encodeURIComponent(art.id)}" style="text-decoration:none;color:inherit;position:relative;">
                    <span class="img-loader" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;display:flex;align-items:center;justify-content:center;">
                      <span class="mm-loader"><span></span><span></span><span></span></span>
                    </span>
                    <img class="artist-avatar" src="${(art.playProfileImageUrl || art.photoURL || '/assets/img/artists/default.jpg')}" alt="${art.displayName || art.name || ''}" style="display:block;" onload="this.previousElementSibling.style.display='none'" onerror="this.previousElementSibling.style.display='none'" />
                    <strong>${art.displayName || art.name || 'Artiste'}</strong>
                    <div class="artist-links-logos" style="margin-top:4px;display:flex;gap:8px;align-items:center;">
                      ${art.platformLinks?.apple ? `<a href="${art.platformLinks.apple}" target="_blank"><img src="/assets/logo%20plateofmres%20for%20link/Apple_Music_icon.svg" alt="Apple Music" title="Apple Music" style="height:18px;width:auto;" /></a>` : ''}
                      ${art.platformLinks?.spotify ? `<a href="${art.platformLinks.spotify}" target="_blank"><img src="/assets/logo%20plateofmres%20for%20link/Spotify_logo_without_text.svg" alt="Spotify" title="Spotify" style="height:18px;width:auto;" /></a>` : ''}
                    </div>
                  </a>
                `;
              }
              document.getElementById('artists-row').innerHTML = htmlA || '<div style="color:var(--txt);opacity:0.7;text-align:center;">Aucun artiste trouvé</div>';
              // Affichage releases filtrées
              let htmlR = '';
              for (const rel of filteredReleases) {
                const dateToShow = rel.originalReleaseDate ? rel.originalReleaseDate : rel.releaseDate || '';
                htmlR += `
                  <a class="release-card" href="/catalogue/sortie.html?id=${rel.id ? encodeURIComponent(rel.id) : ''}" style="text-decoration:none;color:inherit;cursor:pointer;position:relative;">
                    <span class="img-loader" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;display:flex;align-items:center;justify-content:center;">
                      <span class="mm-loader"><span></span><span></span><span></span></span>
                    </span>
                    <img class="release-cover" src="${(rel.assets && rel.assets.coverUrl) || '/assets/img/artists/default.jpg'}" alt="${rel.title || ''}" style="display:block;" onload="this.previousElementSibling.style.display='none'" onerror="this.previousElementSibling.style.display='none'" />
                    <strong>${rel.title || 'Sortie'}</strong>
                    <span>${dateToShow}</span>
                  </a>
                `;
              }
              document.getElementById('releases-row').innerHTML = htmlR || '<div style="color:var(--txt);opacity:0.7;text-align:center;">Aucune sortie trouvée</div>';
            });
          }
          // Responsive : déplacer la barre de recherche sous le header sur mobile
          function moveSearchBar() {
            const container = document.getElementById('search-bar-container');
            if (window.innerWidth <= 700) {
              container.classList.add('mobile');
              document.querySelector('main.catalog-shell').prepend(container);
            } else {
              container.classList.remove('mobile');
              document.querySelector('.catalog-topbar').appendChild(container);
            }
          }
          window.addEventListener('resize', moveSearchBar);
          moveSearchBar();
          import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js';
          import { getFirestore, collection, getDocs, query, orderBy, limit } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js';

          // Config récupérée du site (navbar.js)
          const firebaseConfig = {
            apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
            authDomain: "morgann-music-cp.firebaseapp.com",
            projectId: "morgann-music-cp",
            storageBucket: "morgann-music-cp.firebasestorage.app",
            messagingSenderId: "666812685196",
            appId: "1:666812685196:web:fe3df6749ae768d68494a9",
            measurementId: "G-FKSSXYEZF0"
          };
          const app = initializeApp(firebaseConfig);
          const db = getFirestore(app);

          async function loadArtists() {
            const artistsCol = collection(db, 'artists');
            const artistsSnapshot = await getDocs(artistsCol);
            const artists = [];
            artistsSnapshot.forEach(doc => {
              const art = doc.data();
              art.id = doc.id; // Ajout de l'id Firestore
              if (!art.deleted) {
                artists.push(art);
              }
            });
            // Charger toutes les releases pour trier les artistes par date de sortie la plus récente
            const releasesCol = collection(db, 'releases');
            const releasesSnapshot = await getDocs(releasesCol);
            const releases = [];
            releasesSnapshot.forEach(doc => {
              const rel = doc.data();
              rel.id = doc.id;
              releases.push(rel);
            });
            // Associer à chaque artiste sa dernière date de sortie
            artists.forEach(artist => {
              const rels = releases.filter(r => r.artistId === artist.id);
              artist.latestReleaseDate = rels.length ? rels.map(r => r.releaseDate).sort().reverse()[0] : '';
            });
            // Trier par date de sortie la plus récente (desc)
            artists.sort((a, b) => {
              if (!a.latestReleaseDate && !b.latestReleaseDate) return 0;
              if (!a.latestReleaseDate) return 1;
              if (!b.latestReleaseDate) return -1;
              return a.latestReleaseDate.localeCompare(b.latestReleaseDate);
            });
            const row = document.getElementById('artists-row');
            row.innerHTML = '<div class="mm-loader"><span></span><span></span><span></span></div>';
            let html = '';
            let count = 0;
            for (const art of artists) {
              if (count >= 12) break;
              html += `
                <a class="artist-card" href="/catalogue/artiste.html?id=${encodeURIComponent(art.id)}" style="text-decoration:none;color:inherit;position:relative;">
                  <span class="img-loader" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;display:flex;align-items:center;justify-content:center;">
                    <span class="mm-loader"><span></span><span></span><span></span></span>
                  </span>
                  <img class="artist-avatar" src="${(art.playProfileImageUrl || art.photoURL || '/assets/img/artists/default.jpg')}" alt="${art.displayName || art.name || ''}" style="display:block;" onload="this.previousElementSibling.style.display='none'" onerror="this.previousElementSibling.style.display='none'" />
                  <strong>${art.displayName || art.name || 'Artiste'}</strong>
                  <div class="artist-links-logos" style="margin-top:4px;display:flex;gap:8px;align-items:center;">
                    ${art.platformLinks?.apple ? `<a href="${art.platformLinks.apple}" target="_blank"><img src="/assets/logo%20plateofmres%20for%20link/Apple_Music_icon.svg" alt="Apple Music" title="Apple Music" style="height:18px;width:auto;" /></a>` : ''}
                    ${art.platformLinks?.spotify ? `<a href="${art.platformLinks.spotify}" target="_blank"><img src="/assets/logo%20plateofmres%20for%20link/Spotify_logo_without_text.svg" alt="Spotify" title="Spotify" style="height:18px;width:auto;" /></a>` : ''}
                  </div>
                </a>
              `;
              count++;
            }
            row.innerHTML = count === 0
              ? '<div style="color:var(--txt);opacity:0.7;text-align:center;">Aucun artiste trouvé</div>'
              : html;
          }

          async function loadLatestReleases() {
            const releasesCol = collection(db, 'releases');
            const releasesSnapshot = await getDocs(releasesCol);
            const releases = [];
            releasesSnapshot.forEach(doc => {
              const rel = doc.data();
              rel.id = doc.id;
              releases.push(rel);
            });
            // Tri décroissant par releaseDate (string YYYY-MM-DD)
            releases.sort((a, b) => {
              if (!a.releaseDate && !b.releaseDate) return 0;
              if (!a.releaseDate) return 1;
              if (!b.releaseDate) return -1;
              return a.releaseDate.localeCompare(b.releaseDate);
            });
            const row = document.getElementById('releases-row');
            row.innerHTML = '<div class="mm-loader"><span></span><span></span><span></span></div>';
            let html = '';
            let count = 0;
            for (const rel of releases) {
              if (count >= 4) break;
              if (!(rel.assets && rel.assets.coverUrl)) continue; // n'affiche pas la pochette par défaut
              const dateToShow = rel.originalReleaseDate ? rel.originalReleaseDate : rel.releaseDate || '';
              html += `
                <a class="release-card" href="/catalogue/sortie.html?id=${rel.id ? encodeURIComponent(rel.id) : ''}" style="text-decoration:none;color:inherit;cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                  <span class="img-loader" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;display:flex;align-items:center;justify-content:center;">
                    <span class="mm-loader"><span></span><span></span><span></span></span>
                  </span>
                  <img class="release-cover" src="${rel.assets.coverUrl}" alt="${rel.title || ''}" style="display:block;max-width:120px;border-radius:12px;box-shadow:0 2px 8px #0002;" onload="this.previousElementSibling.style.display='none'" onerror="this.previousElementSibling.style.display='none'" />
                  <strong style="margin-top:10px;">${rel.title || 'Sortie'}</strong>
                  <span style="font-size:0.98em;opacity:0.7;">${dateToShow}</span>
                </a>
              `;
              count++;
            }
            row.innerHTML = count === 0
              ? '<div style="color:var(--txt);opacity:0.7;text-align:center;">Aucune sortie trouvée</div>'
              : html;
          }

          loadArtists();
          loadLatestReleases();
        </script>
    </section>
  </main>

  <script type="module" src="/assets/js/navbar.js"></script>
</body>
</html>
