<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Sorties - Catalogue MMCP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="/assets/js/navbar.js" defer></script>
    <script src="/assets/footers/accueil/footer.js" defer></script>
    <link rel="stylesheet" href="/assets/css/styles-accueil.css">
    <link rel="stylesheet" href="/assets/footers/accueil/footer.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>


    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            color: #333;
            margin-top: 80px;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .pill-nav-container {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(189, 189, 189, 0.4);
            border-radius: 35px;
            padding: 20px 25px;
            margin: 0 auto 30px auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            gap: 15px;
            box-sizing: border-box;
        }

        .pill-tabs {
            display: inline-flex;
            gap: 8px;
            background: rgba(235, 238, 242, 0.7);
            padding: 6px;
            border-radius: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .pill-link {
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            color: #555;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .pill-link:hover,
        .pill-link.active {
            background: #FC8FB0;
            color: white;
        }

        .pill-search-bar {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .pill-search-bar input {
            width: 100%;
            padding: 12px 22px;
            border-radius: 25px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
            box-sizing: border-box;
            background: #ffffff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .pill-search-bar input:focus {
            border-color: #FC8FB0;
            box-shadow: 0 0 8px rgba(252, 143, 176, 0.3);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
        }

        .results-count {
            font-size: 14px;
            color: #777;
            font-weight: 600;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            min-height: 300px;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(62px);
            -webkit-backdrop-filter: blur(62px);
            border: 1px solid rgba(189, 189, 189, 0.438);
            border-radius: 25px;
            padding: 15px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #FC8FB0;
        }

        .card-img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 18px;
            object-fit: cover;
            background: #eee;
            margin-bottom: 12px;
        }

        .card-title {
            font-weight: bold;
            font-size: 15px;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-subtitle {
            font-size: 12px;
            color: #777;
            margin: 0;
        }

        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .page-btn {
            background: #ffffff;
            border: 1px solid rgba(189, 189, 189, 0.5);
            color: #444;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .page-btn:hover {
            border-color: #FC8FB0;
            color: #FC8FB0;
        }

        .page-btn.active {
            background: #FC8FB0;
            color: white;
            border-color: #FC8FB0;
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 0;
            color: #888;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div id="navbar"></div>

    <div class="container">

        <div class="pill-nav-container">
            <div class="pill-tabs">
                <a href="index.html" class="pill-link">Accueil</a>
                <a href="sorties.html" class="pill-link active">Sorties</a>
                <a href="artistes.html" class="pill-link">Artistes</a>
                <a href="prochainement.html" class="pill-link">Prochainement</a>
                <a href="dernierement.html" class="pill-link">Dernièrement</a>
            </div>
            <div class="pill-search-bar">
                <input type="text" id="global-search" placeholder="Rechercher une sortie ou un artiste...">
            </div>
        </div>

        <div class="page-header">
            <h1 class="page-title">Toutes les Sorties</h1>
            <span class="results-count" id="results-count">Chargement...</span>
        </div>

        <div class="cards-grid" id="grid-releases"></div>

        <div class="pagination-container" id="pagination-container"></div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getFirestore,
            collectionGroup,
            getDocs,
            query
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
            authDomain: "morgann-music-cp.firebaseapp.com",
            projectId: "morgann-music-cp",
            storageBucket: "morgann-music-cp.firebasestorage.app",
            messagingSenderId: "666812685196",
            appId: "1:666812685196:web:fe3df6749ae768d68494a9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const ITEMS_PER_PAGE = 8;
        let currentPage = 1;
        let allReleases = [];
        let filteredReleases = [];

        async function initReleasesPage() {
            try {
                const catalogQuery = query(collectionGroup(db, "releases"));
                const snapshot = await getDocs(catalogQuery);

                const loadedReleases = [];

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();

                    const isCatalogVisible = data.showOnMmcpCatalog === true || data.showOnMmcpCatalog === "true";
                    const isDirectStatus = data.status === "direct";

                    if (isCatalogVisible && isDirectStatus) {
                        loadedReleases.push({
                            id: docSnap.id,
                            ...data
                        });
                    }
                });

                loadedReleases.sort((a, b) => new Date(b.releaseDate || 0) - new Date(a.releaseDate || 0));

                allReleases = loadedReleases;
                filteredReleases = [...allReleases];

                renderCurrentPage();

            } catch (error) {
                console.error("Erreur lors du chargement des sorties :", error);
                document.getElementById("grid-releases").innerHTML = `<p class="no-results">Erreur lors du chargement des données.</p>`;
            }
        }

        function renderCurrentPage() {
            const gridReleases = document.getElementById("grid-releases");
            gridReleases.innerHTML = "";

            const totalItems = filteredReleases.length;
            document.getElementById("results-count").innerText = `${totalItems} sortie(s) trouvée(s)`;

            if (totalItems === 0) {
                gridReleases.innerHTML = `<p class="no-results">Aucune sortie trouvée.</p>`;
                document.getElementById("pagination-container").innerHTML = "";
                return;
            }

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const pageItems = filteredReleases.slice(startIndex, endIndex);

            pageItems.forEach(rel => {
                const card = document.createElement("div");
                card.className = "card";
                card.onclick = () => window.location.href = `sortie.html?id=${rel.id}`;

                const cover = rel.coverUrl || "/assets/img/icons/android-chrome-512x512.png";
                card.innerHTML = `
                    <img src="${cover}" class="card-img" alt="${rel.title}">
                    <p class="card-title">${rel.title || 'Sans titre'}</p>
                    <p class="card-subtitle">${rel.artistName || 'Artiste inconnu'}</p>
                `;
                gridReleases.appendChild(card);
            });

            renderPagination(totalItems);
        }

        function renderPagination(totalItems) {
            const container = document.getElementById("pagination-container");
            container.innerHTML = "";

            const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
            if (totalPages <= 1) return;

            const prevBtn = document.createElement("button");
            prevBtn.className = "page-btn";
            prevBtn.innerText = "« Précédent";
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderCurrentPage();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };
            container.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement("button");
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.innerText = i;
                pageBtn.onclick = () => {
                    currentPage = i;
                    renderCurrentPage();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                container.appendChild(pageBtn);
            }

            const nextBtn = document.createElement("button");
            nextBtn.className = "page-btn";
            nextBtn.innerText = "Suivant »";
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderCurrentPage();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };
            container.appendChild(nextBtn);
        }

        const searchInput = document.getElementById("global-search");

        searchInput.addEventListener("input", (e) => {
            const queryText = e.target.value.trim().toLowerCase();
            currentPage = 1;

            if (queryText === "") {
                filteredReleases = [...allReleases];
            } else {
                filteredReleases = allReleases.filter(rel =>
                    (rel.title && rel.title.toLowerCase().includes(queryText)) ||
                    (rel.artistName && rel.artistName.toLowerCase().includes(queryText))
                );
            }

            renderCurrentPage();
        });

        initReleasesPage();
    </script>
</body>

</html>
