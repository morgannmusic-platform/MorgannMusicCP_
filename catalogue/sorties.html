<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Catalogue | Morgann Music</title>
  <meta property="og:image" content="/assets/img/Banières/sorties.png">
  <meta property="og:description" content="Catalogue artistes et sorties Morgann Music avec lecture continue sans coupure." />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles-accueil.css">
</head>
<body>
  <style>
    body {
      padding: 0;
    }
  </style>
  <div id="navbar-container"></div>
  <main class="catalog-shell">
    <header class="catalog-topbar">
      <a class="catalog-brand" data-nav="home">
        <strong>Morgann Music Catalogue</strong>
        <span>Artistes, sorties, lecture continue</span>
      </a>
      <input id="catalog-search" class="catalog-search" type="search" placeholder="Rechercher un artiste, une sortie, un titre" />
      <nav class="catalog-nav">
        <a class="pill-link" href="/catalogue/index.html" data-nav="home">Accueil</a>
        <a class="pill-link" href="/catalogue/artistes.html" data-nav="artists">Artistes</a>
        <a class="pill-link is-active" href="/catalogue/sorties.html" data-nav="releases">Sorties</a>
      </nav>
    </header>
    <section id="catalog-view" class="view-stack" aria-live="polite">
      <div class="hero-card" style="display:block;padding:32px 32px 32px 32px;background:var(--bg);box-shadow:none;border:none;">
        <h2 class="main-title" style="font-size:2.5rem;font-weight:900;text-align:left;margin-bottom:18px;letter-spacing:-1px;">Toutes les sorties</h2>
        <div class="releases-row" id="releases-row">
          <!-- Les releases Firestore seront injectées ici -->
        </div>
        <div id="pagination-controls" style="display:flex;justify-content:center;gap:8px;margin-top:18px;"></div>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="/assets/js/listAllReleases.js"></script>
  <script type="module">
    import { listAllReleases } from '/assets/js/listAllReleases.js';
    const searchInput = document.querySelector('.catalog-search');
    if (searchInput) {
      searchInput.addEventListener('input', async (e) => {
        const q = e.target.value.trim().toLowerCase();
        if (q.length < 2) return; // Ne cherche qu'à partir de 2 caractères
        const releases = await listAllReleases();
        const results = releases.filter(r =>
          (r.title && r.title.toLowerCase().includes(q)) ||
          (r.artistName && r.artistName.toLowerCase().includes(q))
        );
        // Affichage simple (console), à remplacer par un vrai dropdown ou suggestions
        console.log('Résultats recherche releases:', results);
      });
    }
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js';
    import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js';
    const firebaseConfig = {
      apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
      authDomain: "morgann-music-cp.firebaseapp.com",
      projectId: "morgann-music-cp",
      storageBucket: "morgann-music-cp.firebasestorage.app",
      messagingSenderId: "666812685196",
      appId: "1:666812685196:web:fe3df6749ae768d68494a9",
      measurementId: "G-FKSSXYEZF0"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    async function loadReleases() {
      const releasesCol = collection(db, 'releases');
      const releasesSnapshot = await getDocs(releasesCol);
      const releases = [];
      releasesSnapshot.forEach(doc => {
        const rel = doc.data();
        rel.id = doc.id;
        if (!rel.deleted) {
          releases.push(rel);
        }
      });
      // Tri décroissant par date de sortie
      releases.sort((a, b) => (b.releaseDate || '').localeCompare(a.releaseDate || ''));

      // Pagination
      const pageSize = 8; // 2 rangées de 4
      let currentPage = 1;
      const totalPages = Math.ceil(releases.length / pageSize);

      function renderPage(page) {
        const row = document.getElementById('releases-row');
        row.innerHTML = '';
        const start = (page - 1) * pageSize;
        const end = start + pageSize;
        const pageReleases = releases.slice(start, end);
        let html = '';
        for (const rel of pageReleases) {
          const dateToShow = rel.originalReleaseDate ? rel.originalReleaseDate : rel.releaseDate || '';
          html += `
            <a class="release-card" href="/catalogue/sortie.html?id=${encodeURIComponent(rel.id)}">
              <span class="img-loader" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;display:flex;align-items:center;justify-content:center;">
                <span class="mm-loader"><span></span><span></span><span></span></span>
              </span>
              ${rel.assets && rel.assets.animatedCoverUrl ?
                `<video class='release-cover' src='${rel.assets.animatedCoverUrl}' autoplay loop muted playsinline style="display:block;object-fit:cover;width:100%;height:100%;border-radius:24px;" onloadeddata="this.previousElementSibling.style.display='none'" onerror="this.previousElementSibling.style.display='none'" ></video>` :
                `<img class="release-cover" src="${(rel.assets && rel.assets.coverUrl) || rel.coverUrl || '/assets/img/releases/default.jpg'}" alt="${rel.title || ''}" style="display:block;" onload="this.previousElementSibling.style.display='none'" onerror="this.previousElementSibling.style.display='none'" />`
              }
              <strong>${rel.title ? rel.title + (rel.versionLine ? ' (' + rel.versionLine + ')' : '') : 'Sortie'}</strong>
              <span>${rel.artistName ? rel.artistName : ''}</span>
              <span>${dateToShow}</span>
            </a>
          `;
        }
        row.innerHTML = pageReleases.length === 0
          ? '<div style="color:var(--txt);opacity:0.7;text-align:center;">Aucune sortie trouvée</div>'
          : html;
        renderPagination(page);
      }

      function renderPagination(page) {
        const controls = document.getElementById('pagination-controls');
        controls.innerHTML = '';
        if (totalPages <= 1) {
          controls.innerHTML = '<span class="pagination-btn is-active">1</span>';
          return;
        }
        for (let i = 1; i <= totalPages; i++) {
          const btn = document.createElement('button');
          btn.textContent = i;
          btn.className = 'pagination-btn' + (i === page ? ' is-active' : '');
          btn.style = 'margin:0 4px;padding:6px 14px;border-radius:8px;border:none;background:' + (i === page ? '#ff8fb1' : '#fff') + ';color:' + (i === page ? '#fff' : '#000') + ';font-weight:600;cursor:pointer;';
          btn.onclick = () => {
            if (currentPage !== i) {
              currentPage = i;
              renderPage(currentPage);
            }
          };
          controls.appendChild(btn);
        }
      }

      renderPage(currentPage);
    }
    document.addEventListener('DOMContentLoaded', loadReleases);
  </script>
  <script type="module" src="/assets/js/navbar.js"></script>
</body>
</html>
