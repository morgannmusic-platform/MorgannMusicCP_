<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement sécurisé - Morgann Music</title>
    <link rel="stylesheet" href="/assets/css/styles-accueil.css">
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .payment-card {
            background: linear-gradient(145deg, var(--container1), var(--container2));
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 26px 70px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        #payment-element { margin-bottom: 24px; min-height: 200px; }
        .payment-info { margin-bottom: 24px; text-align: center; }
        .payment-info h2 { color: var(--rose); margin-bottom: 8px; font-size: 1.8rem; }
        .payment-info p { color: var(--text-secondary); font-weight: 500; }
        #payment-message { margin-top: 15px; color: #df1b41; font-size: 0.9rem; text-align: center; }
        .is-hidden { display: none; }

        /* Liste des plans si ?plan= est absent */
        .plans-selection-grid {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }
        .plan-choice-item {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--border-subtle);
            padding: 15px 20px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .plan-choice-item:hover {
            background: var(--rose);
            color: white;
            transform: scale(1.02);
        }
        .plan-choice-item:hover span { color: white; }
        .plan-choice-item span { font-weight: 600; color: var(--rose); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="payment-card" id="main-card">
            <div class="payment-info">
                <h2 id="page-title">Finaliser l'abonnement</h2>
                <p id="plan-display">Chargement des offres...</p>
            </div>

            <div id="plan-selection" class="is-hidden">
                <div class="plans-selection-grid" id="plans-list"></div>
            </div>

            <form id="payment-form" class="is-hidden">
                <div id="payment-element"></div>
                <button id="submit" class="cta-button" style="width: 100%; border: none; cursor: pointer;">
                    <span id="button-text">Payer maintenant</span>
                </button>
                <div id="payment-message" class="is-hidden"></div>
            </form>
        </div>
    </div>
    <script type="module" src="/assets/js/background.js"></script>
    <script type="module" src="/assets/js/paiement.js"></script>
</body>
</html>
