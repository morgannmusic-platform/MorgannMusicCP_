<body class="login-page">
    <div id="navbar"></div>
    <main class="auth-card">
        <a class="brand" href="/index.html">Morgann Music <img src="/assets/img/logo/logo-rose.svg" alt="CP"></a>
        <h1>Connexion</h1>
        <p class="subtitle">Retrouve ton espace artiste.</p>

        <form id="login-form" novalidate>
            <div>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required>
            </div>
            <div>
                <label for="password">Mot de passe</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button type="submit">Se connecter</button>
            <p id="feedback" class="feedback" role="status" aria-live="polite"></p>
        </form>

        <p class="helper">Pas encore de compte ? <a href="/signin.html">Créer un compte</a></p>
    </main>

    <script type="module" src="/assets/js/login.js"></script>


</body>

</html>
