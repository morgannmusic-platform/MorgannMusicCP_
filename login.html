    <style>

        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);

<body>

<div id="navbar-container"></div>

<div class="container">
    <!-- LOGIN FORM -->
    <div class="form-box login">
        <form id="login-form">
            <h1>Connexion</h1>
            <div class="input-box">
                <input type="email" id="login-email" placeholder="Email" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="password" id="login-password" placeholder="Mot de passe" required>
                <button type="button" class="password-toggle-btn" data-password-target="login-password" aria-label="Afficher le mot de passe">
                  <img src="/assets/icon/Invisible-1--Streamline-Flex.svg" alt="Afficher">
                </button>
            </div>
            <div class="input-box" id="loginRoleCodeWrap" style="display:none;">
              <input type="text" id="login-role-code" placeholder="Code rôle (optionnel)">
              <i class='bx bxs-key'></i>
            </div>
            <div class="forgot-link" style="justify-content:flex-start;">
              <a href="#" id="toggle-login-role-code">J'ai un code rôle</a>
            </div>
            <div class="forgot-link">
              <a href="#" id="forgot-password-link">Mot de passe oublié ?</a>
            </div>
            <button type="submit" class="btn">Se connecter</button>
            <p>Ou connectez-vous avec Google</p>

                <a href="#" id="google-login"><i class='bx bxl-google'></i></a>
            </div>
        </form>
    </div>

    <!-- REGISTER FORM -->
    <div class="form-box register">
        <form id="register-form">
            <h1>Inscription</h1>
            <p class="register-step-indicator" id="register-step-indicator">Étape 1/3</p>

        <div class="register-step is-active" data-step="1">
          <div class="input-box">
            <input type="text" id="register-first-name" placeholder="Prénom" required>
            <i class='bx bxs-user'></i>
          </div>
          <div class="input-box">
            <input type="text" id="register-last-name" placeholder="Nom" required>
            <i class='bx bxs-user'></i>
          </div>
            <div class="input-box">
                <input type="email" id="register-email" placeholder="Email" required>
                <i class='bx bxs-envelope'></i>
            </div>
            <div class="input-box">
                <input type="password" id="register-password" placeholder="Mot de passe" required>
                <button type="button" class="password-toggle-btn" data-password-target="register-password" aria-label="Afficher le mot de passe">
                  <img src="/assets/icon/Invisible-1--Streamline-Flex.svg" alt="Afficher">
                </button>
            </div>
          <div class="register-actions">
            <button type="button" class="btn" data-next-step>Suivant</button>
          </div>
        </div>

        <div class="register-step" data-step="2">
              <div class="input-box">
            <input type="text" id="register-username" placeholder="Nom public / Nom d'artiste" required>
            <i class='bx bx-id-card'></i>
              </div>
          <div class="input-box">
            <input type="tel" id="register-phone" placeholder="Téléphone" required>
            <i class='bx bxs-phone'></i>
          </div>
          <div class="input-box">
            <input type="text" id="register-country" placeholder="Pays" required>
            <i class='bx bx-world'></i>
          </div>
          <div class="input-box">
            <input type="text" id="register-city" placeholder="Ville" required>
            <i class='bx bx-map'></i>
          </div>
          <div class="register-actions register-actions-split">
            <button type="button" class="btn btn-secondary" data-prev-step>Retour</button>
            <button type="button" class="btn" data-next-step>Suivant</button>
          </div>
        </div>

        <div class="register-step" data-step="3">
              <div class="input-box" id="roleCodeWrap" style="display:none;">
                <input type="text" id="register-role-code" placeholder="Code rôle (optionnel)">
                <i class='bx bxs-key'></i>
              </div>
              <div class="forgot-link" style="justify-content:flex-start;">
                <a href="#" id="toggle-role-code">J'ai un code rôle</a>
              </div>
              <div class="forgot-link" style="justify-content:flex-start; margin-top:10px;">
                <label style="display:flex; align-items:flex-start; gap:8px; cursor:pointer;">
                  <input type="checkbox" id="register-marketing-optin" style="margin-top:3px;">
                  <span>Je souhaite recevoir les emails marketing de Morgann Music CP (nouvautes et nouvelles sorties).</span>
                </label>
              </div>
            <div class="register-actions register-actions-split">
              <button type="button" class="btn btn-secondary" data-prev-step>Retour</button>
              <button type="submit" class="btn">S'inscrire</button>
            </div>
            <p>Ou inscivez-vous avec Google</p>
            <div class="social-icons">
                <a href="#" id="google-login"><i class='bx bxl-google'></i></a>
            </div>
        </div>
        </form>
    </div>

    <!-- TOGGLE PANEL -->
    <div class="toggle-box">
        <div class="toggle-panel toggle-left">
            <h1 class="rvdvr">Ravis de vous revoir !</h1>
            <p  class="rvdvr">Vous n'avez pas de compte ?</p>
            <button class="btn register-btn">Créez-en un !</button>
        </div>
        <div class="toggle-panel toggle-right">
            <h1 class="rvdvr">Bienvenue !</h1>
            <p class="rvdvr">Vous avez déjà un compte ?</p>
            <button class="btn login-btn">Connectez-vous !</button>
        </div>
    </div>
</div>


<!-- 2FA désactivée : les modals et le JS liés à la double authentification ont été retirés. -->
    

    <script src="/assets/js/script.js"></script>
      <script type="module" src="/assets/js/navbar.js?v=2026-04-09a"></script>

<script type="module">
  // === IMPORTS (doivent être en premier dans un module ES) ===
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signOut,
    updateProfile,
    GoogleAuthProvider,
    signInWithPopup,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  // === CONFIG FIREBASE ===
  const firebaseConfig = {
    apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
    authDomain: "morgann-music-cp.firebaseapp.com",
    projectId: "morgann-music-cp",
    storageBucket: "morgann-music-cp.firebasestorage.app",
    messagingSenderId: "666812685196",
    appId: "1:666812685196:web:fe3df6749ae768d68494a9"
  };
  const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  console.log("✅ Firebase modules loaded");

  // === CONSTANTES ===
  const REQUIRED_PROFILE_VERSION = 1;

  // === SÉLECTEURS DOM ===
  const loginForm = document.getElementById('login-form');
  const loginEmail = document.getElementById('login-email');
  const loginPassword = document.getElementById('login-password');
  const loginRoleCode = document.getElementById('login-role-code');
  const registerForm = document.getElementById('register-form');
  const registerFirstName = document.getElementById('register-first-name');
  const registerLastName = document.getElementById('register-last-name');
  const registerUsername = document.getElementById('register-username');
  const registerPhone = document.getElementById('register-phone');
  const registerCountry = document.getElementById('register-country');
  const registerCity = document.getElementById('register-city');
  const registerEmail = document.getElementById('register-email');
  const registerPassword = document.getElementById('register-password');
  const registerRoleCode = document.getElementById('register-role-code');
  const registerMarketingOptin = document.getElementById('register-marketing-optin');

  // === MULTI-STEP INSCRIPTION ===
  const registerSteps = Array.from(document.querySelectorAll('.register-step'));
  let registerCurrentStep = 0;

  function updateRegisterStepUi() {
    registerSteps.forEach((step, i) => step.classList.toggle('is-active', i === registerCurrentStep));
    const indicator = document.getElementById('register-step-indicator');
    if (indicator) indicator.textContent = `Étape ${registerCurrentStep + 1}/${registerSteps.length}`;
  }

  function validateRegisterStep(idx) {
    const step = registerSteps[idx];
    if (!step) return true;
    for (const input of step.querySelectorAll('input[required]')) {
      if (!input.value.trim()) { input.focus(); return false; }
    }
    return true;
  }

  document.querySelectorAll('[data-next-step]').forEach(btn => btn.addEventListener('click', () => {
    if (validateRegisterStep(registerCurrentStep)) {
      registerCurrentStep = Math.min(registerCurrentStep + 1, registerSteps.length - 1);
      updateRegisterStepUi();
    } else {
      alert("Merci de remplir tous les champs.");
    }
  }));

  document.querySelectorAll('[data-prev-step]').forEach(btn => btn.addEventListener('click', () => {
    registerCurrentStep = Math.max(registerCurrentStep - 1, 0);
    updateRegisterStepUi();
  }));

  document.getElementById('toggle-role-code')?.addEventListener('click', (e) => {
    e.preventDefault();
    const wrap = document.getElementById('roleCodeWrap');
    if (wrap) wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
  });

  document.getElementById('toggle-login-role-code')?.addEventListener('click', (e) => {
    e.preventDefault();
    const wrap = document.getElementById('loginRoleCodeWrap');
    if (wrap) wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
  });

  // === UTILITAIRES ===
  function clean(val) { return (val || "").trim().replace(/[<>]/g, ""); }

  function getCallableErrorMessage(err, fallback) { return err?.message || err?.details || fallback || "Erreur inconnue"; }

  async function ensureUserDoc(user, extra = {}) {
    if (!user || !user.uid) throw new Error("Utilisateur non valide");
    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);
    if (!snap.exists()) {
      await setDoc(userRef, { email: user.email || "", createdAt: serverTimestamp(), uid: user.uid, ...extra });
      return { created: true };
    }
    return { created: false };
  }

  function isDisabledAccountProfile(profile) {
    return profile?.accountDisabled === true || profile?.disabled === true;
  }

  async function enforceAccountEnabledOrSupport(user) {
    const snap = await getDoc(doc(db, "users", user.uid));
    const profile = snap.exists() ? (snap.data() || {}) : {};
    if (!isDisabledAccountProfile(profile)) return true;
    const reason = String(profile.accountDisabledReason || "").trim();
    const wantsSupport = window.confirm(`Votre compte est désactivé${reason ? ` : ${reason}` : ""}.\nContacter le support ?`);
    if (wantsSupport) { window.location.href = "/support/account-disabled.html"; return false; }
    await signOut(auth);
    return false;
  }

  async function getSecurityEmailPreferences() { return { loginEmailEnabled: true }; }

  async function sendAuthEmailNotification(payload) {
    console.info("sendAuthEmailNotification:", payload);
  }

  async function notifyAuthEmail(type, profile = {}) {
    if (type === "login" && auth.currentUser?.uid) {
      const prefs = await getSecurityEmailPreferences();
      if (!prefs.loginEmailEnabled) return;
    }
    try { await sendAuthEmailNotification({ type, firstName: clean(profile.firstName) }); }
    catch (e) { console.warn(`Email ${type} non envoyé:`, e); }
  }

  async function applyRoleCodeIfAny() { return null; }
  async function enforceProfileUpdateAfterLogin() { return true; }

  function redirectAfterSuccess() {
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('redirect') || "/dash/index.html";
  }



  // === CONNEXION ===
  loginForm?.addEventListener("submit", async (e) => {
    e.preventDefault();
    const submitBtn = loginForm.querySelector('button[type="submit"]');
    if (submitBtn) {
      submitBtn.dataset.orig = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
      submitBtn.innerHTML = 'Connexion <span class="spinner"></span>';
    }

    let hadAuthenticated = false;
    try {
      console.log("Auth: signInWithEmailAndPassword...");
      const cred = await signInWithEmailAndPassword(
        auth,
        loginEmail.value.trim(),
        loginPassword.value
      );
      console.log("Auth: sign-in success", cred.user.uid);
      hadAuthenticated = true;

      try {
        await ensureUserDoc(cred.user);
      } catch (fsErr) {
        alert("Erreur Firestore : " + (fsErr?.message || fsErr));
        await signOut(auth);
        return;
      }

      try {
        const enabled = await enforceAccountEnabledOrSupport(cred.user);
        if (!enabled) {
          await signOut(auth);
          return;
        }
      } catch (stateErr) {
        alert("Erreur vérification compte : " + (stateErr?.message || stateErr));
        await signOut(auth);
        return;
      }

      try {
        const roleLabel = await applyRoleCodeIfAny(cred.user, loginRoleCode?.value);
        if (roleLabel) {
          alert(`Code validé ✅ Rôle activé : ${roleLabel}`);
        }
      } catch (roleErr) {
        alert(roleErr?.message || "Code rôle invalide.");
      }

      // Suppression de la vérification 2FA (désactivée)

      try {
        const okProfile = await enforceProfileUpdateAfterLogin(cred.user);
        if (!okProfile) {
          await signOut(auth);
          return;
        }
      } catch (profileErr) {
        alert("Erreur vérification profil : " + (profileErr?.message || profileErr));
        await signOut(auth);
        return;
      }

      await notifyAuthEmail("login");

      redirectAfterSuccess();
    } catch (err) {
      console.error("Auth sign-in error", err);
      if (hadAuthenticated) {
        try { await signOut(auth); } catch (signoutErr) { console.error("Échec signOut", signoutErr); }
      }
      if (err?.code === "auth/network-request-failed") {
        const online = navigator.onLine;
        if (!online) {
          alert("Pas de connexion Internet. Vérifie a connexion réseau.");
        } else {
          alert(
            "Erreur réseau Firebase (auth/network-request-failed).\n\n" +
            "Si tu testes en local :\n" +
            "→ Va dans Google Cloud Console → APIs & Services → Credentials\n" +
            "→ Modifie ta clé API → Ajoute localhost et 127.0.0.1 aux domaines autorisés.\n\n" +
            "Ou va dans Firebase Console → Authentication → Settings → Authorized domains\n" +
            "→ Vérifie que 'localhost' est bien dans la liste."
          );
        }
      } else {
        alert("Erreur de connexion : " + (err?.message || err));
      }
    } finally {
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
        submitBtn.innerHTML = submitBtn.dataset.orig || 'Se connecter';
      }
    }
  });

  registerForm?.addEventListener("submit", async (e) => {
    e.preventDefault();

    for (let idx = 0; idx < registerSteps.length; idx++) {
      if (!validateRegisterStep(idx)) {
        registerCurrentStep = idx;
        updateRegisterStepUi();
        return;
      }
    }

    const submitBtn = registerForm.querySelector('button[type="submit"]');
    if (submitBtn) {
      submitBtn.dataset.orig = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
      submitBtn.innerHTML = 'Inscription <span class="spinner"></span>';
    }
    try {
      console.log("Auth: createUserWithEmailAndPassword...");
      const firstName = clean(registerFirstName?.value);
      const lastName = clean(registerLastName?.value);
      const displayName = clean(registerUsername?.value) || `${firstName} ${lastName}`.trim();
      const phone = clean(registerPhone?.value);
      const country = clean(registerCountry?.value);
      const city = clean(registerCity?.value);
      const userEmail = registerEmail.value.trim();
      const wantsMarketing = !!registerMarketingOptin?.checked;

      const emailPreferences = {
        marketing: {
          enabled: wantsMarketing,
          topics: {
            news: true,
            releases: true
          }
        },
        transactional: {
          enabled: true
        },
        security: {
          loginEmail: {
            enabled: false
          },
          email2fa: {
            enabled: false
          }
        }
      };

      if (!firstName || !lastName || !phone || !country || !city || !displayName) {
        alert("Merci de remplir toutes les informations demandées.");
        return;
      }

      const cred = await createUserWithEmailAndPassword(
        auth,
        userEmail,
        registerPassword.value
      );
      console.log("Auth: user created uid=", cred.user.uid);

      if (displayName) {
        try {
          await updateProfile(cred.user, { displayName });
          console.log("Auth: displayName updated for", cred.user.uid);
        } catch (upErr) {
          console.warn("updateProfile failed:", upErr);
        }
      }

      try {
        await ensureUserDoc(cred.user, {
          firstName,
          lastName,
          phone,
          country,
          city,
          emailPreferences,
          profileVersion: REQUIRED_PROFILE_VERSION,
          profileUpdateRequired: false
        });
      } catch (fsErr) {
        alert("Erreur Firestore : " + (fsErr?.message || fsErr));
        return;
      }

      try {
        const roleLabel = await applyRoleCodeIfAny(cred.user, registerRoleCode?.value);
        if (roleLabel) {
          alert(`Code validé ✅ Rôle activé : ${roleLabel}`);
        }
      } catch (roleErr) {
        alert(roleErr?.message || "Impossible d'appliquer le code rôle.");
        return;
      }

      // --- SYNCHRONISATION CONTACT + E-MAILS ---
      try {
        // 1. Envoi vers Make pour la base de donnees contacts
        fetch("https://hook.eu1.make.com/ipq63kzsudkmk40qt9ynzd7au17e11la", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: userEmail,
            nom: lastName,
            prenom: firstName,
            telephone: phone,
            pays: country,
            ville: city,
            source: "Morgann Music CP"
          })
        }).catch(e => console.error("Make sync failed", e));

        // 2. Email de bienvenue via Cloud Function securisee
        await notifyAuthEmail("welcome", { firstName });
        console.log("✅ Sync et e-mail bienvenue OK");
      } catch (syncErr) {
        console.error("Erreur post-inscription:", syncErr);
      }
      // ----------------------------------------------------

      // Suppression de la proposition d'activation 2FA après inscription (désactivée)

      redirectAfterSuccess();
    } catch (err) {
      console.error("Auth register error", err);
      alert("Erreur d'inscription : " + (err?.message || err));
    } finally {
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
        submitBtn.innerHTML = submitBtn.dataset.orig || 'S\'inscrire';
      }
    }
  });

  // === MOT DE PASSE OUBLIÉ ===
  document.getElementById("forgot-password-link")?.addEventListener("click", async (e) => {
    e.preventDefault();
    const email = (loginEmail?.value || "").trim();
    if (!email) return alert("Entre ton email dans le champ Email puis reclique.");
    try {
      await sendPasswordResetEmail(auth, email);
      alert("Si un compte existe avec cet email, un lien de réinitialisation a été envoyé ✅");
    } catch (err) {
      console.error("reset password error", err);
      alert("Erreur reset password : " + getCallableErrorMessage(err, "service email indisponible. Réessaie plus tard."));
    }
  });

  const googleBtn = document.getElementById("google-login");
  googleBtn?.addEventListener("click", async (e) => {
    e.preventDefault();
    console.log("➡️ click Google");
    const provider = new GoogleAuthProvider();
    const origHtml = googleBtn.innerHTML;
    try {
      googleBtn.innerHTML = origHtml + ' <span class="spinner"></span>';
      googleBtn.style.pointerEvents = 'none';
      const result = await signInWithPopup(auth, provider);
      console.log("Auth: Google sign-in OK", result.user.uid);

      try {
        const ensured = await ensureUserDoc(result.user);
        const enabled = await enforceAccountEnabledOrSupport(result.user);
        if (!enabled) {
          await signOut(auth);
          return;
        }
        if (ensured?.created) {
          // Suppression de la proposition d'activation 2FA après inscription Google (désactivée)
        }
      } catch (fsErr) {
        alert("Erreur Firestore : " + (fsErr?.message || fsErr));
        await signOut(auth);
        return;
      }

      // Suppression de la vérification 2FA (désactivée)

      try {
        const okProfile = await enforceProfileUpdateAfterLogin(result.user);
        if (!okProfile) {
          await signOut(auth);
          return;
        }
      } catch (profileErr) {
        alert("Erreur vérification profil : " + (profileErr?.message || profileErr));
        await signOut(auth);
        return;
      }

      await notifyAuthEmail("login");

      redirectAfterSuccess();
    } catch (err) {
      console.error("Google sign-in error", err);
      alert("Google login error : " + (err?.message || err));
    } finally {
      googleBtn.innerHTML = origHtml;
      googleBtn.style.pointerEvents = '';
    }
  });
</script>
