                        function setupMediaSession() {
                            if (!('mediaSession' in navigator) || typeof MediaMetadata === 'undefined') return;

                            navigator.mediaSession.metadata = new MediaMetadata({
                                title: currentReleaseData.trackTitle || currentReleaseData.title,
                                artist: currentReleaseData.artistName,
                                album: currentReleaseData.title,
                                artwork: [
                                    { src: currentReleaseData.coverUrl, sizes: '96x96', type: 'image/png' },
                                    { src: currentReleaseData.coverUrl, sizes: '128x128', type: 'image/png' },
                                    { src: currentReleaseData.coverUrl, sizes: '192x192', type: 'image/png' },
                                    { src: currentReleaseData.coverUrl, sizes: '256x256', type: 'image/png' },
                                    { src: currentReleaseData.coverUrl, sizes: '384x384', type: 'image/png' },
                                    { src: currentReleaseData.coverUrl, sizes: '512x512', type: 'image/png' }
                                ]
                            });

                            const setAction = (action, handler) => {
                                try {
                                    navigator.mediaSession.setActionHandler(action, handler);
                                } catch (_) {
                                    // Action non supportée selon le navigateur/OS
                                }
                            };

                            setAction('play', () => audio.play());
                            setAction('pause', () => audio.pause());
                            setAction('seekbackward', (details) => {
                                const skip = details.seekOffset || 10;
                                audio.currentTime = Math.max(audio.currentTime - skip, 0);
                            });
                            setAction('seekforward', (details) => {
                                const skip = details.seekOffset || 10;
                                const duration = Number.isFinite(audio.duration) ? audio.duration : audio.currentTime + skip;
                                audio.currentTime = Math.min(audio.currentTime + skip, duration);
                            });
                            setAction('seekto', (details) => {
                                if (typeof details.seekTime !== 'number') return;
                                if (details.fastSeek && typeof audio.fastSeek === 'function') {
                                    audio.fastSeek(details.seekTime);
                                } else {
                                    audio.currentTime = details.seekTime;
                                }
                            });
                        }

        function parseLRC(lrcText) {
            lyricsData = [];
            hasTimedLyrics = false;
            const lines = lrcText.split('\n');
            const timeReg = /\[(\d{2}):(\d{2})(?:\.(\d{1,3}))?\]/g;

            lines.forEach(line => {
                const matches = [...line.matchAll(timeReg)];
                if (!matches.length) return;

                const content = line.replace(timeReg, '').trim();
                if (!content) return;

                matches.forEach(match => {
                    const minutes = parseInt(match[1], 10);
                    const seconds = parseInt(match[2], 10);
                    const fraction = (match[3] || '0').padEnd(3, '0');
                    const ms = parseInt(fraction, 10);
                    const time = minutes * 60 + seconds + ms / 1000;
                    lyricsData.push({ time, content });
                    hasTimedLyrics = true;
                });
            });

            if (hasTimedLyrics) {
                lyricsData.sort((a, b) => a.time - b.time);
                renderLyrics();
                return;
            }

            const plainLines = lrcText
                .split(/\r?\n/)
                .map(line => clean(line.replace(timeReg, '')))
                .filter(Boolean);

            if (!plainLines.length) {
                wrapper.innerHTML = "<p class='lyric-line active'>Paroles non disponibles.</p>";
                return;
            }

            wrapper.innerHTML = plainLines
                .map((line, index) => `<div class="lyric-line ${index === 0 ? 'active' : ''}">${line}</div>`)
                .join('');
            wrapper.style.transform = 'translateY(0)';
        }

        function formatTime(seconds) {
            if (!Number.isFinite(seconds)) return '00:00';
            const min = Math.floor(seconds / 60)
                .toString()
                .padStart(2, '0');
            const sec = Math.floor(seconds % 60)
                .toString()
                .padStart(2, '0');
            return `${min}:${sec}`;
        }

        function renderLyrics() {
            if (!lyricsData.length) {
                wrapper.innerHTML = "<p class='lyric-line active'>Paroles non disponibles.</p>";
                return;
            }

            wrapper.innerHTML = lyricsData
                .map(
                    (line, index) =>
                        `<div class="lyric-line" id="line-${index}" data-time="${line.time}"><small>${formatTime(line.time)}</small> ${line.content}</div>`
                )
                .join('');

            wrapper.querySelectorAll('.lyric-line').forEach((el, index) => {
                el.addEventListener('click', () => {
                    const cueTime = parseFloat(el.dataset.time || '0');
                    audio.currentTime = cueTime;
                    updateActiveLine(index);
                });
            });
        }

        audio.ontimeupdate = () => {
            const currentTime = audio.currentTime;

            if (audio.duration) {
                seekBar.value = currentTime;
                setRangeProgress(seekBar, currentTime, audio.duration);
            }

            currentTimeLabel.textContent = formatTime(currentTime);
            setMediaSessionPositionState();

            if (!hasTimedLyrics) return;
            const activeIndex = lyricsData.findLastIndex(l => l.time <= currentTime + 0.04);
            if (activeIndex !== -1) {
                updateActiveLine(activeIndex);
            }
        };

        function updateActiveLine(index) {
            const lines = document.querySelectorAll('.lyric-line');
            lines.forEach((line, lineIndex) => {
                line.classList.remove('active', 'past');
                if (lineIndex < index) {
                    line.classList.add('past');
                }
            });

            const activeLine = document.getElementById(`line-${index}`);
            const container = document.querySelector('.lyrics-container');
            if (!activeLine || !container) return;

            activeLine.classList.add('active');

            const containerHeight = container.offsetHeight;
            const offset = activeLine.offsetTop - containerHeight / 2 + activeLine.offsetHeight / 2;
            wrapper.style.transform = `translateY(${-offset}px)`;
        }

        function refreshPlayState() {
            if (!audio.src) {
                playToggle.textContent = '•';
                playToggle.setAttribute('aria-label', 'Audio indisponible');
                playerStatusText.textContent = 'Audio indisponible';
                return;
            }

            const isPaused = audio.paused;
            playToggle.textContent = isPaused ? '▶' : '❚❚';
            playToggle.setAttribute('aria-label', isPaused ? 'Lecture' : 'Pause');
            playerStatusText.textContent = isPaused ? 'Pret a lire' : 'En lecture';

            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = isPaused ? 'paused' : 'playing';
            }
        }

        playToggle.addEventListener('click', async () => {
            if (!audio.src) return;
            if (audio.paused) {
                await audio.play();
            } else {
                audio.pause();
            }
        });

        seekBar.addEventListener('input', () => {
            const value = Number(seekBar.value);
            setRangeProgress(seekBar, value, audio.duration || 1);
            currentTimeLabel.textContent = formatTime(value);
        });

        seekBar.addEventListener('change', () => {
            audio.currentTime = Number(seekBar.value);
        });

        volumeBar.addEventListener('input', () => {
            const volume = Number(volumeBar.value);
            audio.volume = volume;
            setRangeProgress(volumeBar, volume, 1);
        });

        audio.addEventListener('loadedmetadata', () => {
            seekBar.max = audio.duration;
            durationTimeLabel.textContent = formatTime(audio.duration);
            setRangeProgress(seekBar, 0, audio.duration || 1);
            setMediaSessionPositionState();
        });

        audio.addEventListener('play', refreshPlayState);
        audio.addEventListener('pause', refreshPlayState);
        audio.addEventListener('ended', () => {
            refreshPlayState();
            seekBar.value = 0;
            setRangeProgress(seekBar, 0, audio.duration || 1);
        });

        function setPlatformLink(platform, url) {
            const link = document.getElementById(`platform-${platform}`);
            if (!link) return;
            if (!clean(url)) {
                link.href = '#';
                link.classList.add('is-disabled');
                link.setAttribute('aria-disabled', 'true');
                return;
            }
            link.href = url;
            link.classList.remove('is-disabled');
            link.setAttribute('aria-disabled', 'false');
        }

        function updateMetaTag(selector, value, attr = 'content') {
            let element = document.querySelector(selector);
            if (element && clean(value)) {
                element.setAttribute(attr, value);
            } else if (!element && clean(value)) {
                // Crée la balise si elle n'existe pas
                const tagMatch = selector.match(/([a-zA-Z0-9\-]+)(\[.*?\])?([a-zA-Z0-9\-\="\: ]+)?/);
                if (tagMatch) {
                    let tagName = tagMatch[1];
                    let newTag = document.createElement(tagName);
                    // Ajoute les attributs du sélecteur
                    if (selector.includes('property')) {
                        const prop = selector.match(/property=\"([^"]+)\"/);
                        if (prop) newTag.setAttribute('property', prop[1]);
                    }
                    if (selector.includes('name')) {
                        const name = selector.match(/name=\"([^"]+)\"/);
                        if (name) newTag.setAttribute('name', name[1]);
                    }
                    newTag.setAttribute(attr, value);
                    document.head.appendChild(newTag);
                }
            }
        }

        async function loadArtist(artistId) {
            if (!clean(artistId)) return null;
            try {
                const snap = await getDoc(doc(db, 'artists', clean(artistId)));
                return snap.exists() ? { id: snap.id, ...snap.data() } : null;
            } catch (_) {
                return null;
            }
        }

        async function getTargetRelease() {
            const params = new URLSearchParams(window.location.search);
            const releaseId = clean(params.get('id'));

            if (releaseId) {
                const snap = await getDoc(doc(db, 'releases', releaseId));
                if (!snap.exists()) throw new Error('Sortie introuvable');
                return { id: snap.id, ...snap.data() };
            }

            const snap = await getDocs(collection(db, 'releases'));
            const releases = snap.docs.map((item) => ({ id: item.id, ...item.data() }));
            const latest = findLatestRelease(releases);
            if (!latest) throw new Error('Aucune sortie publique disponible');
            return latest;
        }

        function applyReleaseData(data) {
            currentReleaseData = data;
            releaseTitle.textContent = data.title ? data.title + (data.versionLine ? ' (' + data.versionLine + ')' : '') : '';
            releaseSubtitle.textContent = `${data.artistName} · ${data.type}${data.releaseDateLabel !== '—' ? ` · ${data.releaseDateLabel}` : ''}`;
            playerTrackTitle.textContent = data.trackTitle || data.title;
            playerTrackArtist.textContent = `${data.artistName} · ${data.trackCount || 1} piste${data.trackCount > 1 ? 's' : ''}`;
                        // Affichage prioritaire de la pochette animée si présente
                        const coverMedia = document.getElementById('release-cover-media');
                        if (coverMedia) {
                            coverMedia.innerHTML = '';
                            if (data.animatedCoverUrl) {
                                coverMedia.innerHTML = `<video src="${data.animatedCoverUrl}" autoplay loop muted playsinline style="width:100%;border-radius:20px;aspect-ratio:1/1;background:#000;"></video>`;
                            } else {
                                coverMedia.innerHTML = `<img id="release-cover-image" src="${data.coverUrl}" alt="Pochette ${data.title}" style="width:100%;border-radius:20px;aspect-ratio:1/1;background:#000;">`;
                            }
                        }
            releasePill.textContent = data.id ? `Sortie #${data.id.slice(0, 6)}` : 'Derniere sortie';
            releaseShareLink.href = data.releaseUrl || buildReleaseUrl(data.id);
            releaseShareLink.textContent = 'Lien direct vers la sortie';

            const artistProfileHref = clean(data.artistId)
                ? `/catalogue/artiste?id=${encodeURIComponent(data.artistId)}`
                : clean(data.artistUrl);
            if (artistProfileHref) {
                artistPageLink.href = artistProfileHref;
                artistPageLink.hidden = false;
                artistPageLink.textContent = `Voir la page artiste de ${data.artistName}`;
            } else {
                artistPageLink.hidden = true;
            }

            setPlatformLink('apple', data.platformLinks.apple);
            setPlatformLink('spotify', data.platformLinks.spotify);
            setPlatformLink('deezer', data.platformLinks.deezer);
            setPlatformLink('youtube', data.platformLinks.youtube);

            const activePlatforms = Object.values(data.platformLinks).filter(Boolean).length;
            platformPlaceholder.textContent = activePlatforms
                ? 'Ecoute la sortie sur ta plateforme preferee.'
                : 'Les liens plateformes seront ajoutes ici des qu ils sont disponibles.';

            document.title = `${data.title} - ${data.artistName} | Morgann Music`;
            updateMetaTag('meta[name="description"]', `Ecoute ${data.title} de ${data.artistName} avec un lecteur immersif et les paroles disponibles.`);
            updateMetaTag('meta[property="og:title"]', `${data.title} - ${data.artistName} | Morgann Music`);
            updateMetaTag('meta[property="og:description"]', `Ecoute ${data.title} de ${data.artistName} sur Morgann Music.`);
            updateMetaTag('meta[property="og:image"]', data.coverUrl);
            updateMetaTag('meta[property="og:url"]', `${window.location.origin}${data.releaseUrl}`);
            updateMetaTag('meta[name="twitter:title"]', `${data.title} - ${data.artistName} | Morgann Music`);
            updateMetaTag('meta[name="twitter:description"]', `Ecoute ${data.title} de ${data.artistName} sur Morgann Music.`);
            updateMetaTag('meta[name="twitter:image"]', data.coverUrl);

            audio.src = data.audioUrl || '';
            // Met à jour la balise meta og:audio avec l'URL de l'audio
            const metaOgAudio = document.getElementById('meta-og-audio');
            if (metaOgAudio && data.audioUrl) {
                metaOgAudio.setAttribute('content', data.audioUrl);
            }
            if (!audio.src) {
                seekBar.disabled = true;
                volumeBar.disabled = true;
            }

            parseLRC(data.lyricsRaw || '');
            setupMediaSession();
            refreshPlayState();
        }

        async function bootReleasePage() {
            try {
                const release = await getTargetRelease();
                const artist = await loadArtist(release.artistId || release.mainArtistId);
                const normalized = normalizeReleaseData(release.id, release, artist);
                applyReleaseData(normalized);
            } catch (error) {
                releaseTitle.textContent = 'Sortie indisponible';
                releaseSubtitle.textContent = error?.message || 'Impossible de charger la sortie.';
                playerStatusText.textContent = 'Erreur';
                wrapper.innerHTML = "<p class='lyric-line active'>Impossible de charger cette sortie.</p>";
                platformPlaceholder.textContent = 'Aucune information disponible pour le moment.';
                refreshPlayState();
            }
        }

        setRangeProgress(seekBar, 0, 1);
        setRangeProgress(volumeBar, 1, 1);
        refreshPlayState();
        bootReleasePage();

        gsap.from('.release-cover', {
            opacity: 0,
            y: 24,
            duration: 0.9,
            ease: 'power3.out'
        });

        gsap.from('.release-player', {
            opacity: 0,
            y: 28,
            duration: 1.05,
            delay: 0.1,
            ease: 'power3.out'
        });

        gsap.from('.platform-link', {
            opacity: 0,
            y: 18,
            stagger: 0.08,
            delay: 0.28,
            duration: 0.7,
            ease: 'power2.out'
        });
    </script>
</body>
</html>
