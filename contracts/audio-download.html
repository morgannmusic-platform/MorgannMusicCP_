<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Téléchargement audio</title>
  <style>
    body{font-family:Helvetica,Arial,sans-serif;background:#f3f4f6;margin:0}
    .wrap{max-width:900px;margin:24px auto;padding:16px}
    .panel{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:16px;margin-bottom:12px}
    .muted{color:#6b7280}
    .list{display:grid;gap:10px}
    .item{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid #e5e7eb;border-radius:10px;padding:10px}
    .btn{display:inline-block;border:0;border-radius:10px;padding:9px 12px;text-decoration:none;font-weight:700}
    .btn-main{background:#111827;color:#fff}
    .btn-light{background:#e5e7eb;color:#111827}
  </style>
</head>
<body>
  <div id="navbar-container"></div>
  <main class="wrap">
    <section class="panel">
      <h1>Contrat signé ✅</h1>
      <p id="status" class="muted">Chargement des téléchargements...</p>
      <p><a id="signedContractLink" class="btn btn-light" href="#" target="_blank" rel="noopener" style="display:none">Télécharger le contrat signé</a></p>
    </section>

    <section class="panel">
      <h2>Télécharger l'audio</h2>
      <div id="audioList" class="list"></div>
    </section>
  </main>

  <script type="module" src="/assets/js/navbar.js"></script>
  <script type="module" src="/assets/js/contracts/audio-download.js"></script>
</body>
</html>
