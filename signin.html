<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d0a75a">
    <title>Inscription | Morgann Music CP</title>
    <link rel="stylesheet" href="/assets/css/login-signin.css">
    <link rel="stylesheet" href="/assets/navbars/accueil/navbar-login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="/assets/js/navbar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="/assets/js/auth-ui.js" defer></script>
</head>
<body class="login-page">
    <div id="navbar"></div>

    <main class="auth-card">
        <a class="brand" href="/index.html">Morgann Music <img src="/assets/img/logo/logo-rose.svg" alt="CP"></a>
        <h1>Inscription</h1>
        <p class="subtitle">Crée ton espace Morgann Music CP en quelques étapes.</p>

        <form id="signin-form" novalidate>
            <p class="step-indicator" id="step-indicator">Etape 1 sur 3</p>

            <section class="form-step" data-step="1">
                <div>
                    <label for="last-name">Nom</label>
                    <input id="last-name" name="last_name" type="text" autocomplete="family-name" required>
                </div>
                <div>
                    <label for="first-name">Prenom</label>
                    <input id="first-name" name="first_name" type="text" autocomplete="given-name" required>
                </div>
                <div>
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" autocomplete="email" required placeholder="exemple@domaine.uk">
                </div>
            </section>

            <section class="form-step is-hidden" data-step="2">
                <div>
                    <label for="artist-name">Nom d'artiste</label>
                    <input id="artist-name" name="artist_name" type="text" autocomplete="nickname" required>
                </div>
                <div class="address-group">
                    <label for="address">Adresse</label>
                    <input id="address" name="address" type="text" autocomplete="street-address" required>
                    <ul id="address-suggestions" class="address-suggestions is-hidden" role="listbox" aria-label="Suggestions d'adresse"></ul>
                </div>
                <div>
                    <label for="city">Ville</label>
                    <input id="city" name="city" type="text" autocomplete="address-level2" required>
                </div>
                <div>
                    <label for="postal-code">Code postal</label>
                    <input id="postal-code" name="postal_code" type="text" autocomplete="postal-code" required>
                </div>
            </section>

            <section class="form-step is-hidden" data-step="3">
                <div>
                    <label for="password">Mot de passe (min 6 caracteres)</label>
                    <input id="password" name="password" type="password" autocomplete="new-password" minlength="6" required>
                </div>
                <div>
                    <label for="password-confirm">Confirmer le mot de passe</label>
                    <input id="password-confirm" name="password_confirm" type="password" autocomplete="new-password" minlength="6" required>
                </div>
                <div>
                    <label for="iban">IBAN (facultatif, a completer plus tard)</label>
                    <input id="iban" name="iban" type="text" autocomplete="off" placeholder="Optionnel">
                </div>
                <div>
                    <label for="role-code">Code role interne (optionnel)</label>
                    <input id="role-code" name="role_code" type="password" autocomplete="off" placeholder="Saisir un code role">
                </div>
            </section>

            <div class="step-actions">
                <button type="button" class="secondary" id="prev-step" disabled>Retour</button>
                <button type="button" id="next-step">Suivant</button>
                <button type="submit" id="submit-step" class="is-hidden">Creer le compte</button>
            </div>

            <p id="feedback" class="feedback" role="status" aria-live="polite"></p>
        </form>

        <p class="helper">Deja inscrit ? <a href="/login.html">Se connecter</a></p>
    </main>

    <script type="module" src="/assets/js/signin.js"></script>
</body>
</html>
